<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DoksPDF - Mobile Fix</title>
    <style>
        :root { --azul: #0a2540; --verde: #28a745; --amarelo: #ffcc29; }
        
        /* O segredo: usar dvh para altura dinâmica */
        body { 
            margin: 0; padding: 0; 
            height: 100dvh; width: 100vw; 
            display: flex; flex-direction: column; 
            overflow: hidden; background: #f4f7fa;
            font-family: sans-serif;
        }

        /* HEADER FIXO */
        .header { height: 45px; background: #fff; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #ddd; font-weight: bold; color: var(--azul); flex-shrink: 0; }

        /* ÁREA DO PDF (OCUPA O QUE SOBRA) */
        #visor { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 10px 0; }
        
        /* BOTÃO DE UPLOAD (ÚNICO E LIMPO) */
        .btn-upload { background: var(--azul); color: #fff; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; margin-top: 40px; }
        #input-file { display: none; }

        /* BARRA DE AÇÕES PDF (FIXA NO RODAPÉ) */
        .barra-acoes { height: 70px; background: var(--azul); display: none; align-items: center; justify-content: space-around; padding: 0 10px; flex-shrink: 0; }
        .btn-acao { flex: 1; margin: 0 5px; height: 45px; border-radius: 8px; border: none; font-weight: bold; text-transform: uppercase; }

        /* MODAL DE ASSINATURA (ESTILO OVERLAY TOTAL) */
        #modal-assin { 
            position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100dvh; 
            background: #fff; z-index: 99999; 
            display: none; flex-direction: column; 
        }

        #canvas { flex-grow: 1; background: #fafafa; touch-action: none; width: 100%; }

        /* RODAPÉ DO MODAL (ESTRATÉGICO) */
        .footer-modal { height: 65px; background: var(--azul); display: flex; align-items: center; justify-content: space-around; padding: 0 10px; flex-shrink: 0; }
        .btn-m { flex: 1; margin: 0 4px; height: 40px; border-radius: 6px; border: none; font-weight: bold; font-size: 12px; }

        .show { display: flex !important; }
    </style>
</head>
<body>

<div class="header">DoksPDF</div>

<div id="visor">
    <div id="area-upload">
        <label for="input-file" class="btn-upload">SELECIONAR PDF</label>
        <input type="file" id="input-file" accept="application/pdf">
    </div>
    <div id="pdf-render"></div>
</div>

<div class="barra-acoes" id="barra-pdf">
    <button class="btn-acao" style="background:#fff; color:var(--azul);" onclick="abrirAssinatura()">Assinar</button>
    <button class="btn-acao" style="background:var(--verde); color:#fff;">Salvar PDF</button>
</div>

<div id="modal-assin">
    <div style="padding: 10px; text-align: center; font-size: 12px; font-weight: bold; color: var(--azul);">ASSINE ABAIXO</div>
    <canvas id="canvas"></canvas>
    <div class="footer-modal">
        <button class="btn-m" style="background:#666; color:#fff;" onclick="fechar()">VOLTAR</button>
        <button class="btn-m" style="background:var(--amarelo);" onclick="limpar()">LIMPAR</button>
        <button class="btn-m" style="background:var(--verde); color:#fff;" onclick="confirmar()">OK</button>
    </div>
</div>

<script>
    const input = document.getElementById('input-file');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    input.onchange = () => {
        document.getElementById('area-upload').style.display = 'none';
        document.getElementById('barra-pdf').classList.add('show');
        // Renderização do PDF viria aqui
    };

    function abrirAssinatura() {
        document.getElementById('modal-assin').classList.add('show');
        // Ajuste de tamanho forçado após o modal abrir
        setTimeout(() => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
        }, 100);
    }

    function fechar() { document.getElementById('modal-assin').classList.remove('show'); }
    function limpar() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    function confirmar() { alert("Capturado!"); fechar(); }

    // Touch funcional
    let d = false;
    canvas.ontouchstart = (e) => { d=true; ctx.beginPath(); const r=canvas.getBoundingClientRect(); ctx.moveTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); };
    canvas.ontouchmove = (e) => { if(!d) return; const r=canvas.getBoundingClientRect(); ctx.lineTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); ctx.stroke(); e.preventDefault(); };
    canvas.ontouchend = () => d=false;
</script>
</body>
</html>
