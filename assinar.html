<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Assinar PDF - DoksPDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --azul-escuro: #002147;
            --amarelo: #ffcc00;
            --fundo: #f0f2f5;
            --azul-claro: #007bff;
            --verde: #28a745;
            --branco: #ffffff;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--fundo); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* --- HEADER CORRIGIDO (PRINT 2) --- */
header {
    background-color: var(--azul-escuro);
    display: flex;
    align-items: center;
    justify-content: space-between; /* Garante distribuição entre logo, busca e botões */
    padding: 10px;
    gap: 15px; /* Cria um espaço de segurança entre os elementos */
}

        .logo-area { display: flex; align-items: center; gap: 5px; cursor: pointer; color: white; flex-shrink: 0; }
        .logo-text { font-size: 16px; font-weight: 900; margin: 0; }
        
        /* Ajuste na busca para não sobrepor botões */
search-container {
    flex-grow: 1; 
    max-width: 300px; /* Defina um limite máximo para não esticar demais em telas largas */
    margin: 0 10px; /* Adiciona margem lateral para não encostar nos vizinhos */
}
        .search-input { 
            width: 100%; padding: 8px 12px 8px 30px; border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); 
            color: white; font-size: 12px; outline: none;
        }
        .search-container::before { content: '🔍'; position: absolute; left: 8px; top: 7px; font-size: 12px; opacity: 0.7; }

        .nav-btns-right { display: flex; gap: 5px; flex-shrink: 0; }
        .btn-nav { padding: 6px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; border: none; cursor: pointer; }
        .btn-recentes { color: var(--amarelo); border: 1.5px solid var(--amarelo); background: transparent; }
        .btn-pro { background: var(--amarelo); color: var(--azul-escuro); }

        #viewport { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px 10px 120px 10px; position: relative; }

        .card-inicial { background: white; width: 90%; max-width: 400px; padding: 50px 20px; border-radius: 30px; border-bottom: 8px solid var(--amarelo); box-shadow: 0 15px 35px rgba(0,0,0,0.15); text-align: center; }

.main-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 20px; /* Garante que o botão não cole no rodapé */
}

.btn-voltar {
    margin-top: 20px; /* Cria o distanciamento do card */
    display: block;  /* Garante que ele se comporte como bloco e fique embaixo */
    color: var(--cinza-texto);
    text-decoration: none;
}


        /* --- ESTILO ASSINATURA --- */
        .signature-wrapper { position: absolute; border: 2px dashed var(--azul-claro); cursor: move; touch-action: none; display: flex; flex-direction: column; align-items: center; min-width: 80px; z-index: 500; }
        .signature-img { width: 100%; height: auto; pointer-events: none; }
        .sig-tools { position: absolute; top: -45px; display: flex; gap: 4px; padding: 4px; background: rgba(0,33,71,0.9); border-radius: 8px; border: 1px solid var(--amarelo); }
        .tool-btn { border: none; color: white; font-size: 16px; cursor: pointer; padding: 6px; border-radius: 4px; }
        .btn-del { background: #dc3545; }
        .btn-rot { background: #28a745; }
        .btn-clone { background: var(--azul-claro); }
        .resize-handle { position: absolute; right: -10px; bottom: -10px; width: 24px; height: 24px; background: var(--amarelo); border-radius: 50%; border: 2px solid var(--azul-escuro); }

        /* MODAL ASSINATURA */
        #signature-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--azul-escuro); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; }
        .sig-container { background: var(--branco); width: 95%; height: 60vh; border-radius: 12px; }
        #sig-canvas { width: 100%; height: 100%; touch-action: none; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--azul-escuro); display: flex; justify-content: space-around; align-items: center; padding: 15px 0 25px 0; border-top: 3px solid var(--amarelo); z-index: 1001; }
        .nav-item { background: transparent; border: none; color: white; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: bold; gap: 5px; }
        
        #pdf-container { width: 100%; display: flex; flex-direction: column; align-items: center; position: relative; }
        .page-container { position: relative; background: white; margin-bottom: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="signature-modal">
        <h3 style="color:white; text-align:center; padding: 10px;">Assine no espaço branco</h3>
        <div class="sig-container"><canvas id="sig-canvas"></canvas></div>
        <div class="sig-buttons" style="display:flex; gap:10px; width:95%; margin-top:15px;">
            <button style="flex:1; background:#dc3545; padding:15px; color:white; border:none; border-radius:8px; font-weight:bold;" onclick="closeSignatureModal()">CANCELAR</button>
            <button style="flex:1; background:#6c757d; padding:15px; color:white; border:none; border-radius:8px; font-weight:bold;" onclick="clearCanvas()">LIMPAR</button>
            <button style="flex:1; background:var(--verde); padding:15px; color:white; border:none; border-radius:8px; font-weight:bold;" onclick="confirmSignature()">CONFIRMAR</button>
        </div>
    </div>

    <header class="header">
        <div class="logo-area" onclick="window.location.reload()">
            <span>🏠</span>
            <h1 class="logo-text">Doks<span style="color:var(--amarelo)">PDF</span></h1>
        </div>
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Buscar...">
        </div>
        <div class="nav-btns-right">
            <button class="btn-nav btn-recentes">RECENTES</button>
            <button class="btn-nav btn-pro">PRO</button>
        </div>
    </header>

    <main id="viewport">
        <div id="pdf-container">
            <div id="inicial-ui" style="display: flex; justify-content: center; width: 100%; margin-top: 5vh;">
                <div class="card-inicial">
                    <span style="font-size:80px; display:block; margin-bottom:20px;">📂</span>
                    <h2 style="font-size:26px; color:var(--azul-escuro); margin-bottom:30px;">ASSINAR <b>PDF</b></h2>
                    <button onclick="document.getElementById('file-selector').click()" class="btn-nav btn-pro" style="width:100%; padding:22px; font-size:18px; border-radius:15px;">SELECIONAR PDF</button>
                </div>
            </div>
        </div>
<div class="main-content">
    <div class="card-central">
        </div>
    
    <a href="/" class="btn-voltar">← Voltar página inicial</a>
</div>

        <input type="file" id="file-selector" style="display:none" onchange="handleFile(this)" accept="application/pdf">
    </main>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="location.reload()"><span>🔄</span>ATUALIZAR</button>
        <div style="color:var(--amarelo); font-weight:900; font-size:22px;"><span id="p-cur">0</span> / <span id="p-tot">0</span></div>
        <button class="nav-item" id="btn-assinar" onclick="prepareSignature()" disabled><span>🖋️</span>ASSINAR</button>
        <button class="nav-item" id="btn-salvar" onclick="savePDF()" disabled><span>💾</span>SALVAR</button>
    </nav>

    <script>
        let mainDoc = null, ctx, canvas, drawing = false, lastSignature = null;
        const { jsPDF } = window.jspdf;

        async function handleFile(el) {
            const file = el.files[0];
            if(!file) return;
            const arrayBuffer = await file.arrayBuffer();
            mainDoc = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            document.getElementById('p-tot').innerText = mainDoc.numPages;
            document.getElementById('p-cur').innerText = "1";
            document.getElementById('btn-assinar').disabled = false;
            document.getElementById('btn-salvar').disabled = false;
            renderPDF();
        }

        async function renderPDF() {
            const wrap = document.getElementById('pdf-container');
            document.getElementById('inicial-ui').style.display = 'none';
            wrap.innerHTML = "";
            for(let i=1; i<=mainDoc.numPages; i++) {
                const pg = await mainDoc.getPage(i);
                const vp = pg.getViewport({scale: (window.innerWidth * 0.95 / pg.getViewport({scale:1}).width)});
                const box = document.createElement('div');
                box.className = 'page-container';
                box.id = `page-${i}`;
                const cvs = document.createElement('canvas');
                cvs.width = vp.width; cvs.height = vp.height;
                box.appendChild(cvs);
                wrap.appendChild(box);
                await pg.render({canvasContext: cvs.getContext('2d'), viewport: vp}).promise;
            }
        }

        // FUNÇÃO COM ALERTA DE ORIENTAÇÃO (PRINT 1)
        function prepareSignature() {
            if(confirm("Para uma assinatura melhor, vire o celular deitado (Paisagem). Clique em OK quando estiver pronto.")) {
                openSignatureModal();
            }
        }

        function openSignatureModal() {
            document.getElementById('signature-modal').style.display = 'flex';
            setTimeout(initCanvas, 100);
        }
        function closeSignatureModal() { document.getElementById('signature-modal').style.display = 'none'; }
        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        function initCanvas() {
            canvas = document.getElementById('sig-canvas');
            ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.lineCap = "round";
            
            const getPos = (e) => {
                const r = canvas.getBoundingClientRect();
                const t = e.touches ? e.touches[0] : e;
                return { x: t.clientX - r.left, y: t.clientY - r.top };
            };

            canvas.addEventListener("touchstart", (e) => {
                e.preventDefault(); drawing = true; ctx.beginPath();
                const p = getPos(e); ctx.moveTo(p.x, p.y);
            });
            canvas.addEventListener("touchmove", (e) => {
                if(!drawing) return; e.preventDefault();
                const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
            });
            canvas.addEventListener("touchend", () => drawing = false);
        }

        function confirmSignature() {
            lastSignature = canvas.toDataURL();
            addSignatureToPage(1, lastSignature, true);
            closeSignatureModal();
        }

        function addSignatureToPage(pageNum, src, isMaster = false) {
            const wrapper = document.createElement('div');
            wrapper.className = 'signature-wrapper';
            wrapper.style.left = '50px'; wrapper.style.top = '100px';
            wrapper.style.width = '140px';
            const cloneBtn = isMaster ? `<button class="tool-btn btn-clone" onclick="cloneToAll(this)">👥</button>` : '';
            wrapper.innerHTML = `
                <div class="sig-tools">
                    <button class="tool-btn btn-del" onclick="this.parentElement.parentElement.remove()">🗑️</button>
                    <button class="tool-btn btn-rot" onclick="rotateSig(this)">🔄</button>
                    ${cloneBtn}
                </div>
                <img src="${src}" class="signature-img">
                <div class="resize-handle"></div>
            `;
            makeDraggable(wrapper);
            makeResizable(wrapper);
            document.getElementById(`page-${pageNum}`).appendChild(wrapper);
        }

        function makeDraggable(el) {
            let posX = 0, posY = 0;
            el.addEventListener('touchstart', (e) => {
                if (e.target.classList.contains('tool-btn') || e.target.classList.contains('resize-handle')) return;
                posX = e.touches[0].clientX - el.offsetLeft;
                posY = e.touches[0].clientY - el.offsetTop;
            });
            el.addEventListener('touchmove', (e) => {
                if (e.target.classList.contains('tool-btn') || e.target.classList.contains('resize-handle')) return;
                e.preventDefault();
                el.style.left = (e.touches[0].clientX - posX) + 'px';
                el.style.top = (e.touches[0].clientY - posY) + 'px';
            });
        }

        function makeResizable(el) {
            const handle = el.querySelector('.resize-handle');
            handle.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const newWidth = e.touches[0].clientX - el.getBoundingClientRect().left;
                if(newWidth > 50) el.style.width = newWidth + 'px';
            });
        }

        function rotateSig(btn) {
            const wrap = btn.parentElement.parentElement;
            let rot = parseInt(wrap.getAttribute('data-rot') || 0);
            rot = (rot + 90) % 360;
            wrap.style.transform = `rotate(${rot}deg)`;
            wrap.setAttribute('data-rot', rot);
        }

        // SALVAR PDF - REMOVIDO MENSAGEM E USANDO DOWNLOAD PADRÃO (PRINT 3)
        async function savePDF() {
            const pdf = new jsPDF();
            const pages = document.querySelectorAll('.page-container');
            
            for (let i = 0; i < pages.length; i++) {
                const canvas = pages[i].querySelector('canvas');
                const imgData = canvas.toDataURL('image/jpeg', 0.8);
                if (i > 0) pdf.addPage();
                pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
                
                // Aqui adicionaria as assinaturas por cima no PDF final se necessário
            }
            pdf.save("documento-assinado.pdf");
        }
    </script>
</body>
</html>
