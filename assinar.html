<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Assinar PDF - DoksPDF</title>
    <!-- Dependências para manipulação de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* ================================================== */
        /* ESTILOS GLOBAIS E VARIÁVEIS                        */
        /* ================================================== */
        :root {
            --azul-escuro: #002147;
            --amarelo: #ffcc00;
            --fundo: #f0f2f5;
            --azul-claro: #007bff;
            --verde: #28a745;
            --branco: #ffffff;
            --vermelho: #dc3545;
            --cinza: #6c757d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background-color: var(--fundo);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ================================================== */
        /* HEADER E NAVEGAÇÃO                                 */
        /* ================================================== */
        .header {
            background-color: var(--azul-escuro);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid var(--amarelo);
            flex-shrink: 0;
            z-index: 1001;
            gap: 10px;
        }
        .logo-area { display: flex; align-items: center; gap: 8px; cursor: pointer; color: white; flex-shrink: 0; }
        .logo-text { font-size: 18px; font-weight: 700; margin: 0; }
        
        .search-container { flex-grow: 1; max-width: 200px; position: relative; } 
        .search-input { width: 100%; padding: 8px 12px 8px 30px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; font-size: 14px; outline: none; }
        .search-container::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0.7; }

        .nav-btns-right { display: flex; gap: 8px; flex-shrink: 0; }
        .btn-nav { padding: 7px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-recentes { color: var(--amarelo); border: 1.5px solid var(--amarelo); background: transparent; }
        .btn-pro { background: var(--amarelo); color: var(--azul-escuro); }

        /* ================================================== */
        /* CONTEÚDO PRINCIPAL                                 */
        /* ================================================== */
        #viewport {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px 120px 10px;
        }
        #pdf-container { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .page-container { position: relative; background: white; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card-inicial { background: white; width: 90%; max-width: 400px; padding: 40px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; margin-top: 5vh; }

        /* ================================================== */
        /* ASSINATURA (Wrapper, Controles, Handle)            */
        /* ================================================== */
        .signature-wrapper {
            position: absolute;
            border: 2px dashed transparent;
            cursor: move;
            touch-action: none;
            z-index: 500;
            transition: border-color 0.2s;
        }
        .signature-wrapper.active {
            border-color: var(--amarelo);
            z-index: 501;
        }
        .signature-img { width: 100%; height: auto; pointer-events: none; }
        
        .sig-tools {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 5px;
            padding: 5px;
            background: rgba(0, 33, 71, 0.95);
            border-radius: 8px;
        }
        .signature-wrapper.active .sig-tools { display: flex; }
        
        .tool-btn { border: none; color: white; font-size: 18px; cursor: pointer; padding: 6px; border-radius: 5px; display: flex; align-items: center; justify-content: center; }
        .btn-del { background: var(--vermelho); }
        .btn-rot { background: var(--verde); }
        .btn-clone { background: var(--azul-claro); }

        .resize-handle {
            position: absolute;
            right: -8px;
            bottom: -8px;
            width: 20px;
            height: 20px;
            background: var(--amarelo);
            border-radius: 50%;
            border: 2px solid var(--azul-escuro);
            cursor: se-resize;
            display: none;
        }
        .signature-wrapper.active .resize-handle { display: block; }

        /* ================================================== */
        /* MODAIS E OVERLAYS                                  */
        /* ================================================== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 33, 71, 0.9);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }
        .modal-overlay.visible { display: flex; }
        
        #signature-modal .sig-container { background: var(--branco); width: 95%; max-width: 700px; height: 60vh; border-radius: 12px; }
        #sig-canvas { width: 100%; height: 100%; border-radius: 12px; }
        
        #rotate-overlay .rotate-content { padding: 20px; }
        #rotate-overlay h2 { font-size: 22px; margin-bottom: 10px; }
        #rotate-overlay p { font-size: 16px; opacity: 0.8; margin-bottom: 30px; }
        #rotate-overlay button { background: var(--amarelo); color: var(--azul-escuro); padding: 15px 30px; border-radius: 10px; border: none; font-weight: bold; font-size: 16px; }

        /* ================================================== */
        /* NAVEGAÇÃO INFERIOR                                 */
        /* ================================================== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--azul-escuro);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0;
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); /* Para iPhone X e similares */
            border-top: 3px solid var(--amarelo);
            z-index: 1001;
        }
        .nav-item { background: transparent; border: none; color: white; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: bold; gap: 5px; }
        .nav-item:disabled { opacity: 0.5; }
    </style>
</head>
<body>

    <!-- MODAL DE ASSINATURA -->
    <div id="signature-modal" class="modal-overlay">
        <div style="width: 95%; max-width: 700px;">
            <h3 style="color:white; text-align:center; padding: 10px;">Assine no espaço branco</h3>
            <div class="sig-container"><canvas id="sig-canvas"></canvas></div>
            <div class="sig-buttons" style="display:flex; gap:10px; width:100%; margin-top:15px;">
                <button style="flex:1; background:var(--vermelho); padding:15px; color:white; border:none; border-radius:8px; font-weight:bold;" onclick="closeSignatureModal()">CANCELAR</button>
                <button style="flex:1; background:var(--cinza); padding:15px; color:white; border:none; border-radius:8px; font-weight:bold;" onclick="clearCanvas()">LIMPAR</button>
                <button style="flex:1; background:var(--verde); padding:15px; color:white; border:none; border-radius:8px; font-weight:bold;" onclick="confirmSignature()">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <!-- OVERLAY "VIRE O CELULAR" -->
    <div id="rotate-overlay" class="modal-overlay">
        <div class="rotate-content">
            <span style="font-size: 48px; display: block; margin-bottom: 20px;">🔄</span>
            <h2>Vire o celular</h2>
            <p>Para uma melhor experiência, assine com o celular deitado.</p>
            <button onclick="document.getElementById('rotate-overlay').classList.remove('visible'); openSignatureModal();">ESTOU PRONTO</button>
        </div>
    </div>

    <!-- HEADER -->
    <header class="header">
        <div class="logo-area" onclick="window.location.reload()">
            <span style="font-size: 20px;">🏠</span>
            <h1 class="logo-text">Doks<span style="color:var(--amarelo)">PDF</span></h1>
        </div>
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Buscar...">
        </div>
        <div class="nav-btns-right">
            <button class="btn-nav btn-recentes">RECENTES</button>
            <button class="btn-nav btn-pro">PRO</button>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main id="viewport">
        <div id="pdf-container">
            <div id="inicial-ui" style="display: flex; justify-content: center; width: 100%; margin-top: 5vh;">
                <div class="card-inicial">
                    <span style="font-size:60px; display:block; margin-bottom:20px;">📂</span>
                    <h2 style="font-size:22px; color:var(--azul-escuro); margin-bottom:30px;">ASSINAR <b>PDF</b></h2>
                    <button onclick="document.getElementById('file-selector').click()" class="btn-nav btn-pro" style="width:100%; padding:20px; font-size:16px; border-radius:15px;">SELECIONAR PDF</button>
                </div>
            </div>
        </div>
        <input type="file" id="file-selector" style="display:none" onchange="handleFile(this)" accept="application/pdf">
    </main>

    <!-- NAVEGAÇÃO INFERIOR -->
    <nav class="bottom-nav">
        <button class="nav-item" onclick="location.reload()"><span>🔄</span>ATUALIZAR</button>
        <div style="color:var(--amarelo); font-weight:900; font-size:22px;"><span id="p-cur">0</span> / <span id="p-tot">0</span></div>
        <button class="nav-item" id="btn-assinar" onclick="prepareSignature()" disabled><span>🖋️</span>ASSINAR</button>
        <button class="nav-item" id="btn-salvar" onclick="savePDF()" disabled><span>💾</span>SALVAR</button>
    </nav>

    <script>
        // Variáveis globais
        let mainDoc = null, ctx, canvas, isDrawing = false, lastSignatureData = null;
        const { jsPDF } = window.jspdf;
        pdfjsLib.GlobalWorkerOptions.workerSrc = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js`;

        // --- 1. CARREGAMENTO E RENDERIZAÇÃO DO PDF ---
        async function handleFile(element) {
            const file = element.files[0];
            if (!file) return;
            document.getElementById('inicial-ui').innerHTML = `<h2>Carregando PDF...</h2>`;
            const arrayBuffer = await file.arrayBuffer();
            mainDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            document.getElementById('p-tot').innerText = mainDoc.numPages;
            document.getElementById('btn-assinar').disabled = false;
            document.getElementById('btn-salvar').disabled = false;
            await renderAllPages();
        }

        async function renderAllPages() {
            const container = document.getElementById('pdf-container');
            container.innerHTML = ""; // Limpa a UI inicial
            for (let i = 1; i <= mainDoc.numPages; i++) {
                const page = await mainDoc.getPage(i);
                const viewport = page.getViewport({ scale: (window.innerWidth / page.getViewport({ scale: 1 }).width) * 0.95 });
                
                const pageContainer = document.createElement('div');
                pageContainer.className = 'page-container';
                pageContainer.id = `page-${i}`;
                
                const canvasEl = document.createElement('canvas');
                canvasEl.width = viewport.width;
                canvasEl.height = viewport.height;
                pageContainer.appendChild(canvasEl);
                container.appendChild(pageContainer);

                await page.render({ canvasContext: canvasEl.getContext('2d'), viewport }).promise;
                document.getElementById('p-cur').innerText = i;
            }
        }

        // --- 2. LÓGICA DO MODAL DE ASSINATURA ---
        function prepareSignature() {
            const isMobilePortrait = window.matchMedia("(max-width: 768px) and (orientation: portrait)").matches;
            if (isMobilePortrait) {
                document.getElementById('rotate-overlay').classList.add('visible');
            } else {
                openSignatureModal();
            }
        }

        function openSignatureModal() {
            document.getElementById('signature-modal').classList.add('visible');
            setTimeout(initSignatureCanvas, 100); // Garante que o modal esteja visível
        }

        function closeSignatureModal() {
            document.getElementById('signature-modal').classList.remove('visible');
        }

        function initSignatureCanvas() {
            canvas = document.getElementById('sig-canvas');
            ctx = canvas.getContext('2d');
            
            // Ajusta o tamanho do canvas para a densidade de pixels do dispositivo
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext('2d').scale(ratio, ratio);

            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2;
            ctx.lineCap = "round";
            
            clearCanvas();

            // Adiciona listeners unificados para mouse e toque
            const start = (e) => { e.preventDefault(); isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
            const draw = (e) => { if (!isDrawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
            const stop = () => { isDrawing = false; };
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const evt = e.touches ? e.touches[0] : e;
                return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
            };

            ['mousedown', 'touchstart'].forEach(evt => canvas.addEventListener(evt, start));
            ['mousemove', 'touchmove'].forEach(evt => canvas.addEventListener(evt, draw));
            ['mouseup', 'mouseout', 'touchend'].forEach(evt => canvas.addEventListener(evt, stop));
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function confirmSignature() {
            lastSignatureData = canvas.toDataURL();
            addSignatureToPage(1, lastSignatureData, true); // Adiciona na primeira página por padrão
            closeSignatureModal();
        }

        // --- 3. MANIPULAÇÃO DA ASSINATURA NA PÁGINA ---
        function addSignatureToPage(pageNum, imgSrc, isMaster) {
            const pageContainer = document.getElementById(`page-${pageNum}`);
            if (!pageContainer) return;

            const wrapper = document.createElement('div');
            wrapper.className = 'signature-wrapper';
            wrapper.style.left = '50px';
            wrapper.style.top = '100px';
            wrapper.style.width = '150px';

            const cloneBtnHTML = isMaster ? `<button class="tool-btn btn-clone" onclick="cloneSignature(this)">👥</button>` : '';
            wrapper.innerHTML = `
                <div class="sig-tools">
                    <button class="tool-btn btn-del" onclick="this.closest('.signature-wrapper').remove()">🗑️</button>
                    <button class="tool-btn btn-rot" onclick="rotateSignature(this)">🔄</button>
                    ${cloneBtnHTML}
                </div>
                <img src="${imgSrc}" class="signature-img">
                <div class="resize-handle"></div>
            `;
            
            pageContainer.appendChild(wrapper);
            makeSignatureInteractive(wrapper);
        }

        function makeSignatureInteractive(element) {
            // Ativar/Desativar ao clicar
            element.addEventListener('click', (e) => {
                e.stopPropagation();
                document.querySelectorAll('.signature-wrapper.active').forEach(activeEl => {
                    if (activeEl !== element) activeEl.classList.remove('active');
                });
                element.classList.toggle('active');
            });

            // Lógica unificada para arrastar
            const startDrag = (e) => {
                if (e.target.closest('.sig-tools, .resize-handle')) return;
                e.preventDefault();
                element.style.cursor = 'grabbing';
                const evt = e.touches ? e.touches[0] : e;
                const offsetX = evt.clientX - element.offsetLeft;
                const offsetY = evt.clientY - element.offsetTop;

                const drag = (e) => {
                    e.preventDefault();
                    const moveEvt = e.touches ? e.touches[0] : e;
                    element.style.left = `${moveEvt.clientX - offsetX}px`;
                    element.style.top = `${moveEvt.clientY - offsetY}px`;
                };
                const stopDrag = () => {
                    element.style.cursor = 'move';
                    ['mousemove', 'touchmove'].forEach(evt => document.removeEventListener(evt, drag));
                    ['mouseup', 'touchend'].forEach(evt => document.removeEventListener(evt, stopDrag));
                };
                ['mousemove', 'touchmove'].forEach(evt => document.addEventListener(evt, drag));
                ['mouseup', 'touchend'].forEach(evt => document.addEventListener(evt, stopDrag));
            };
            ['mousedown', 'touchstart'].forEach(evt => element.addEventListener(evt, startDrag));

            // Lógica unificada para redimensionar
            const handle = element.querySelector('.resize-handle');
            const startResize = (e) => {
                e.preventDefault(); e.stopPropagation();
                const resize = (e) => {
                    const moveEvt = e.touches ? e.touches[0] : e;
                    const newWidth = moveEvt.clientX - element.getBoundingClientRect().left;
                    if (newWidth > 50) element.style.width = `${newWidth}px`;
                };
                const stopResize = () => {
                    ['mousemove', 'touchmove'].forEach(evt => document.removeEventListener(evt, resize));
                    ['mouseup', 'touchend'].forEach(evt => document.removeEventListener(evt, stopResize));
                };
                ['mousemove', 'touchmove'].forEach(evt => document.addEventListener(evt, resize));
                ['mouseup', 'touchend'].forEach(evt => document.addEventListener(evt, stopResize));
            };
            ['mousedown', 'touchstart'].forEach(evt => handle.addEventListener(evt, startResize));
        }

        function rotateSignature(button) {
            const wrapper = button.closest('.signature-wrapper');
            let currentRotation = parseInt(wrapper.dataset.rotation || 0);
            currentRotation = (currentRotation + 90) % 360;
            wrapper.style.transform = `rotate(${currentRotation}deg)`;
            wrapper.dataset.rotation = currentRotation;
        }

        function cloneSignature(button) {
            const originalWrapper = button.closest('.signature-wrapper');
            const imgSrc = originalWrapper.querySelector('.signature-img').src;
            const pageNum = originalWrapper.closest('.page-container').id.split('-')[1];
            addSignatureToPage(pageNum, imgSrc, false); // O clone não é "master"
        }

        // Desativa assinaturas ativas ao clicar fora
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.signature-wrapper')) {
                document.querySelectorAll('.signature-wrapper.active').forEach(el => el.classList.remove('active'));
            }
        });

        // --- 4. SALVAR O PDF ---
        async function savePDF() {
            alert("Salvando PDF... Este processo pode demorar um pouco.");
            const finalPdf = new jsPDF({ unit: 'pt', format: 'a4' });
            const pages = document.querySelectorAll('.page-container');

            for (let i = 0; i < pages.length; i++) {
                const pageContainer = pages[i];
                const originalCanvas = pageContainer.querySelector('canvas');
                const { width, height } = finalPdf.internal.pageSize;

                if (i > 0) finalPdf.addPage();
                
                // Adiciona a página original do PDF
                finalPdf.addImage(originalCanvas.toDataURL('image/png'), 'PNG', 0, 0, width, height);

                // Adiciona as assinaturas sobre a página
                const signatures = pageContainer.querySelectorAll('.signature-wrapper');
                signatures.forEach(sig => {
                    const sigImg = sig.querySelector('.signature-img');
                    const sigRect = sig.getBoundingClientRect();
                    const pageRect = pageContainer.getBoundingClientRect();
                    
                    // Converte a posição da assinatura (em pixels na tela) para pontos no PDF
                    const x = (sigRect.left - pageRect.left) * (width / pageRect.width);
                    const y = (sigRect.top - pageRect.top) * (height / pageRect.height);
                    const sigWidth = sigRect.width * (width / pageRect.width);
                    const sigHeight = sigRect.height * (height / pageRect.height);
                    const rotation = parseInt(sig.dataset.rotation || 0);

                    finalPdf.addImage(sigImg.src, 'PNG', x, y, sigWidth, sigHeight, null, 'NONE', rotation);
                });
            }
            finalPdf.save("DoksPDF-assinado.pdf");
        }
    </script>
</body>
</html>
