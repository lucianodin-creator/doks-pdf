<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Assinar PDF - DoksPDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --azul-escuro: #002147;
            --amarelo: #ffcc00;
            --fundo: #f0f2f5;
            --vermelho: #ff4d4d;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: var(--fundo); 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- BARRA SUPERIOR (HEADER) --- */
        .header {
            background-color: var(--azul-escuro);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border-bottom: 3px solid var(--amarelo);
            flex-shrink: 0;
        }

        .logo-area { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .logo-text { color: white; font-weight: bold; font-size: 18px; margin: 0; }
        .logo-text span { color: var(--amarelo); }

        .search-container { 
            flex-grow: 1; 
            max-width: 110px; /* Reduzido para evitar sobreposição */
        }
        
        .search-input {
            width: 100%;
            padding: 7px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 13px;
        }

        .btn-nav { padding: 6px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; text-decoration: none; text-transform: uppercase; }
        .btn-recentes { border: 1px solid var(--amarelo); color: var(--amarelo); }
        .btn-pro { background: var(--amarelo); color: var(--azul-escuro); }

        /* --- VIEWPORT E CENTRALIZAÇÃO --- */
        #viewport { 
            flex-grow: 1;
            display: flex;
            align-items: center; /* Centraliza verticalmente */
            justify-content: center; /* Centraliza horizontalmente */
            padding-bottom: 70px; /* Espaço para a barra inferior */
            overflow-y: auto;
        }

        #pdf-container { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 20px; 
        }

        /* --- CARD INICIAL --- */
        .card-inicial {
            background: white;
            padding: 40px 25px;
            border-radius: 24px;
            text-align: center;
            max-width: 320px;
            width: 85%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-bottom: 6px solid var(--amarelo);
        }

        .icon-box { font-size: 50px; display: block; margin-bottom: 15px; }
        .h1-card { font-size: 22px; font-weight: 900; color: var(--azul-escuro); margin-bottom: 10px; }
        .h1-card span { background: var(--azul-escuro); color: white; padding: 2px 8px; border-radius: 6px; }

        /* --- VISUALIZAÇÃO DO PDF --- */
        .page-container { position: relative; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); margin-bottom: 20px; }
        canvas { display: block; max-width: 100%; }

        /* --- ASSINATURAS --- */
        .sig-box { position: absolute; border: 1px dashed #007bff; cursor: move; }
        .sig-controls { position: absolute; top: -35px; left: 0; display: flex; gap: 5px; background: white; padding: 3px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .sig-ctrl-btn { border: none; background: #eee; padding: 5px; border-radius: 3px; cursor: pointer; font-size: 14px; }
        .resizer { position: absolute; bottom: -5px; right: -5px; width: 15px; height: 15px; background: #007bff; border-radius: 50%; }

        /* --- BARRA INFERIOR (FOOTER FIXO) --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--azul-escuro);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0;
            border-top: 2px solid var(--amarelo);
            z-index: 1000;
        }

        .nav-item {
            background: transparent;
            border: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        .nav-item span { font-size: 18px; margin-bottom: 2px; }

        /* Contador Horizontal */
        .page-counter {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--amarelo);
            font-weight: bold;
            font-size: 16px;
        }

        /* --- MODAIS --- */
        #sig-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; flex-direction: column; z-index: 2000; }
        #sig-pad { flex-grow: 1; border: 2px solid #ccc; margin: 10px; background: #fafafa; touch-action: none; }
        .modal-footer { display: flex; justify-content: space-around; padding: 15px; background: #eee; }
        .btn-modal { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; }

        #rotate-lock { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 3000; text-align: center; }
    </style>
</head>
<body>

    <header class="header">
        <a href="#" class="logo-area">
            <span style="font-size: 20px;">🏠</span>
            <h1 class="logo-text">Doks<span>PDF</span></h1>
        </a>
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Pág...">
        </div>
        <a href="#" class="btn-nav btn-recentes">RECENTES</a>
        <a href="#" class="btn-nav btn-pro">PRO</a>
    </header>

    <main id="viewport">
        <div id="pdf-container">
            <div class="card-inicial" id="card-abrir">
                <span class="icon-box">📂</span>
                <div class="h1-card">ASSINAR <span>PDF</span></div>
                <p style="color: #666; font-size: 14px;">Abra seu documento para aplicar assinaturas digitalmente.</p>
                <button onclick="triggerFileSelect()" style="background: var(--amarelo); color: var(--azul-escuro); border: none; padding: 15px 25px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 15px;">
                    📂 SELECIONAR PDF
                </button>
            </div>
        </div>
        <input type="file" id="file-selector" style="display:none" onchange="handleFile(this)" accept="application/pdf">
    </main>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="forceReset()"><span>🔄</span>ATUALIZAR</button>
        
        <div class="page-counter">
            <span id="p-cur">0</span>/ <span id="p-tot">0</span>
        </div>

        <button class="nav-item" onclick="document.getElementById('rotate-lock').style.display='flex'"><span>🖋️</span>ASSINAR</button>
        <button class="nav-item" style="color:var(--amarelo) !important;" onclick="exportPDF()"><span>💾</span>SALVAR</button>
    </nav>

    <div id="rotate-lock">
        <div style="background:white; padding:30px; border-radius:20px; width: 85%;">
            <h2>🔄 Gire o Celular</h2>
            <p>Modo paisagem é melhor para assinar.</p>
            <button onclick="openCanvas()" style="width:100%; padding:15px; background:var(--azul-escuro); color:white; border:none; border-radius:10px; font-weight:bold;">ESTOU PRONTO</button>
        </div>
    </div>

    <div id="sig-modal">
        <canvas id="sig-pad"></canvas>
        <div class="modal-footer">
            <button class="btn-modal" style="background:#ccc;" onclick="document.getElementById('sig-modal').style.display='none'">CANCELAR</button>
            <button class="btn-modal" style="background:var(--vermelho); color:white;" onclick="clearCanvas()">LIMPAR</button>
            <button class="btn-modal" style="background:#28a745; color:white;" onclick="confirmSig()">CONFIRMAR ✅</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        let mainDoc = null;

        function triggerFileSelect() { document.getElementById('file-selector').click(); }

        async function handleFile(el) {
            const file = el.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async function() {
                const loadingTask = pdfjsLib.getDocument({data: new Uint8Array(this.result)});
                mainDoc = await loadingTask.promise;
                document.getElementById('p-tot').innerText = mainDoc.numPages;
                renderPDF();
            };
            reader.readAsArrayBuffer(file);
        }

        async function renderPDF() {
            const wrap = document.getElementById('pdf-container');
            const viewportElem = document.getElementById('viewport');
            
            // Remove a centralização forçada para permitir o scroll do PDF
            viewportElem.style.alignItems = "flex-start"; 
            document.getElementById('card-abrir').style.display = 'none';
            wrap.innerHTML = "";

            for(let i=1; i<=mainDoc.numPages; i++) {
                const pg = await mainDoc.getPage(i);
                const vpOrig = pg.getViewport({scale: 1});
                const scale = (window.innerWidth / vpOrig.width) * 0.95;
                const vp = pg.getViewport({scale: scale});

                const box = document.createElement('div');
                box.className = 'page-container';
                box.id = 'page-' + i;

                const cvs = document.createElement('canvas');
                cvs.width = vp.width; cvs.height = vp.height;
                box.appendChild(cvs);
                wrap.appendChild(box);

                await pg.render({canvasContext: cvs.getContext('2d'), viewport: vp}).promise;
            }
            document.getElementById('p-cur').innerText = "1";
        }

        function openCanvas() {
            document.getElementById('rotate-lock').style.display = 'none';
            document.getElementById('sig-modal').style.display = 'flex';
            const c = document.getElementById('sig-pad');
            c.width = window.innerWidth - 20; c.height = window.innerHeight - 150;
            const ctx = c.getContext('2d');
            ctx.lineWidth = 3; ctx.lineCap = 'round';
            let drw = false;
            c.ontouchstart = e => { drw=true; ctx.beginPath(); ctx.moveTo(e.touches[0].clientX - 10, e.touches[0].clientY - 10); };
            c.ontouchmove = e => { if(drw) { ctx.lineTo(e.touches[0].clientX - 10, e.touches[0].clientY - 10); ctx.stroke(); } e.preventDefault(); };
            c.ontouchend = () => drw=false;
        }

        function clearCanvas() { const c = document.getElementById('sig-pad'); c.getContext('2d').clearRect(0, 0, c.width, c.height); }

        function confirmSig() {
            const img = document.getElementById('sig-pad').toDataURL('image/png');
            createSigBox(img);
            document.getElementById('sig-modal').style.display = 'none';
        }

        function createSigBox(imgData) {
            const el = document.createElement('div');
            el.className = 'sig-box'; el.style.top = '50px'; el.style.left = '50px'; el.style.width = '120px';
            el.innerHTML = `<div class="sig-controls">
                <button class="sig-ctrl-btn" onclick="this.closest('.sig-box').remove()">🗑️</button>
            </div><img src="${imgData}" style="width:100%;">`;
            document.querySelector('.page-container').appendChild(el);
            makeInteractable(el);
        }

        function makeInteractable(el) {
            let m = false, ox, oy;
            el.addEventListener('touchstart', e => {
                m = true; ox = e.touches[0].clientX - el.offsetLeft; oy = e.touches[0].clientY - el.offsetTop;
            });
            document.addEventListener('touchmove', e => {
                if(m) { el.style.left = (e.touches[0].clientX - ox) + 'px'; el.style.top = (e.touches[0].clientY - oy) + 'px'; }
            });
            document.addEventListener('touchend', () => m=false);
        }

        function forceReset() { window.location.reload(); }
        async function exportPDF() { alert("Processando download..."); }
    </script>
</body>
</html>
