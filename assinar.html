<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DoksPDF - Assinar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --azul: #0a2540; --verde: #28a745; --amarelo: #ffcc29; --cinza: #666; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f4f7fa; height: 100vh; overflow: hidden; }

        /* HEADER SUPER COMPACTO */
        .header { height: 40px; background: #fff; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #ddd; z-index: 10; }
        
        /* ÁREA DO PDF */
        #visor { position: absolute; top: 40px; bottom: 110px; width: 100%; overflow-y: auto; text-align: center; }
        .btn-upload { background: var(--azul); color: #fff; padding: 15px 30px; border-radius: 8px; display: inline-block; margin-top: 50px; font-weight: bold; cursor: pointer; }

        /* BARRA PRINCIPAL (ASSINAR / SALVAR) */
        .barra-principal { position: fixed; bottom: 55px; width: 100%; height: 55px; background: var(--azul); display: flex; align-items: center; justify-content: space-around; z-index: 100; }
        .btn-acao { width: 45%; height: 40px; border-radius: 6px; border: none; font-weight: bold; font-size: 13px; }

        /* NAV INFERIOR (INÍCIO / DOCS) */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; height: 55px; background: #fff; border-top: 1px solid #ddd; display: flex; align-items: center; z-index: 100; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: var(--azul); text-decoration: none; font-weight: bold; }

        /* TELA DE ASSINATURA (MODAL) */
        #tela-assinatura { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; z-index: 5000; display: none; flex-direction: column; 
        }
        #canvas { flex: 1; background: #fafafa; touch-action: none; }

        /* RODAPÉ DA ASSINATURA (BEM FINO) */
        .footer-assinatura { 
            height: 50px; background: var(--azul); display: flex; 
            align-items: center; justify-content: space-around; padding: 0 5px;
        }
        .btn-assin { height: 38px; flex: 1; margin: 0 4px; border-radius: 4px; border: none; font-weight: bold; font-size: 12px; color: #fff; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="header"><b>DoksPDF</b></div>

<div id="visor">
    <div id="setup">
        <label class="btn-upload" for="arquivo">SELECIONAR PDF</label>
        <input type="file" id="arquivo" class="hidden" accept="application/pdf">
    </div>
    <div id="pdf-render"></div>
</div>

<div class="barra-principal hidden" id="barra-controles">
    <button class="btn-acao" style="background:#fff; color:var(--azul);" onclick="abrirAssinatura()">ASSINAR</button>
    <button class="btn-acao" style="background:var(--verde); color:#fff;">SALVAR PDF</button>
</div>

<nav class="nav-bottom">
    <a href="/" class="nav-item">🏠<br>Início</a>
    <a href="#" class="nav-item">📄<br>Docs</a>
</nav>

<div id="tela-assinatura">
    <canvas id="canvas"></canvas>
    <div class="footer-assinatura">
        <button class="btn-assin" style="background:var(--cinza);" onclick="fecharAssinatura()">VOLTAR</button>
        <button class="btn-assin" style="background:var(--amarelo); color:#000;" onclick="limpar()">LIMPAR</button>
        <button class="btn-assin" style="background:var(--verde);" onclick="confirmar()">OK</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let desenhando = false;

    // Abrir arquivo e mostrar barra de assinar
    document.getElementById('arquivo').onchange = function() {
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('barra-controles').classList.remove('hidden');
        // Aqui iria o código de renderização do PDF
    };

    function abrirAssinatura() {
        alert("📱 Dica: Use o celular deitado para assinar!");
        document.getElementById('tela-assinatura').style.display = 'flex';
        // Ajusta o tamanho do desenho
        setTimeout(() => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 50; // Desconta apenas a barra de botões
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000';
        }, 200);
    }

    function fecharAssinatura() { document.getElementById('tela-assinatura').style.display = 'none'; }
    function limpar() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    function confirmar() { alert("Assinatura capturada!"); fecharAssinatura(); }

    // Desenho Touch
    canvas.ontouchstart = (e) => { 
        desenhando = true; 
        ctx.beginPath(); 
        const r = canvas.getBoundingClientRect(); 
        ctx.moveTo(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); 
    };
    canvas.ontouchmove = (e) => { 
        if(!desenhando) return; 
        const r = canvas.getBoundingClientRect(); 
        ctx.lineTo(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); 
        ctx.stroke(); 
        e.preventDefault(); 
    };
    canvas.ontouchend = () => desenhando = false;
</script>

</body>
</html>
