<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DoksPDF - Assinatura</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --azul-doks: #0a2540; --verde: #28a745; --amarelo: #ffcc29; --bg: #f4f7fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        body { background: var(--bg); height: 100vh; overflow: hidden; }

        /* HEADER */
        .header-slim {
            position: fixed; top: 0; width: 100%; height: 50px;
            background: #fff; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 1000;
        }

        /* ÁREA DO PDF */
        #visor {
            position: absolute; top: 50px; bottom: 120px; width: 100%;
            overflow-y: auto; display: flex; flex-direction: column; align-items: center;
        }

        /* BARRA DE AÇÕES (ASSINAR / SALVAR) */
        .barra-acoes {
            position: fixed; bottom: 65px; width: 100%; height: 65px;
            background: var(--azul-doks); display: flex; justify-content: space-around; align-items: center;
            padding: 0 10px; z-index: 950;
        }
        .btn-main { width: 46%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; font-size: 14px; }

        /* NAV BOTTOM (Ícones corrigidos) */
        .nav-bottom {
            position: fixed; bottom: 0; width: 100%; height: 65px;
            background: #fff; border-top: 1px solid #eee; display: flex;
            justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { color: #888; text-decoration: none; text-align: center; flex: 1; }
        .nav-item.active { color: var(--azul-doks); }
        .nav-item b { display: block; font-size: 10px; margin-top: 2px; }
        .icon-svg { width: 24px; height: 24px; fill: currentColor; }

        /* MODAL DE ASSINATURA CORRIGIDO */

<style>
    /* ... seu código anterior ... */

    /* MODAL DE ASSINATURA - CORREÇÃO DE ESPAÇO */
    #modal { 
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
        background: #fff; z-index: 3000; display: none; flex-direction: column; 
    }
    
    /* Título do Modal */
    .modal-header {
        height: 45px; display: flex; align-items: center; justify-content: center;
        background: #fff; border-bottom: 1px solid #eee; font-weight: bold; color: var(--azul-doks);
    }

    /* Quadro de desenho com limite de altura para os botões aparecerem */
    #quadro { 
        flex: 1; width: 100%; touch-action: none; background: #fafafa; 
        margin-bottom: 75px; /* ESPAÇO RESERVADO PARA OS BOTÕES */
    }

    /* RODAPÉ DO MODAL FIXO NO CHÃO */
    .modal-footer { 
        position: fixed; bottom: 0; width: 100%; height: 75px; 
        background: var(--azul-doks); display: flex; justify-content: space-around; 
        align-items: center; padding: 0 15px; border-top: 2px solid var(--amarelo);
    }
    .btn-modal { height: 48px; border-radius: 8px; border: none; font-weight: bold; font-size: 13px; flex: 1; margin: 0 5px; }
</style>

<div id="modal">
    <div class="modal-header">ASSINE NO QUADRO ABAIXO</div>
    <canvas id="quadro"></canvas>
    
    <div class="modal-footer">
        <button class="btn-modal" style="background:#666; color:#fff;" onclick="fechar()">VOLTAR</button>
        <button class="btn-modal" style="background:var(--amarelo); color:#000;" onclick="limpar()">LIMPAR</button>
        <button class="btn-modal" style="background:var(--verde); color:#fff;" onclick="colocar()">OK</button>
    </div>
</div>

    </style>
</head>
<body>

<div class="header-slim">
    <b style="color:var(--azul-doks)">DoksPDF</b>
    <span style="font-size: 10px; color: #999;">Assinatura Digital</span>
</div>

<div id="visor">
    <div id="area-sel" style="margin-top: 50px; text-align: center;">
        <label for="arquivo" style="background:var(--azul-doks); color:#fff; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; display: inline-block;">
            SELECIONAR PDF
        </label>
        <input type="file" id="arquivo" class="hidden" accept="application/pdf">
    </div>
    <div id="pdf-render"></div>
</div>

<div class="barra-acoes hidden" id="controles">
    <button class="btn-main" style="background:#fff; color:var(--azul-doks);" onclick="abrir()">ASSINAR</button>
    <button class="btn-main" style="background:var(--verde); color:#fff;" onclick="salvar()">SALVAR PDF</button>
</div>

<nav class="nav-bottom">
    <a href="/" class="nav-item">🏠<b>Início</b></a>
    <a href="#" class="nav-item active">📄<b>Docs</b></a>
    <a href="#" class="nav-item">⭐<b>Pro</b></a>
</nav>

<div id="modal">
    <div style="background:#fff; padding: 10px; text-align:center; font-weight:bold; color:var(--azul-doks); border-bottom:1px solid #eee;">
        ASSINE NO QUADRO ABAIXO
    </div>
    <canvas id="quadro"></canvas>
    <div class="modal-footer">
        <button class="btn-modal" style="background:#666; color:#fff;" onclick="fechar()">VOLTAR</button>
        <button class="btn-modal" style="background:var(--amarelo); color:#000;" onclick="limpar()">LIMPAR</button>
        <button class="btn-modal" style="background:var(--verde); color:#fff;" onclick="colocar()">OK</button>
    </div>
</div>

<script>
    const pdfJS = window['pdfjs-dist/build/pdf'];
    pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    let doc = null, q = document.getElementById('quadro'), ctx = q.getContext('2d');

    document.getElementById('arquivo').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function() {
            pdfJS.getDocument(new Uint8Array(this.result)).promise.then(p => {
                doc = p;
                document.getElementById('area-sel').classList.add('hidden');
                document.getElementById('controles').classList.remove('hidden');
                render();
            });
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    };

    async function render() {
        const area = document.getElementById('pdf-render');
        area.innerHTML = '';
        const largura = document.getElementById('visor').clientWidth;
        for(let n=1; n<=doc.numPages; n++) {
            const pg = await doc.getPage(n);
            const vp = pg.getViewport({scale: (largura * 0.95) / pg.getViewport({scale:1}).width});
            const container = document.createElement('div');
            container.style.position = 'relative'; container.style.marginBottom = '15px'; container.id = 'p'+n;
            const canv = document.createElement('canvas'); canv.height = vp.height; canv.width = vp.width;
            container.appendChild(canv); area.appendChild(container);
            await pg.render({canvasContext: canv.getContext('2d'), viewport: vp}).promise;
        }
    }

    function abrir() {
        // Alerta de rotação visível
        alert("📱 DICA: Para uma assinatura melhor, vire o celular deitado!");
        document.getElementById('modal').style.display='flex';
        // Ajusta o canvas após o modal abrir
        setTimeout(() => {
            const box = q.getBoundingClientRect();
            q.width = box.width; q.height = box.height;
            ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
        }, 300);
    }

    function fechar() { document.getElementById('modal').style.display='none'; }
    function limpar() { ctx.clearRect(0, 0, q.width, q.height); }

    let desenhando = false;
    q.ontouchstart = (e) => { desenhando=true; ctx.beginPath(); const r=q.getBoundingClientRect(); ctx.moveTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); };
    q.ontouchmove = (e) => { if(!desenhando) return; const r=q.getBoundingClientRect(); ctx.lineTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); ctx.stroke(); e.preventDefault(); };
    q.ontouchend = () => desenhando = false;

    function colocar() { /* Lógica de inserir assinatura aqui */ fechar(); }
</script>
</body>
</html>
