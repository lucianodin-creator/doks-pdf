<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Assinar PDF - DoksPDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --azul-escuro: #002147;
            --amarelo: #ffcc00;
            --fundo: #f0f2f5;
            --vermelho: #ff4d4d;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--fundo); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* --- HEADER --- */
        .header { background-color: var(--azul-escuro); padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--amarelo); flex-shrink: 0; z-index: 1001; }
        .logo-area { display: flex; align-items: center; gap: 5px; text-decoration: none; cursor: pointer; color: white; }
        .logo-text { font-weight: bold; font-size: 16px; margin: 0; }
        .logo-text span { color: var(--amarelo); }
        .search-container { flex-grow: 1; position: relative; max-width: 150px; margin: 0 10px; }
        .search-input { width: 100%; padding: 7px 10px 7px 28px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; font-size: 11px; }
        .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 12px; color: rgba(255,255,255,0.6); }
        .nav-btns-right { display: flex; gap: 5px; }
        .btn-nav { padding: 6px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; text-decoration: none; text-transform: uppercase; }
        .btn-recentes { border: 1px solid var(--amarelo); color: var(--amarelo); }
        .btn-pro { background: var(--amarelo); color: var(--azul-escuro); }

        /* --- ZOOM --- */
        .zoom-controls { position: fixed; right: 15px; top: 250px; display: flex; flex-direction: column; gap: 10px; z-index: 999; }
        .btn-zoom { width: 45px; height: 45px; background: var(--amarelo); color: var(--azul-escuro); border: none; border-radius: 8px; font-size: 24px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* --- VIEWPORT --- */
        #viewport { flex-grow: 1; overflow-y: auto; padding-bottom: 80px; display: flex; flex-direction: column; align-items: center; }
        .container-inicial { margin-top: 50px; text-align: center; width: 85%; max-width: 320px; }
        .card-inicial { background: white; padding: 40px 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-bottom: 6px solid var(--amarelo); }
        .btn-voltar-home { margin-top: 20px; color: var(--azul-escuro); font-weight: bold; cursor: pointer; background: none; border: none; }

        /* --- PDF & ASSINATURA --- */
        #pdf-container { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .page-container { position: relative; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .sig-box { position: absolute; border: 1px dashed #007bff; cursor: move; touch-action: none; width: 120px; }
        .sig-controls { position: absolute; top: -40px; left: 0; display: flex; gap: 4px; background: white; padding: 4px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .sig-ctrl-btn { border: none; background: #f0f0f0; padding: 5px; border-radius: 4px; font-size: 16px; cursor: pointer; }

        /* --- MODAL DE ASSINATURA (ESTILIZADO) --- */
        #sig-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--azul-escuro); display: none; flex-direction: column; z-index: 2000; }
        #sig-pad { flex-grow: 1; border: 4px solid var(--amarelo); margin: 20px; background: white; border-radius: 12px; touch-action: none; }
        .modal-footer { display: flex; gap: 10px; padding: 20px; background: rgba(0,0,0,0.2); }
        .btn-modal { flex: 1; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 14px; text-transform: uppercase; }

        /* --- FOOTER --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--azul-escuro); display: flex; justify-content: space-around; align-items: center; padding: 12px 0; border-top: 2px solid var(--amarelo); z-index: 1000; }
        .nav-item { background: transparent; border: none; color: white; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: bold; }
        .nav-item:disabled { opacity: 0.3; }
        .page-counter { color: var(--amarelo); font-weight: bold; font-size: 16px; }

        #rotate-lock { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 3000; color: white; text-align: center; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-area" onclick="goHome()">
            <span style="font-size: 20px;">🏠</span>
            <h1 class="logo-text">Doks<span>PDF</span></h1>
        </div>
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" placeholder="Buscar ferramentas">
        </div>
        <div class="nav-btns-right">
            <a href="#" class="btn-nav btn-recentes">RECENTES</a>
            <a href="#" class="btn-nav btn-pro">PRO</a>
        </div>
    </header>

    <div class="zoom-controls">
        <button class="btn-zoom" onclick="changeZoom(0.1)">+</button>
        <button class="btn-zoom" onclick="changeZoom(-0.1)">-</button>
    </div>

    <main id="viewport">
        <div id="pdf-container">
            <div class="container-inicial" id="card-abrir">
                <div class="card-inicial">
                    <span class="icon-box">📂</span>
                    <div class="h1-card">ASSINAR <span>PDF</span></div>
                    <p style="color: #666; font-size: 14px;">Abra seu documento para aplicar assinaturas digitalmente.</p>
                    <button onclick="triggerFileSelect()" style="background: var(--amarelo); color: var(--azul-escuro); border: none; padding: 15px 25px; border-radius: 12px; font-weight: 900; width: 100%; margin-top: 15px;">📂 SELECIONAR PDF</button>
                </div>
                <button class="btn-voltar-home" onclick="goHome()">← Voltar página inicial</button>
            </div>
        </div>
        <input type="file" id="file-selector" style="display:none" onchange="handleFile(this)" accept="application/pdf">
    </main>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.reload()"><span>🔄</span>ATUALIZAR</button>
        <div class="page-counter"><span id="p-cur">0</span>/ <span id="p-tot">0</span></div>
        <button class="nav-item" id="btn-assinar" onclick="document.getElementById('rotate-lock').style.display='flex'" disabled><span>🖋️</span>ASSINAR</button>
        <button class="nav-item" id="btn-salvar" style="color:var(--amarelo) !important;" onclick="exportPDF()" disabled><span>💾</span>SALVAR</button>
    </nav>

    <div id="rotate-lock">
        <div style="background:white; padding:30px; border-radius:20px; width: 85%; color: black;">
            <h2>🔄 Gire o Celular</h2>
            <p>Melhor performance no modo horizontal.</p>
            <button onclick="openCanvas()" style="width:100%; padding:15px; background:var(--azul-escuro); color:white; border:none; border-radius:10px; font-weight:bold;">ESTOU PRONTO</button>
        </div>
    </div>

    <div id="sig-modal">
        <canvas id="sig-pad"></canvas>
        <div class="modal-footer">
            <button class="btn-modal" style="background:#eee; color:#333;" onclick="document.getElementById('sig-modal').style.display='none'">CANCELAR</button>
            <button class="btn-modal" style="background:var(--vermelho); color:white;" onclick="clearCanvas()">LIMPAR</button>
            <button class="btn-modal" style="background:#28a745; color:white;" onclick="confirmSig()">CONFIRMAR ✅</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        let mainDoc = null;
        let pdfScale = 1.0;

        function goHome() { window.location.href = "https://dokspdf.vercel.app"; }
        function triggerFileSelect() { document.getElementById('file-selector').click(); }
        function changeZoom(delta) { if(!mainDoc) return; pdfScale = Math.min(Math.max(0.5, pdfScale + delta), 3.0); renderPDF(); }

        async function handleFile(el) {
            const file = el.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async function() {
                const loadingTask = pdfjsLib.getDocument({data: new Uint8Array(this.result)});
                mainDoc = await loadingTask.promise;
                document.getElementById('p-tot').innerText = mainDoc.numPages;
                document.getElementById('btn-assinar').disabled = false;
                document.getElementById('btn-salvar').disabled = false;
                renderPDF();
            };
            reader.readAsArrayBuffer(file);
        }

        async function renderPDF() {
            const wrap = document.getElementById('pdf-container');
            document.getElementById('card-abrir').style.display = 'none';
            wrap.innerHTML = "";
            for(let i=1; i<=mainDoc.numPages; i++) {
                const pg = await mainDoc.getPage(i);
                const vpOrig = pg.getViewport({scale: 1});
                const baseScale = (window.innerWidth / vpOrig.width) * 0.95;
                const vp = pg.getViewport({scale: baseScale * pdfScale});
                const box = document.createElement('div');
                box.className = 'page-container';
                box.id = 'page-' + i;
                const cvs = document.createElement('canvas');
                cvs.width = vp.width; cvs.height = vp.height;
                box.appendChild(cvs);
                wrap.appendChild(box);
                await pg.render({canvasContext: cvs.getContext('2d'), viewport: vp}).promise;
            }
            document.getElementById('p-cur').innerText = "1";
        }

        function openCanvas() {
            document.getElementById('rotate-lock').style.display = 'none';
            document.getElementById('sig-modal').style.display = 'flex';
            const c = document.getElementById('sig-pad');
            c.width = c.offsetWidth; c.height = c.offsetHeight;
            const ctx = c.getContext('2d');
            ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
            let drw = false;
            const getXY = e => { 
                const rect = c.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;
                return [touch.clientX - rect.left, touch.clientY - rect.top];
            };
            c.ontouchstart = e => { drw=true; ctx.beginPath(); ctx.moveTo(...getXY(e)); e.preventDefault(); };
            c.ontouchmove = e => { if(drw) { ctx.lineTo(...getXY(e)); ctx.stroke(); } e.preventDefault(); };
            c.ontouchend = () => drw=false;
        }

        function clearCanvas() { const c = document.getElementById('sig-pad'); c.getContext('2d').clearRect(0, 0, c.width, c.height); }

        function confirmSig() {
            const img = document.getElementById('sig-pad').toDataURL('image/png');
            createSigBox(img, 1); // Adiciona na página atual (1 por padrão)
            document.getElementById('sig-modal').style.display = 'none';
        }

        function createSigBox(imgData, pageNum) {
            const el = document.createElement('div');
            el.className = 'sig-box';
            el.style.top = '100px'; el.style.left = '50px';
            el.dataset.rotation = 0;
            
            el.innerHTML = `
                <div class="sig-controls">
                    <button class="sig-ctrl-btn" onclick="this.closest('.sig-box').remove()">🗑️</button>
                    <button class="sig-ctrl-btn" onclick="rotateSig(this)">🔄</button>
                    <button class="sig-ctrl-btn" onclick="cloneSig(this)">📋</button>
                </div>
                <img src="${imgData}" style="width:100%; display:block; transition: transform 0.2s;">
            `;
            document.getElementById('page-' + pageNum).appendChild(el);
            makeInteractable(el);
        }

        function rotateSig(btn) {
            const box = btn.closest('.sig-box');
            const img = box.querySelector('img');
            let rot = (parseInt(box.dataset.rotation) || 0) + 90;
            box.dataset.rotation = rot;
            img.style.transform = `rotate(${rot}deg)`;
        }

        function cloneSig(btn) {
            const box = btn.closest('.sig-box');
            const imgData = box.querySelector('img').src;
            const top = box.style.top;
            const left = box.style.left;
            const rot = box.dataset.rotation;

            for(let i=1; i<=mainDoc.numPages; i++) {
                if(document.getElementById('page-' + i).contains(box)) continue; // Pula a página onde já está
                
                const clone = document.createElement('div');
                clone.className = 'sig-box';
                clone.style.top = top; clone.style.left = left;
                clone.dataset.rotation = rot;
                clone.innerHTML = box.innerHTML;
                clone.querySelector('img').style.transform = `rotate(${rot}deg)`;
                
                document.getElementById('page-' + i).appendChild(clone);
                makeInteractable(clone);
            }
            alert("Assinatura clonada em todas as folhas!");
        }

        function makeInteractable(el) {
            let m = false, ox, oy;
            el.addEventListener('touchstart', e => {
                m = true; 
                const touch = e.touches[0];
                ox = touch.clientX - el.offsetLeft;
                oy = touch.clientY - el.offsetTop;
            });
            document.addEventListener('touchmove', e => {
                if(m) {
                    const touch = e.touches[0];
                    el.style.left = (touch.clientX - ox) + 'px';
                    el.style.top = (touch.clientY - oy) + 'px';
                }
            }, {passive: false});
            document.addEventListener('touchend', () => m=false);
        }

        async function exportPDF() { alert("Processando documento..."); }
    </script>
</body>
</html>
