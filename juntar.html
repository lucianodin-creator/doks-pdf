<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Juntar PDF - DoksPDF</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<style>

    /* --- PADRONIZAÇÃO DO HEADER DOKSPDF --- */
    header {
        background-color: #0a2540; /* Azul escuro oficial */
        padding: 10px 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 3px solid #ffcc29; /* Amarelo oficial */
        height: 60px;
        box-sizing: border-box;
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        min-width: fit-content;
    }

    .brand-text {
        color: #ffffff;
        font-weight: 700;
        font-size: 18px;
        text-transform: none;
    }

    .pdf-txt { 
        color: #ffcc29; 
        margin-left: 2px; 
    }

    /* --- CAMPO DE BUSCA PADRONIZADO --- */
    .search-container {
        flex-grow: 1;
        max-width: 400px; /* Limite de largura para não esticar demais no desktop */
        position: relative;
        display: flex;
        align-items: center;
    }

    .search-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.15); /* Fundo sutilmente claro */
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        padding: 8px 12px 8px 35px; /* Espaço para a lupa */
        color: white;
        font-size: 14px;
        outline: none;
        transition: 0.3s;
    }

    .search-input:focus {
        background: rgba(255, 255, 255, 0.25);
        border-color: #ffcc29;
    }

    .search-input::placeholder {
        color: rgba(255, 255, 255, 0.6);
    }

    .search-icon {
        position: absolute;
        left: 12px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
        pointer-events: none;
    }

    /* --- BOTÕES --- */
    .header-actions {
        display: flex;
        gap: 8px;
    }

    .btn-header {
        border: none;
        border-radius: 6px;
        padding: 6px 12px;
        font-weight: 700;
        font-size: 11px;
        cursor: pointer;
        text-transform: uppercase;
        white-space: nowrap;
    }

    .btn-recentes {
        background: #0a2540;
        color: #ffcc29;
        border: 1px solid #ffcc29;
    }

    .btn-pro {
        background: #ffcc29;
        color: #0a2540;
    }

    /* Ajuste para telas muito pequenas (celulares antigos) */
    @media (max-width: 360px) {
        .brand-text { font-size: 14px; }
        .btn-header { padding: 5px 8px; font-size: 10px; }
    }

/* --- CONTEÚDO CENTRAL (CARD) --- */
.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.card {
    background: var(--branco);
    padding: 60px 30px; /* Padding igual ao Assinar */
    border-radius: 30px; /* Arredondamento padronizado */
    width: 100%;
    max-width: 420px;
    text-align: center;
    /* Efeito de profundidade amarela idêntico ao Assinar */
    box-shadow: 0 15px 35px rgba(0,0,0,0.1), 0 4px 0 var(--amarelo);
    position: relative;
}

.icon-box {
    font-size: 65px;
    margin-bottom: 20px;
    display: block;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
}

h1 { font-size: 20px; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; }
h1 span { color: var(--amarelo); background: var(--azul); padding: 0 6px; border-radius: 4px; }
p { font-size: 13px; color: #666; margin-bottom: 25px; font-weight: 500; }

/* --- INPUT E BOTÃO --- */
.file-label { 
    background: #f8f9fa; 
    border: 2px dashed #ccc; 
    padding: 25px; 
    display: block; 
    border-radius: 15px; 
    cursor: pointer; 
    margin-bottom: 20px; 
    transition: 0.2s;
    font-weight: bold;
    font-size: 14px;
}

input[type="file"] { display: none !important; }

.btn-merge { 
    background: var(--amarelo); /* Agora é AMARELO igual ao Assinar */
    color: var(--azul); 
    border: none; 
    padding: 18px; 
    width: 100%; 
    border-radius: 15px; 
    font-weight: 900; 
    font-size: 16px; 
    cursor: pointer; 
    transition: 0.2s; 
    text-transform: uppercase; 
}

.btn-merge:active { transform: scale(0.96); }

/* --- RODAPÉ --- */
.btn-voltar {
    margin-top: 25px;
    text-decoration: none;
    color: #666;
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
    display: block;
}

/* LOADER */
#loader { display: none; position: fixed; inset: 0; background: rgba(10, 37, 64, 0.95); z-index: 2000; color: #fff; flex-direction: column; align-items: center; justify-content: center; }
.spinner { width: 40px; height: 40px; border: 4px solid var(--amarelo); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
@keyframes spin { to { transform: rotate(360deg); } }


</style>

</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p style="font-weight: 900; letter-spacing: 1px;">UNINDO ARQUIVOS...</p>
    </div>

<header>
    <div class="brand" onclick="location.href='index.html'">
        <div class="brand-text">Doks<span class="pdf-txt">PDF</span></div>
    </div>

    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" placeholder="Buscar ferramenta...">
    </div>

    <div class="header-actions">
        <button class="btn-header btn-recentes">RECENTES</button>
        <button class="btn-header btn-pro">PRO</button>
    </div>
</header>

    <main class="main-content">
        <div class="card">
            <span class="icon-box">📂</span>
            <h1>JUNTAR <span>PDF</span></h1>
            <p>Selecione 2 ou mais arquivos para unir em um único PDF.</p>
            <label for="pdf-inputs" class="file-label" id="label-text">
                <span style="font-size: 12px; font-weight: bold; color: var(--azul);">Clique para selecionar</span>
            </label>
            <input type="file" id="pdf-inputs" multiple accept="application/pdf" onchange="updateLabel()">
            <button class="btn-merge" onclick="mergeFiles()">UNIR E BAIXAR</button>
        </div>
        <a href="javascript:void(0)" onclick="irParaHome()" style="margin-top: 25px; text-decoration:none; color:#666; font-size:12px; font-weight:900;">← VOLTAR AO INÍCIO</a>
    </main>

    <script>
        // Função para voltar à home com limpeza de cache (Resolve o problema do seu Chrome)
        function irParaHome() {
            const urlHome = window.location.origin + "/";
            window.location.replace(urlHome);
        }

        function updateLabel() {
            const input = document.getElementById('pdf-inputs');
            const label = document.getElementById('label-text');
            if(input.files.length > 0) {
                label.innerHTML = `<span style="color:var(--verde)">● ${input.files.length} arquivos selecionados</span>`;
                label.style.borderColor = "var(--verde)";
            }
        }

        async function mergeFiles() {
            const files = document.getElementById('pdf-inputs').files;
            if (files.length < 2) return alert("Por favor, selecione pelo menos 2 arquivos PDF.");

            const loader = document.getElementById('loader');
            loader.style.display = 'flex';

            try {
                const mergedPdf = await PDFLib.PDFDocument.create();

                for (const file of files) {
                    const bytes = await file.arrayBuffer();
                    const pdf = await PDFLib.PDFDocument.load(bytes);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                }

                const pdfBytes = await mergedPdf.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                
                // Download seguro para Chrome Mobile
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `DoksPDF_Unido_${Date.now()}.pdf`;
                document.body.appendChild(link);
                link.click();
                
                setTimeout(() => {
                    link.remove();
                    URL.revokeObjectURL(url);
                }, 500);

            } catch (e) {
                alert("Erro ao processar arquivos: " + e.message);
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
