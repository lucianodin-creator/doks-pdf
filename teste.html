<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MeuPDF - Assinatura Digital</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* Bloco Base de Configurações */
        :root {
            --cor-primaria: #000000;
            --cor-secundaria: #ffffff;
            --cor-sucesso: #28a745;
            --cor-perigo: #dc3545;
            --cor-fundo: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background: var(--cor-fundo); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        /* Layout de Barras Estilo Doks */
        .barra-topo { 
            position: fixed; top: 0; left: 0; width: 100%; height: 60px; 
            background: var(--cor-primaria); color: var(--cor-secundaria); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; letter-spacing: 2px; z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        
        .barra-base { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; 
            background: var(--cor-primaria); display: flex; justify-content: space-around; 
            align-items: center; z-index: 100; border-top: 1px solid #444; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* Visor de PDF */
        #visor { 
            position: absolute; top: 60px; bottom: 85px; width: 100%; 
            overflow-y: auto; display: flex; flex-direction: column; 
            align-items: center; padding: 15px 0; -webkit-overflow-scrolling: touch; 
        }
        
        #pdf-render { display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        .page-c { 
            position: relative; margin-bottom: 25px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.6); 
            background: #fff; line-height: 0; 
        }

        /* Botões Estilizados */
        .btn { 
            background: var(--cor-secundaria); color: var(--cor-primaria); 
            padding: 18px; font-weight: bold; border: none; 
            width: 44%; border-radius: 8px; font-size: 14px;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.96); }
        .btn-acao { background: var(--cor-sucesso); color: var(--cor-secundaria); }

        /* Elementos da Assinatura no PDF */
        .sig-wrapper { position: absolute; z-index: 150; touch-action: none; border: 1px dashed var(--cor-perigo); }
        .sig-img { width: 100%; height: 100%; pointer-events: none; }
        
        .sig-tools { 
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 8px; background: rgba(0,0,0,0.85); 
            padding: 8px; border-radius: 8px; 
        }
        
        .tool-btn { 
            background: #fff; border: none; font-size: 12px; 
            padding: 8px 10px; border-radius: 5px; font-weight: bold; 
        }

        .resizer { 
            width: 25px; height: 25px; background: var(--cor-perigo); 
            position: absolute; right: -12px; bottom: -12px; 
            border-radius: 50%; border: 3px solid #fff; 
        }

        /* Janela de Assinatura (Modal) */
        #modal { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #fff; z-index: 2000; display: none; flex-direction: column; 
        }
        
        #quadro { 
            flex: 1; border: 2px dashed var(--cor-primaria); 
            margin: 15px; touch-action: none; background: #fdfdfd; 
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="barra-topo">MEUPDF - ASSINATURA</div>

<div id="visor">
    <div id="area-sel" style="padding: 30px; text-align: center;">
        <label for="arquivo" style="color: white; border: 2px dashed white; padding: 20px; display: block; border-radius: 10px;">
            CLIQUE PARA SELECIONAR PDF
        </label>
        <input type="file" id="arquivo" class="hidden" accept="application/pdf">
    </div>
    <div id="pdf-render"></div>
</div>

<div class="barra-base">
    <button class="btn" onclick="abrir()">ASSINAR</button>
    <button class="btn btn-acao" onclick="salvar()">SALVAR PDF</button>
</div>

<div id="modal">
    <div class="barra-topo">ASSINE ABAIXO (DEITE O CELULAR)</div>
    <canvas id="quadro"></canvas>
    <div class="barra-base">
        <button class="btn" style="background: var(--cor-perigo); color: #fff;" onclick="fechar()">CANCELAR</button>
        <button class="btn" style="background: #666; color: #fff; width: 20%;" onclick="limpar()">LIMPAR</button>
        <button class="btn btn-acao" style="width: 30%;" onclick="colocar()">OK</button>
    </div>
</div>

<script>
    const pdfJS = window['pdfjs-dist/build/pdf'];
    pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    
    let doc = null, q = document.getElementById('quadro'), ctx = q.getContext('2d');

    // Carregamento de Arquivo
    document.getElementById('arquivo').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function() {
            pdfJS.getDocument(new Uint8Array(this.result)).promise.then(p => { 
                doc = p; 
                document.getElementById('area-sel').classList.add('hidden'); 
                render(); 
            });
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    };

    // Renderização com Memória de Assinaturas (Anti-Giro)
    async function render() {
        const area = document.getElementById('pdf-render');
        const salvas = Array.from(document.querySelectorAll('.sig-wrapper')).map(s => ({
            src: s.querySelector('img').src, top: s.style.top, left: s.style.left,
            w: s.style.width, h: s.style.height, p: s.parentElement.id, rot: s.querySelector('img').style.transform
        }));

        area.innerHTML = '';
        if(!doc) return;
        const largura = document.getElementById('visor').clientWidth;

        for(let n=1; n<=doc.numPages; n++) {
            const pg = await doc.getPage(n);
            const vpOrig = pg.getViewport({scale: 1});
            const escala = (largura * 0.95) / vpOrig.width;
            const vp = pg.getViewport({scale: escala});
            
            const container = document.createElement('div');
            container.className = 'page-c'; container.id = 'p'+n;
            const canv = document.createElement('canvas');
            canv.height = vp.height; canv.width = vp.width;
            container.appendChild(canv); area.appendChild(container);
            await pg.render({canvasContext: canv.getContext('2d'), viewport: vp}).promise;

            // Reposicionar assinaturas
            salvas.filter(s => s.p === 'p'+n).forEach(s => {
                const ns = criarSig(s.src, n);
                ns.style.top = s.top; ns.style.left = s.left;
                ns.style.width = s.w; ns.style.height = s.h;
                ns.querySelector('img').style.transform = s.rot;
            });
        }
    }

    window.addEventListener('resize', () => { if(doc && modal.style.display !== 'flex') render(); });

    // Funções do Modal
    function abrir() { 
        if(!doc) return alert("Por favor, selecione um PDF primeiro."); 
        if(window.innerHeight > window.innerWidth) alert("Dica: Vire o celular para assinar com mais espaço!");
        document.getElementById('modal').style.display='flex'; 
        setTimeout(() => { q.width = q.offsetWidth; q.height = q.offsetHeight; ctx.lineWidth = 3; ctx.lineCap = 'round'; }, 150); 
    }
    
    function fechar() { document.getElementById('modal').style.display='none'; limpar(); }
    function limpar() { ctx.clearRect(0,0,q.width,q.height); }

    // Desenho no Quadro
    let desenhando = false;
    q.ontouchstart = (e) => { desenhando=true; ctx.beginPath(); const r=q.getBoundingClientRect(); ctx.moveTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); };
    q.ontouchmove = (e) => { if(!desenhando) return; const r=q.getBoundingClientRect(); ctx.lineTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); ctx.stroke(); e.preventDefault(); };
    q.ontouchend = () => desenhando = false;

    // Lógica da Assinatura (Trim e Create)
    function colocar() {
        const imgTrimmed = trimCanvas(q);
        criarSig(imgTrimmed, 1);
        fechar();
    }

    function trimCanvas(c) {
        const context = c.getContext('2d'), data = context.getImageData(0,0,c.width,c.height).data;
        let minX=c.width, minY=c.height, maxX=0, maxY=0;
        for(let y=0; y<c.height; y++) {
            for(let x=0; x<c.width; x++) {
                if(data[(y*c.width+x)*4+3] > 0) {
                    if(x<minX) minX=x; if(x>maxX) maxX=x; if(y<minY) minY=y; if(y>maxY) maxY=y;
                }
            }
        }
        const t = document.createElement('canvas');
        t.width = (maxX-minX)+20; t.height = (maxY-minY)+20;
        t.getContext('2d').drawImage(c, minX-10, minY-10, t.width, t.height, 0,0, t.width, t.height);
        return t.toDataURL();
    }

    function criarSig(src, pNum) {
        const w = document.createElement('div');
        w.className = 'sig-wrapper'; w.style.width = '140px'; w.style.height = 'auto'; w.style.left = '30px'; w.style.top = '30px';
        w.innerHTML = `
            <div class="sig-tools">
                <button class="tool-btn" onclick="clonar(this)">CLONAR</button>
                <button class="tool-btn" onclick="girar(this)">🔄</button>
                <button class="tool-btn" style="color:red" onclick="this.parentElement.parentElement.remove()">🗑️</button>
            </div>
            <img src="${src}" class="sig-img" data-rot="0">
            <div class="resizer"></div>
        `;
        
        configurarTouch(w, pNum);
        document.getElementById('p'+pNum).appendChild(w);
        return w;
    }

    function configurarTouch(w, pNum) {
        let resizing = false, sX, sY, sW, sH;
        w.addEventListener('touchstart', (e) => {
            if(e.target.className === 'resizer') { resizing=true; sX=e.touches[0].clientX; sY=e.touches[0].clientY; sW=w.offsetWidth; sH=w.offsetHeight; e.stopPropagation(); }
        });
        w.addEventListener('touchmove', (e) => {
            const r = document.getElementById('p'+pNum).getBoundingClientRect(), t = e.touches[0];
            if(resizing) {
                w.style.width = (sW + (t.clientX - sX)) + 'px';
                w.style.height = (sH + (t.clientY - sY)) + 'px';
            } else {
                w.style.left = (t.clientX - r.left - (w.offsetWidth/2)) + 'px';
                w.style.top = (t.clientY - r.top - (w.offsetHeight/2)) + 'px';
            }
            e.preventDefault();
        }, {passive: false});
        w.addEventListener('touchend', () => resizing = false);
    }

    function girar(btn) {
        const img = btn.parentElement.parentElement.querySelector('img');
        let rot = parseInt(img.getAttribute('data-rot')) + 90;
        img.style.transform = `rotate(${rot}deg)`;
        img.setAttribute('data-rot', rot);
    }

    function clonar(btn) {
        const o = btn.parentElement.parentElement, src = o.querySelector('img').src;
        const rot = o.querySelector('img').style.transform;
        for(let i=2; i<=doc.numPages; i++) {
            const n = criarSig(src, i);
            n.style.width = o.style.width; n.style.height = o.style.height;
            n.style.top = o.style.top; n.style.left = o.style.left;
            n.querySelector('img').style.transform = rot;
        }
    }

    // Salvar PDF Final
    async function salvar() {
        if(!doc) return;
        const { jsPDF } = window.jspdf, pdf = new jsPDF('p', 'mm', 'a4');
        const conts = document.querySelectorAll('.page-c');
        for(let i=0; i<conts.length; i++) {
            if(i>0) pdf.addPage();
            const c = conts[i], canv = c.querySelector('canvas');
            pdf.addImage(canv.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 210, 297);
            c.querySelectorAll('.sig-wrapper').forEach(s => {
                const img = s.querySelector('img'), r = c.getBoundingClientRect(), sR = s.getBoundingClientRect();
                const rot = parseInt(img.getAttribute('data-rot') || 0);
                pdf.addImage(img.src, 'PNG', ((sR.left-r.left)*210)/r.width, ((sR.top-r.top)*297)/r.height, (sR.width*210)/r.width, (sR.height*297)/r.height, null, null, rot);
            });
        }
        pdf.save("documento_assinado.pdf");
    }
</script>
</body>
</html>
