<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Imagem para PDF - DoksPDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --azul: #0a2540; 
            --amarelo: #ffcc29; 
            --fundo: #dee2e6; 
        }

        body { 
            font-family: sans-serif; 
            background: var(--fundo); 
            color: var(--azul); 
            margin: 0; 
            padding: 0; 
        }

        /* --- BARRA SUPERIOR COMPLETA (PADRÃO JUNTAR PDF) --- */
        header {
            background-color: var(--azul);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content:间-between;
            gap: 10px;
            border-bottom: 3px solid var(--amarelo);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            min-width: fit-content;
        }

        .home-icon {
            font-size: 20px;
            display: flex;
            align-items: center;
        }

        .brand-text {
            color: #ffffff;
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
        }

        .pdf-txt {
            color: var(--amarelo);
            margin-left: 4px;
        }

        /* --- CAMPO DE BUSCA --- */
        .search-container {
            flex-grow: 1;
            max-width: 300px;
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            padding: 8px 10px 8px 30px;
            color: white;
            font-size: 14px;
        }

        .search-input::placeholder { color: #aaa; }

        .search-icon {
            position: absolute;
            left: 10px;
            color: #aaa;
            font-size: 14px;
        }

        /* --- BOTÕES DE AÇÃO --- */
        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn-header {
            border: none;
            border-radius: 4px;
            padding: 6px 10px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-recentes {
            background: var(--amarelo);
            color: var(--azul);
        }

        .btn-pro {
            background: var(--amarelo);
            color: var(--azul);
        }

        /* --- CARD DE CONTEÚDO --- */
        .card { 
            background: white; 
            padding: 40px 25px; 
            border-radius: 24px; 
            border-bottom: 6px solid var(--amarelo); 
            max-width: 380px; 
            margin: 40px auto; 
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .card img {
            width: 75px;
            margin-bottom: 15px;
        }

        h1 { font-size: 22px; margin-bottom: 10px; text-transform: uppercase; }
        
        .destaque-pdf {
            color: white;
            background: var(--azul);
            padding: 2px 8px;
            border-radius: 6px;
        }

        .btn-gerar { 
            background: var(--amarelo); 
            color: var(--azul); 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 12px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase;
            margin-top: 25px;
            font-size: 16px;
        }

        .link-voltar {
            text-decoration: none; 
            color: #777; 
            font-size: 12px; 
            font-weight: 900; 
            text-transform: uppercase; 
            display: block; 
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand" onclick="irParaHome()">
            <div class="home-icon">🏠</div>
            <div class="brand-text">Doks<span class="pdf-txt">PDF</span></div>
        </div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" placeholder="Buscar ferramenta...">
        </div>

        <div class="header-actions">
            <button class="btn-header btn-recentes">RECENTES</button>
            <button class="btn-header btn-pro">PRO</button>
        </div>
    </header>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/3342/3342137.png" alt="Conversor">
        <h1>IMAGEM P/ <span class="destaque-pdf">PDF</span></h1>
        <p style="font-size: 14px; color: #666;">Converta suas fotos em um documento PDF profissional rapidamente.</p>
        
        <input type="file" id="img-input" multiple accept="image/*" style="margin: 20px 0; width: 100%;">
        
        <button class="btn-gerar" onclick="convertImage()">GERAR PDF</button>
    </div>

    <a href="javascript:void(0)" onclick="irParaHome()" class="link-voltar">← VOLTAR AO INÍCIO</a>

    <script>
        function irParaHome() { window.location.href = "index.html"; }

        async function convertImage() {
            const { jsPDF } = window.jspdf;
            const files = document.getElementById('img-input').files;
            if (files.length === 0) return alert("Selecione ao menos uma imagem.");
            const doc = new jsPDF();
            for (let i = 0; i < files.length; i++) {
                const imgData = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(files[i]);
                });
                if (i > 0) doc.addPage();
                doc.addImage(imgData, 'JPEG', 10, 10, 190, 0);
            }
            doc.save("DoksPDF_Imagens.pdf");
        }
    </script>
</body>
</html>
