<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Imagem para PDF - DoksPDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>

    /* --- PADRONIZAÇÃO DO HEADER DOKSPDF --- */
    header {
        background-color: #0a2540; /* Azul escuro oficial */
        padding: 10px 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 3px solid #ffcc29; /* Amarelo oficial */
        height: 60px;
        box-sizing: border-box;
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        min-width: fit-content;
    }

    .brand-text {
        color: #ffffff;
        font-weight: 700;
        font-size: 18px;
        text-transform: none;
    }

    .pdf-txt { 
        color: #ffcc29; 
        margin-left: 2px; 
    }

    /* --- CAMPO DE BUSCA PADRONIZADO --- */
    .search-container {
        flex-grow: 1;
        max-width: 400px; /* Limite de largura para não esticar demais no desktop */
        position: relative;
        display: flex;
        align-items: center;
    }

    .search-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.15); /* Fundo sutilmente claro */
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        padding: 8px 12px 8px 35px; /* Espaço para a lupa */
        color: white;
        font-size: 14px;
        outline: none;
        transition: 0.3s;
    }

    .search-input:focus {
        background: rgba(255, 255, 255, 0.25);
        border-color: #ffcc29;
    }

    .search-input::placeholder {
        color: rgba(255, 255, 255, 0.6);
    }

    .search-icon {
        position: absolute;
        left: 12px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
        pointer-events: none;
    }

    /* --- BOTÕES --- */
    .header-actions {
        display: flex;
        gap: 8px;
    }

    .btn-header {
        border: none;
        border-radius: 6px;
        padding: 6px 12px;
        font-weight: 700;
        font-size: 11px;
        cursor: pointer;
        text-transform: uppercase;
        white-space: nowrap;
    }

    .btn-recentes {
        background: #0a2540;
        color: #ffcc29;
        border: 1px solid #ffcc29;
    }

    .btn-pro {
        background: #ffcc29;
        color: #0a2540;
    }

    /* Ajuste para telas muito pequenas (celulares antigos) */
    @media (max-width: 360px) {
        .brand-text { font-size: 14px; }
        .btn-header { padding: 5px 8px; font-size: 10px; }
    }

        /* --- CARD PADRONIZADO (SIMETRIA TOTAL) --- */
        .card {
            background: white;
            padding: 30px 25px;
            border-radius: 24px;
            border-bottom: 6px solid var(--amarelo);
            max-width: 360px; /* Largura padrão */
            height: 480px;    /* ALTURA FIXA PARA IGUALAR OS CARDS */
            margin: 40px auto;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Distribui o conteúdo igualmente */
            box-sizing: border-box;
        }

        .card-top img {
            width: 80px;
            margin-bottom: 10px;
        }

        h1 { font-size: 20px; margin: 10px 0; text-transform: uppercase; }
        .destaque-pdf { color: white; background: var(--azul); padding: 2px 8px; border-radius: 6px; }
        
        /* Descrição com altura fixa para não empurrar o resto */
        .desc { font-size: 14px; color: #666; height: 40px; margin-bottom: 10px; }

        /* --- ÁREA DE SELEÇÃO --- */
        .file-drop-area {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 80px; /* Altura fixa da área de clique */
            border: 2px dashed #ccc;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .file-drop-area:hover { border-color: var(--amarelo); }
        .file-msg { font-size: 14px; font-weight: 700; color: var(--azul); }
        #img-input { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .btn-gerar {
            background: var(--amarelo);
            color: var(--azul);
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 16px;
        }

        .link-voltar {
            text-decoration: none;
            color: #777;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            display: block;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <div class="brand" onclick="location.href='index.html'">
        <div class="brand-text">Doks<span class="pdf-txt">PDF</span></div>
    </div>

    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" placeholder="Buscar ferramenta...">
    </div>

    <div class="header-actions">
        <button class="btn-header btn-recentes">RECENTES</button>
        <button class="btn-header btn-pro">PRO</button>
    </div>
</header>

    <div class="card">
        <div class="card-top">
            <img src="https://cdn-icons-png.flaticon.com/512/3342/3342137.png" alt="Icon">
            <h1>IMAGEM P/ <span class="destaque-pdf">PDF</span></h1>
            <p class="desc">Converta fotos em um documento PDF profissional rapidamente.</p>
        </div>

        <div class="file-drop-area">
            <span class="file-msg" id="file-label">Clique para selecionar fotos</span>
            <input type="file" id="img-input" multiple accept="image/*" onchange="updateLabel()">
        </div>

        <div class="card-bottom">
            <button class="btn-gerar" onclick="convertImage()">GERAR PDF</button>
        </div>
    </div>

    <a href="javascript:void(0)" onclick="irParaHome()" class="link-voltar">← VOLTAR AO INÍCIO</a>

    <script>
        function irParaHome() { window.location.href = "index.html"; }
        function updateLabel() {
            const input = document.getElementById('img-input');
            const label = document.getElementById('file-label');
            if (input.files.length > 0) {
                label.innerText = input.files.length + (input.files.length > 1 ? " fotos selecionadas" : " foto selecionada");
            }
        }
        async function convertImage() {
            const { jsPDF } = window.jspdf;
            const files = document.getElementById('img-input').files;
            if (files.length === 0) return alert("Selecione fotos primeiro.");
            const doc = new jsPDF();
            for (let i = 0; i < files.length; i++) {
                const imgData = await new Promise(r => {
                    const fr = new FileReader();
                    fr.onload = (e) => r(e.target.result);
                    fr.readAsDataURL(files[i]);
                });
                if (i > 0) doc.addPage();
                doc.addImage(imgData, 'JPEG', 10, 10, 190, 0);
            }
            doc.save("DoksPDF_Imagens.pdf");
        }
    </script>
</body>
</html>
