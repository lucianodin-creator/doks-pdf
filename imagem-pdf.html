<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Imagem para PDF - DokksPDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --azul: #0a2540; 
            --amarelo: #ffcc29; 
            --fundo: #dee2e6; 
        }

        body { 
            font-family: sans-serif; 
            background: var(--fundo); 
            color: var(--azul); 
            margin: 0; 
            padding: 0; 
        }

        /* --- BARRA SUPERIOR PADRONIZADA --- */
        header {
            background-color: var(--azul);
            padding: 0 15px;
            display: flex;
            align-items: center;
            height: 60px; /* Altura fixa para alinhar com o padrão */
            border-bottom: 3px solid var(--amarelo);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            height: 100%;
        }

        /* Removido qualquer fundo branco ou borda da casinha */
        .home-icon {
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .brand-text {
            color: #ffffff;
            font-weight: 700;
            font-size: 22px;
            display: flex;
            align-items: center;
            letter-spacing: -0.5px;
        }

        .pdf-txt {
            color: var(--amarelo);
            margin-left: 5px;
        }

        /* --- CARD COM PROPORÇÕES DA HOME --- */
        .card { 
            background: white; 
            padding: 40px 25px; 
            border-radius: 24px; 
            border-bottom: 6px solid var(--amarelo); 
            max-width: 380px; 
            margin: 40px auto; 
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .card img {
            width: 75px;
            margin-bottom: 15px;
        }

        h1 { 
            font-size: 22px; 
            margin-bottom: 10px; 
            text-transform: uppercase;
        }
        
        .destaque-pdf {
            color: white;
            background: var(--azul);
            padding: 2px 8px;
            border-radius: 6px;
        }

        .btn { 
            background: var(--amarelo); 
            color: var(--azul); 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 12px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase;
            margin-top: 25px;
            font-size: 16px;
        }

        input[type="file"] {
            margin: 20px 0;
            font-size: 14px;
            width: 100%;
        }

        .link-voltar {
            text-decoration: none; 
            color: #777; 
            font-size: 12px; 
            font-weight: 900; 
            text-transform: uppercase; 
            display: block; 
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand" onclick="irParaHome()">
            <div class="home-icon">🏠</div>
            <div class="brand-text">Doks<span class="pdf-txt">PDF</span></div>
        </div>
    </header>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/3342/3342137.png" alt="Conversor">
        <h1>IMAGEM P/ <span class="destaque-pdf">PDF</span></h1>
        <p style="font-size: 14px; color: #666;">Converta suas fotos em um documento PDF profissional rapidamente.</p>
        
        <input type="file" id="img-input" multiple accept="image/*">
        
        <button class="btn" onclick="convertImage()">GERAR PDF</button>
    </div>

    <a href="javascript:void(0)" onclick="irParaHome()" class="link-voltar">← VOLTAR AO INÍCIO</a>

    <script>
        function irParaHome() {
            window.location.href = "index.html";
        }

        async function convertImage() {
            const { jsPDF } = window.jspdf;
            const files = document.getElementById('img-input').files;
            if (files.length === 0) return alert("Selecione ao menos uma imagem.");
            const doc = new jsPDF();
            for (let i = 0; i < files.length; i++) {
                const imgData = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(files[i]);
                });
                if (i > 0) doc.addPage();
                doc.addImage(imgData, 'JPEG', 10, 10, 190, 0);
            }
            doc.save("DoksPDF_Imagens.pdf");
        }
    </script>
</body>
</html>
