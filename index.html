<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuPDF - Versão Final Motorola</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <b>MEUPDF LOCAL</b>
        <button onclick="document.getElementById('file-in').click()" class="btn-open">ABRIR PDF</button>
        <input type="file" id="file-in" accept="application/pdf" style="display:none">
    </div>

    <div class="container">
        <div id="pdf-wrapper">
            <canvas id="pdf-render"></canvas>
            <div id="signature-layer"></div>
        </div>
    </div>

    <div class="side-controls">
        <button class="btn-side" onclick="adjustZoom(0.1)"><i class="fa fa-plus"></i></button>
        <button class="btn-side" onclick="adjustZoom(-0.1)"><i class="fa fa-minus"></i></button>
    </div>

    <div class="bottom-bar">
        <button class="btn-circle" onclick="changePage(-1)"><i class="fa fa-chevron-left"></i></button>
        <div class="page-info"><span id="page-num">0</span> / <span id="page-count">0</span></div>
        <button class="btn-circle" onclick="changePage(1)"><i class="fa fa-chevron-right"></i></button>
        <button class="btn-circle btn-pen" onclick="openSigPad()"><i class="fa fa-pen-nib"></i></button>
        <button class="btn-circle btn-save" onclick="saveFinalPdf()"><i class="fa fa-save"></i></button>
    </div>

    <div id="sig-modal">
        <canvas id="sig-pad"></canvas>
        <div class="modal-btns">
            <button onclick="closeSigPad()" class="btn-cancel">CANCELAR</button>
            <button onclick="confirmSig()" class="btn-confirm">CONFIRMAR</button>
        </div>
    </div>

    <div id="loading" style="display:none;"><p>Processando no Celular...</p></div>
    <script src="script.js?v=FINAL_ESTAVEL"></script>
</body>
</html>
