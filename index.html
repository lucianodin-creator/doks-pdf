<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuPDF v2.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #222; padding: 10px; display: flex; justify-content: center; gap: 8px; z-index: 100; border-bottom: 2px solid #333; }
        .btn { padding: 12px 15px; border: none; border-radius: 4px; font-weight: bold; color: white; text-transform: uppercase; font-size: 11px; cursor: pointer; }
        
        #viewer { flex: 1; overflow-y: auto; background: #1a1a1a; padding: 15px; display: flex; flex-direction: column; align-items: center; position: relative; touch-action: pan-y; }
        .pdf-page-wrapper { position: relative; background: white; margin-bottom: 25px; line-height: 0; box-shadow: 0 5px 25px #000; }
        
        #drag-box { position: absolute; width: 140px; height: 60px; border: 2px dashed #007bff; background: rgba(0,123,255,0.1); display: none; z-index: 50; touch-action: none; }
        #sig-img { width: 100%; height: 100%; pointer-events: none; object-fit: contain; }

        #modal { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #canvas-wrap { background: white; width: 95vw; height: 65vh; position: relative; border: 2px solid #555; }
        #sig-canvas { width: 100%; height: 100%; touch-action: none; }
        
        .controls { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 150; display: none; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 12px; border: 1px solid #444; }
        
        /* OVERLAY DE PRÉVIA MELHORADO */
        #preview-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        #preview-img-container { background: white; width: 95%; height: 75%; overflow-y: auto; display: flex; justify-content: center; border-radius: 4px; }
        #preview-img-container img { max-width: 100%; height: auto; align-self: flex-start; }
    </style>
</head>
<body>
    <header>
        <input type="file" id="pdf-in" style="display:none" accept="application/pdf">
        <button class="btn" style="background:#007bff" onclick="document.getElementById('pdf-in').click()">1. ABRIR PDF</button>
        <button class="btn" style="background:#f39c12" onclick="openModal()">2. ASSINAR</button>
    </header>

    <div id="viewer"></div>
    <div id="drag-box"><img id="sig-img-drag"></div>

    <div class="controls" id="action-btns">
        <button class="btn" style="background:#28a745" onclick="generatePreview(true)">REVISAR TODAS</button>
        <button class="btn" style="background:#007bff" onclick="generatePreview(false)">REVISAR SÓ ESTA</button>
    </div>

    <div id="modal">
        <div style="margin-bottom:10px; color:#f39c12; font-weight:bold;">ASSINE NO QUADRO ABAIXO</div>
        <div id="canvas-wrap"><canvas id="sig-canvas"></canvas></div>
        <div style="margin-top:15px; display:flex; gap:12px;">
            <button class="btn" style="background:#28a745; width:100px;" onclick="confirmSig()">OK</button>
            <button class="btn" style="background:#dc3545" onclick="pad.clear()">LIMPAR</button>
            <button class="btn" style="background:#6c757d" onclick="closeModal()">VOLTAR</button>
        </div>
    </div>

    <div id="preview-overlay">
        <h3 style="margin: 10px 0; font-size: 16px;">VERIFIQUE COMO FICOU:</h3>
        <div id="preview-img-container"><img id="preview-img-final"></div>
        <div style="margin-top:15px; display:flex; gap:10px; width: 100%; justify-content: center;">
            <button class="btn" style="background:#28a745; flex: 1;" id="download-final">CONFIRMAR E BAIXAR</button>
            <button class="btn" style="background:#dc3545; flex: 1;" onclick="closePreview()">REFAZER</button>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let pdfData, pad, currentPdfBytes;
        const view = document.getElementById('viewer'), box = document.getElementById('drag-box'), sigImgDrag = document.getElementById('sig-img-drag'), actionBtns = document.getElementById('action-btns');

        function openModal() {
            if (!view.hasChildNodes()) return alert("Abra o PDF!");
            document.getElementById('modal').style.display = 'flex';
            resizeCanvas();
        }

        function resizeCanvas() {
            const c = document.getElementById('sig-canvas');
            const wrap = c.parentElement;
            const dpr = window.devicePixelRatio || 1;
            c.width = wrap.clientWidth * dpr;
            c.height = wrap.clientHeight * dpr;
            c.getContext("2d").scale(dpr, dpr);
            if (pad) pad.clear();
            pad = new SignaturePad(c);
        }

        window.addEventListener('orientationchange', () => {
            if(document.getElementById('modal').style.display === 'flex') setTimeout(resizeCanvas, 300);
        });

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function closePreview() { document.getElementById('preview-overlay').style.display = 'none'; }

        function confirmSig() {
            if (pad.isEmpty()) return alert("Assine primeiro!");
            sigImgDrag.src = pad.toDataURL();
            box.style.display = 'block';
            actionBtns.style.display = 'flex';
            view.querySelector('.pdf-page-wrapper').appendChild(box);
            box.style.left = "30px"; box.style.top = "30px";
            closeModal();
        }

        box.addEventListener("touchmove", (e) => {
            const r = box.parentElement.getBoundingClientRect();
            const t = e.touches[0];
            box.style.left = (t.clientX - r.left - 70) + "px";
            box.style.top = (t.clientY - r.top - 30) + "px";
        });

        document.getElementById('pdf-in').onchange = async (e) => {
            const f = e.target.files[0]; if (!f) return;
            pdfData = await f.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;
            view.innerHTML = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const p = await pdf.getPage(i);
                const w = document.createElement('div'); w.className = 'pdf-page-wrapper';
                const c = document.createElement('canvas');
                const vp = p.getViewport({scale: (view.clientWidth * 0.92) / p.getViewport({scale:1}).width});
                c.width = vp.width; c.height = vp.height;
                await p.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
                w.appendChild(c); view.appendChild(w);
            }
        };

        async function generatePreview(allPages) {
            const doc = await PDFDocument.load(pdfData);
            const sigPng = await doc.embedPng(sigImgDrag.src);
            const pages = doc.getPages();
            const wrapper = box.parentElement;

            const rx = parseFloat(box.style.left) / wrapper.offsetWidth;
            const ry = parseFloat(box.style.top) / wrapper.offsetHeight;
            const rw = box.offsetWidth / wrapper.offsetWidth;
            const rh = box.offsetHeight / wrapper.offsetHeight;

            pages.forEach((p, i) => {
                if (allPages || i === 0) {
                    const { width, height } = p.getSize();
                    p.drawImage(sigPng, {
                        x: width * rx,
                        y: height - (height * ry) - (height * rh),
                        width: width * rw, height: height * rh
                    });
                }
            });

            currentPdfBytes = await doc.save();
            
            // GERAR IMAGEM PARA PRÉVIA (Evita bloqueio de PDF no celular)
            const previewPdf = await pdfjsLib.getDocument({data: currentPdfBytes}).promise;
            const firstPage = await previewPdf.getPage(1);
            const canvasPreview = document.createElement('canvas');
            const viewport = firstPage.getViewport({scale: 1.5});
            canvasPreview.width = viewport.width;
            canvasPreview.height = viewport.height;
            await firstPage.render({canvasContext: canvasPreview.getContext('2d'), viewport: viewport}).promise;
            
            document.getElementById('preview-img-final').src = canvasPreview.toDataURL();
            document.getElementById('preview-overlay').style.display = 'flex';
            
            document.getElementById('download-final').onclick = () => {
                const blob = new Blob([currentPdfBytes], { type: 'application/pdf' });
                const l = document.createElement('a');
                l.href = URL.createObjectURL(blob);
                l.download = "Documento_Finalizado.pdf"; l.click();
            };
        }
    </script>
</body>
</html>
