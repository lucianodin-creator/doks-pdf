<header class="header">
    <div class="logo">Doks PDF</div>
    <div class="header-btns">
        <button class="btn-top">Recentes</button>
        <label for="file-in" class="btn-top btn-pdf">Abrir PDF</label>
        <input type="file" id="file-in" hidden accept="application/pdf">
    </div>
</header>


<main class="viewer-container">
    <div class="zoom-controls">
        <button class="btn-zoom" onclick="changeZoom(0.2)">+</button>
        <button class="btn-zoom" onclick="changeZoom(-0.2)">-</button>
    </div>
    <div id="pdf-render-area"></div>
</main>


<footer class="footer">
    <div class="nav-group">
        <button class="btn-footer" onclick="changePage(-1)"> < </button>
        <span id="page-info">0 / 0</span>
        <button class="btn-footer" onclick="changePage(1)"> > </button>
    </div>
    <div class="action-group">
        <button class="btn-footer" onclick="startSignProcess()">🖋️ Assinar</button>
        <button class="btn-footer btn-save" onclick="savePDF()">Salvar</button>
    </div>
</footer>


<div id="aviso-giro">
    <div style="font-size: 60px;">📱</div>
    <p>Gire o celular para o modo paisagem</p>
    <p style="font-size: 14px; color: #ccc;">A assinatura será aberta automaticamente</p>
    <button onclick="closeSig()" style="margin-top:20px; padding:10px; border-radius:5px; border:none;">Cancelar</button>
</div>


<div id="sig-modal">
    <canvas id="sig-pad"></canvas>
    <div class="sig-toolbar">
        <button class="btn-sig" style="background:#757575;" onclick="closeSig()">Sair</button>
        <button class="btn-sig" style="background:#fbc02d; color:#333;" onclick="signaturePad.clear()">Limpar</button>
        <button class="btn-sig" style="background:#2e7d32;" onclick="confirmSign()">Confirmar</button>
    </div>
</div>
