<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuPDF Core</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #333; padding: 10px; display: flex; justify-content: center; gap: 10px; z-index: 10; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; }
        #viewer { flex: 1; overflow-y: auto; background: #444; padding: 10px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .pdf-wrapper { position: relative; background: white; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        canvas { display: block; }
        #drag-box { position: absolute; width: 150px; height: 60px; border: 2px solid #007bff; background: rgba(0,123,255,0.2); display: none; z-index: 100; touch-action: none; }
        #tag { position: absolute; top: -25px; left: 0; background: #f39c12; color: black; font-size: 10px; padding: 2px 5px; font-weight: bold; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #pad-wrap { background: white; width: 90%; height: 50%; border-radius: 5px; }
    </style>
</head>
<body>
    <header>
        <input type="file" id="file" style="display:none" accept="application/pdf">
        <button class="btn" style="background:#007bff" onclick="document.getElementById('file').click()">ABRIR</button>
        <button class="btn" style="background:#f39c12" onclick="openPad()">ASSINAR</button>
        <button class="btn" style="background:#28a745" onclick="save()">SALVAR</button>
    </header>
    <div id="viewer"></div>
    <div id="drag-box">
        <div id="tag">APLICAR: SÓ ESTA</div>
        <img id="render" style="width:100%; height:100%; pointer-events:none; object-fit:contain;">
    </div>
    <div id="modal">
        <div id="pad-wrap"><canvas id="pad-canvas" style="width:100%; height:100%;"></canvas></div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn" style="background:#28a745" onclick="confirm()">CONFIRMAR</button>
            <button class="btn" style="background:#dc3545" onclick="signaturePad.clear()">LIMPAR</button>
            <button class="btn" style="background:#6c757d" onclick="closePad()">SAIR</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
