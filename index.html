<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuPDF v2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: #111; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #222; padding: 12px; display: flex; justify-content: center; gap: 8px; z-index: 100; border-bottom: 2px solid #333; }
        .btn { padding: 12px 15px; border: none; border-radius: 4px; font-weight: bold; color: white; text-transform: uppercase; font-size: 11px; }
        
        #viewer { flex: 1; overflow-y: auto; background: #1a1a1a; padding: 15px; display: flex; flex-direction: column; align-items: center; position: relative; touch-action: pan-y; }
        .pdf-page-wrapper { position: relative; background: white; margin-bottom: 25px; line-height: 0; box-shadow: 0 5px 20px #000; }
        canvas { display: block; max-width: 100%; height: auto; }

        /* O ADESIVO DA ASSINATURA */
        #drag-box { position: absolute; width: 140px; height: 60px; border: 2px dashed #007bff; background: rgba(0,123,255,0.1); display: none; z-index: 50; touch-action: none; cursor: move; }
        #sig-img { width: 100%; height: 100%; pointer-events: none; object-fit: contain; }

        /* MODAL DE ASSINATURA TOTALMENTE ISOLADO */
        #modal { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #canvas-wrap { background: white; width: 95vw; height: 60vh; border: 5px solid #444; position: relative; }
        #sig-canvas { width: 100%; height: 100%; touch-action: none; }
        
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 150; display: none; }
    </style>
</head>
<body>
    <header>
        <input type="file" id="pdf-in" style="display:none" accept="application/pdf">
        <button class="btn" style="background:#007bff" onclick="document.getElementById('pdf-in').click()">1. ABRIR PDF</button>
        <button class="btn" style="background:#f39c12" onclick="openModal()">2. CRIAR ASSINATURA</button>
    </header>

    <div id="viewer"></div>

    <div id="drag-box">
        <img id="sig-img">
    </div>

    <div class="controls" id="action-btns">
        <button class="btn" style="background:#28a745" onclick="savePdf(true)">CLONAR EM TODAS</button>
        <button class="btn" style="background:#007bff" onclick="savePdf(false)">SALVAR SÓ ESTA</button>
    </div>

    <div id="modal">
        <h3 style="color:#f39c12">ASSINE ABAIXO</h3>
        <div id="canvas-wrap"><canvas id="sig-canvas"></canvas></div>
        <div style="margin-top:20px; display:flex; gap:15px;">
            <button class="btn" style="background:#28a745; padding:15px 30px;" onclick="confirmSig()">OK</button>
            <button class="btn" style="background:#dc3545" onclick="pad.clear()">LIMPAR</button>
            <button class="btn" style="background:#6c757d" onclick="closeModal()">CANCELAR</button>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let pdfData, pad;
        const view = document.getElementById('viewer'), box = document.getElementById('drag-box'), img = document.getElementById('sig-img'), actionBtns = document.getElementById('action-btns');

        function openModal() {
            if (!view.hasChildNodes()) return alert("Abra o PDF primeiro!");
            document.getElementById('modal').style.display = 'flex';
            const c = document.getElementById('sig-canvas');
            const rect = c.parentElement.getBoundingClientRect();
            // Resolução limpa para o Motorola
            c.width = rect.width; c.height = rect.height;
            pad = new SignaturePad(c, { penColor: 'black' });
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function confirmSig() {
            if (pad.isEmpty()) return alert("Assinatura vazia!");
            img.src = pad.toDataURL();
            box.style.display = 'block';
            actionBtns.style.display = 'flex';
            const firstPage = view.querySelector('.pdf-page-wrapper');
            firstPage.appendChild(box);
            box.style.left = "20px"; box.style.top = "20px";
            closeModal();
        }

        // ARRASTE SUAVE
        box.addEventListener("touchmove", (e) => {
            e.preventDefault();
            const container = box.parentElement.getBoundingClientRect();
            const touch = e.touches[0];
            box.style.left = (touch.clientX - container.left - 70) + "px";
            box.style.top = (touch.clientY - container.top - 30) + "px";
        }, { passive: false });

        document.getElementById('pdf-in').onchange = async (e) => {
            const f = e.target.files[0]; if (!f) return;
            pdfData = await f.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;
            view.innerHTML = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const p = await pdf.getPage(i);
                const w = document.createElement('div'); w.className = 'pdf-page-wrapper';
                const c = document.createElement('canvas');
                const vp = p.getViewport({scale: (view.clientWidth * 0.9) / p.getViewport({scale:1}).width});
                c.width = vp.width; c.height = vp.height;
                await p.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
                w.appendChild(c); view.appendChild(w);
            }
        };

        async function savePdf(cloneAll) {
            if(!pdfData || !img.src) return;
            const doc = await PDFDocument.load(pdfData);
            const png = await doc.embedPng(img.src);
            const pages = doc.getPages();
            const wrapper = box.parentElement;

            const rx = parseFloat(box.style.left) / wrapper.offsetWidth;
            const ry = parseFloat(box.style.top) / wrapper.offsetHeight;
            const rw = box.offsetWidth / wrapper.offsetWidth;
            const rh = box.offsetHeight / wrapper.offsetHeight;

            pages.forEach((p, i) => {
                if (cloneAll || i === 0) {
                    const { width, height } = p.getSize();
                    p.drawImage(png, {
                        x: width * rx,
                        y: height - (height * ry) - (height * rh),
                        width: width * rw, height: height * rh
                    });
                }
            });

            const pdfBytes = await doc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "PDF_Assinado_v2.pdf";
            link.click();
        }
    </script>
</body>
</html>
