<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuPDF v3.4 SVG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #111; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        header { background: #1a1a1a; padding: 10px; display: flex; justify-content: center; gap: 8px; border-bottom: 2px solid #333; }
        .btn { padding: 12px 15px; border: none; border-radius: 4px; font-weight: bold; color: white; text-transform: uppercase; font-size: 11px; }
        
        #viewer { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; align-items: center; background: #000; }
        .pdf-page-wrapper { position: relative; background: white; margin-bottom: 20px; line-height: 0; }
        
        .sig-box { position: absolute; width: 150px; height: 75px; border: 2px dashed #007bff; background: rgba(0,123,255,0.1); z-index: 50; touch-action: none; }
        .sig-box img { width: 100%; height: 100%; pointer-events: none; }
        .resizer { position: absolute; bottom: -10px; right: -10px; width: 25px; height: 25px; background: #007bff; border-radius: 50%; border: 2px solid #fff; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
        #canvas-wrap { 
            background: white; 
            width: 90vw; 
            max-width: 500px;
            aspect-ratio: 2 / 1; 
            border: 4px solid #f39c12;
            touch-action: none;
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        .footer-tools { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; z-index: 200; }
    </style>
</head>
<body>
    <header>
        <input type="file" id="pdf-in" style="display:none" accept="application/pdf">
        <button class="btn" style="background:#007bff" onclick="document.getElementById('pdf-in').click()">1. ABRIR PDF</button>
        <button class="btn" style="background:#f39c12" onclick="openModal()">2. ASSINAR</button>
    </header>

    <div id="viewer"></div>

    <div class="footer-tools" id="final-tools">
        <button class="btn" style="background:#28a745" onclick="saveFinalPdf()">GERAR PDF FINAL</button>
    </div>

    <div id="modal">
        <div style="margin-bottom:10px; color:#f39c12; font-weight:bold;">MODO SVG - ESTABILIDADE MÁXIMA</div>
        <div id="canvas-wrap"><canvas id="sig-canvas"></canvas></div>
        <div style="margin-top:15px; display:flex; gap:10px;">
            <button class="btn" style="background:#28a745" onclick="applySignature()">OK</button>
            <button class="btn" style="background:#dc3545" onclick="pad.clear()">LIMPAR</button>
            <button class="btn" style="background:#6c757d" onclick="closeModal()">VOLTAR</button>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let pdfData, pad, sigBase64;

        function openModal() {
            if (!document.getElementById('viewer').hasChildNodes()) return alert("Abra o PDF!");
            document.getElementById('modal').style.display = 'flex';
            setTimeout(initPad, 50);
        }

        function initPad() {
            const c = document.getElementById('sig-canvas');
            const wrap = document.getElementById('canvas-wrap');
            // Usando resolução básica para não estressar a memória do celular
            c.width = wrap.offsetWidth;
            c.height = wrap.offsetHeight;
            if (pad) pad.off();
            pad = new SignaturePad(c, { penColor: "rgb(0, 0, 150)" });
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function applySignature() {
            if (pad.isEmpty()) return;
            sigBase64 = pad.toDataURL(); // Exporta como imagem
            const pages = document.querySelectorAll('.pdf-page-wrapper');
            pages.forEach(page => {
                const box = document.createElement('div');
                box.className = 'sig-box';
                box.style.left = "20px"; box.style.top = "20px";
                box.innerHTML = `<img src="${sigBase64}"><div class="resizer"></div>`;
                
                box.addEventListener("touchmove", (e) => {
                    if(e.target.classList.contains('resizer')) return;
                    e.preventDefault();
                    const r = page.getBoundingClientRect();
                    const t = e.touches[0];
                    box.style.left = (t.clientX - r.left - (box.offsetWidth/2)) + "px";
                    box.style.top = (t.clientY - r.top - (box.offsetHeight/2)) + "px";
                }, {passive: false});

                box.querySelector('.resizer').addEventListener("touchmove", (e) => {
                    e.stopPropagation(); e.preventDefault();
                    const t = e.touches[0];
                    const r = box.getBoundingClientRect();
                    const nW = t.clientX - r.left;
                    if (nW > 50) { box.style.width = nW + "px"; box.style.height = (nW * 0.5) + "px"; }
                }, {passive: false});
                page.appendChild(box);
            });
            document.getElementById('final-tools').style.display = 'block';
            closeModal();
        }

        document.getElementById('pdf-in').onchange = async (e) => {
            const f = e.target.files[0]; if (!f) return;
            pdfData = await f.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;
            const view = document.getElementById('viewer'); view.innerHTML = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const p = await pdf.getPage(i);
                const w = document.createElement('div'); w.className = 'pdf-page-wrapper';
                const c = document.createElement('canvas');
                const vp = p.getViewport({scale: (view.clientWidth * 0.9) / p.getViewport({scale:1}).width});
                c.width = vp.width; c.height = vp.height;
                await p.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
                w.appendChild(c); view.appendChild(w);
            }
        };

        async function saveFinalPdf() {
            const doc = await PDFDocument.load(pdfData);
            const sigPng = await doc.embedPng(sigBase64);
            const pdfPages = doc.getPages();
            document.querySelectorAll('.pdf-page-wrapper').forEach((htmlP, i) => {
                const box = htmlP.querySelector('.sig-box');
                if (box) {
                    const p = pdfPages[i];
                    const { width, height } = p.getSize();
                    p.drawImage(sigPng, {
                        x: width * (parseFloat(box.style.left) / htmlP.offsetWidth),
                        y: height - (height * (parseFloat(box.style.top) / htmlP.offsetHeight)) - (height * (box.offsetHeight / htmlP.offsetHeight)),
                        width: width * (box.offsetWidth / htmlP.offsetWidth), 
                        height: height * (box.offsetHeight / htmlP.offsetHeight)
                    });
                }
            });
            const bytes = await doc.save();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
            link.download = "Assinado_Luciano.pdf";
            link.click();
        }
    </script>
</body>
</html>
