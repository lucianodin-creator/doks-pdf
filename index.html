<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEUPDF PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #111; height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        .header { height: 50px; background: #1a73e8; color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 10000; }
        
        /* Container com scroll */
        .container { flex: 1; overflow-y: auto; background: #222; position: relative; display: flex; flex-direction: column; align-items: center; }
        #pdf-main-wrapper { position: relative; display: flex; flex-direction: column; gap: 15px; transform-origin: top center; padding-bottom: 120px; }
        .page-container { position: relative; background: #fff; line-height: 0; box-shadow: 0 0 15px #000; }
        canvas { width: 100% !important; height: auto !important; }

        /* Zoom fixo na lateral para não dar conflito */
        .zoom-sidebar { position: fixed; right: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 9000; }
        .btn-zoom { width: 45px; height: 45px; border-radius: 50%; border: none; background: rgba(255,255,255,0.9); color: #1a73e8; font-size: 24px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }

        /* Assinatura com borda de redimensionamento clara */
        .sig-container { position: absolute; width: 180px; height: 80px; border: 2px dashed #1a73e8; z-index: 5000; touch-action: none; background: rgba(26,115,232,0.05); }
        .sig-tools { position: absolute; top: -45px; left: 0; display: flex; gap: 12px; z-index: 6000; }
        .btn-tool { width: 40px; height: 40px; border-radius: 50%; border: none; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 2px 5px #000; }

        /* Modal corrigido para Horizontal */
        #sig-modal { position: fixed; inset: 0; background: #fff; z-index: 30000; display: none; flex-direction: column; }
        #sig-pad { flex: 1; width: 100%; touch-action: none; }
        .modal-btns { height: 80px; display: flex; padding: 10px; gap: 10px; background: #eee; }
        .modal-btns button { flex: 1; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 16px; }

        @media (orientation: landscape) {
            #sig-modal { flex-direction: row; }
            .modal-btns { flex-direction: column; width: 130px; height: 100%; }
        }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; align-items: center; gap: 15px; padding: 0 15px; z-index: 9999; }
        .btn-action { flex: 1; height: 50px; border-radius: 25px; border: none; color: white; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <strong>MEUPDF PRO</strong>
        <label for="file-in" style="background:#fff; color:#1a73e8; padding:6px 12px; border-radius:6px; font-weight:bold; font-size:13px">📂 ABRIR PDF</label>
        <input type="file" id="file-in" style="display:none" accept="application/pdf">
    </div>

    <div class="container" id="view-cont">
        <div class="zoom-sidebar">
            <button class="btn-zoom" onclick="ajustarZoom(0.1)">+</button>
            <button class="btn-zoom" onclick="ajustarZoom(-0.1)">-</button>
        </div>
        <div id="pdf-main-wrapper"></div>
    </div>

    <div class="bottom-bar">
        <button class="btn-action" style="background:#1a73e8" onclick="abrirModal()">🖋️ ASSINAR</button>
        <button class="btn-action" style="background:#2e7d32" onclick="alert('Salvando todas as páginas...')">✔ SALVAR</button>
    </div>

    <div id="sig-modal">
        <canvas id="sig-pad"></canvas>
        <div class="modal-btns">
            <button onclick="fecharModal()" style="background:#546e7a">SAIR</button>
            <button onclick="signaturePad.clear()" style="background:#ffa000">LIMPAR</button>
            <button onclick="confirmarAssinatura()" style="background:#2e7d32">CONFIRMAR</button>
        </div>
    </div>

    <script>
        const { pdfjsLib } = globalThis;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let signaturePad, pdfDoc = null, zoomBase = 1.0;

        document.getElementById('file-in').onchange = async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                pdfDoc = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                renderizarDocumento();
            };
            reader.readAsArrayBuffer(file);
        };

        async function renderizarDocumento() {
            const wrapper = document.getElementById('pdf-main-wrapper');
            wrapper.innerHTML = '';
            const width = document.getElementById('view-cont').clientWidth - 30;
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({scale: (width / page.getViewport({scale:1}).width) * 2});
                const canvas = document.createElement('canvas');
                canvas.height = viewport.height; canvas.width = viewport.width;
                const div = document.createElement('div');
                div.className = 'page-container';
                div.appendChild(canvas);
                wrapper.appendChild(div);
                await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
            }
        }

        function ajustarZoom(delta) {
            zoomBase += delta;
            document.getElementById('pdf-main-wrapper').style.transform = `scale(${zoomBase})`;
        }

        function abrirModal() {
            document.getElementById('sig-modal').style.display = 'flex';
            const canvas = document.getElementById('sig-pad');
            if (!signaturePad) signaturePad = new SignaturePad(canvas);
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            signaturePad.clear();
        }

        function fecharModal() { document.getElementById('sig-modal').style.display = 'none'; }

        function confirmarAssinatura() {
            if (signaturePad.isEmpty()) return;
            gerarAssinatura(signaturePad.toDataURL());
            fecharModal();
        }

        function gerarAssinatura(src) {
            const container = document.createElement('div');
            container.className = 'sig-container';
            container.innerHTML = `
                <div class="sig-tools">
                    <button class="btn-tool" style="background:#d32f2f" onclick="this.parentElement.parentElement.remove()">🗑️</button>
                    <button class="btn-tool" style="background:#1976d2" onclick="clonarAssinatura(this)">📋</button>
                </div>
                <img src="${src}" style="width:100%; height:100%; pointer-events:none;">
            `;
            container.style.top = (document.getElementById('view-cont').scrollTop + 80) + 'px';
            container.style.left = '30px';
            document.getElementById('pdf-main-wrapper').appendChild(container);
            configurarArrasto(container);
        }

        function clonarAssinatura(btn) {
            gerarAssinatura(btn.parentElement.parentElement.querySelector('img').src);
        }

        function configurarArrasto(el) {
            let x = 0, y = 0;
            interact(el)
                .draggable({ listeners: { move(e) { x += e.dx; y += e.dy; e.target.style.transform = `translate(${x}px, ${y}px)`; } } })
                .resizable({
                    edges: { left: true, right: true, bottom: true, top: true },
                    listeners: { move(e) {
                        let { width, height } = e.rect;
                        x += e.deltaRect.left; y += e.deltaRect.top;
                        Object.assign(e.target.style, { width: `${width}px`, height: `${height}px`, transform: `translate(${x}px, ${y}px)` });
                    } }
                });
        }
    </script>
</body>
</html>
