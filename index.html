<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEUPDF PRO</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
/* CSS de Emergência para o Modal */
#sig-modal { 
    position: fixed !important; 
    inset: 0 !important; 
    background: #ffffff !important; 
    z-index: 30000 !important; /* Acima de tudo */
    display: none; 
    flex-direction: column; 
}
#sig-pad { 
    flex: 1; 
    width: 100%; 
    touch-action: none; 
    background: #fff;
}
.modal-btns { 
    height: 100px; 
    display: flex; 
    padding: 20px; 
    gap: 15px; 
    background: #eeeeee; 
}
.modal-btns button { 
    flex: 1; 
    border: none; 
    border-radius: 12px; 
    color: white; 
    font-weight: bold; 
    font-size: 16px; 
}
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #111; height: 100dvh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER AZUL */
        .header { height: 50px; background: #1a73e8; color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 10000; }
        .btn-open { background: #fff; color: #1a73e8; border: none; padding: 6px 15px; border-radius: 6px; font-weight: bold; font-size: 14px; }

        /* CONTAINER DO PDF */
        .container { flex: 1; overflow: auto; display: flex; justify-content: center; background: #222; padding-bottom: 90px; position: relative; }
        #pdf-wrapper { position: relative; background: #fff; margin-top: 10px; transform-origin: top center; transition: transform 0.2s; }

        /* BOTÕES DE ZOOM FLUTUANTES (Estratégia Lateral) */
        .zoom-controls { 
            position: fixed; right: 15px; top: 50%; transform: translateY(-50%); 
            display: flex; flex-direction: column; gap: 15px; z-index: 5000; 
        }
        .btn-zoom { 
            width: 50px; height: 50px; border-radius: 12px; border: none; 
            background: #fff; color: #1a73e8; font-size: 24px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }

        /* BARRA INFERIOR */
        .bottom-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            height: calc(80px + env(safe-area-inset-bottom)); 
            background: #000; display: flex; align-items: center; justify-content: space-around;
            z-index: 9999; border-top: 1px solid #333;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .btn-action { flex: 1; height: 50px; border-radius: 25px; border: none; color: white; font-weight: bold; margin: 0 10px; }

        /* MODAL ASSINATURA */
        #sig-modal { position: fixed; inset: 0; background: #fff; z-index: 20000; display: none; flex-direction: column; }
        #sig-pad { flex: 1; width: 100%; touch-action: none; }
    </style>
</head>
<body>

    <div class="header">
        <strong>MEUPDF PRO</strong>
        <label for="file-in" class="btn-open">📂 ABRIR PDF</label>
        <input type="file" id="file-in" style="display:none">
    </div>

    <div class="container">
        <div class="zoom-controls">
            <button class="btn-zoom" onclick="changeZoom(0.2)">+</button>
            <button class="btn-zoom" onclick="changeZoom(-0.2)">-</button>
        </div>

        <div id="pdf-wrapper">
            <canvas id="pdf-render"></canvas>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn-action" style="background:#1a73e8" onclick="openSigPad()">🖋️ ASSINAR</button>
        <button class="btn-action" style="background:#2e7d32" onclick="salvarPDF()">✔ SALVAR</button>
    </div>

    <div id="sig-modal">...</div>

    <script>
// Variável global única para evitar conflitos
window.sigPad = null;

function openSigPad() {
    console.log("Tentando abrir o modal...");
    const modal = document.getElementById('sig-modal');
    const canvas = document.getElementById('sig-pad');
    
    if (!modal || !canvas) {
        console.error("Erro: Elementos do modal não encontrados!");
        return;
    }

    // Força a exibição antes de qualquer lógica
    modal.style.setProperty('display', 'flex', 'important');

    // Inicializa o SignaturePad se não existir
    if (!window.sigPad) {
        window.sigPad = new SignaturePad(canvas, {
            backgroundColor: 'rgb(255, 255, 255)',
            penColor: 'rgb(0, 0, 0)'
        });
    }

    // Vacina de DPI e Redimensionamento
    setTimeout(() => {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.getContext("2d").setTransform(dpr, 0, 0, dpr, 0, 0);
        window.sigPad.clear(); 
    }, 300);
}

function closeSigPad() {
    document.getElementById('sig-modal').style.display = 'none';
}

// Vincula o clique via código para garantir que o HTML não falhe
document.addEventListener('DOMContentLoaded', () => {
    const btnAssinar = document.querySelector('button[onclick="openSigPad()"]');
    if (btnAssinar) {
        btnAssinar.removeAttribute('onclick');
        btnAssinar.addEventListener('click', openSigPad);
    }
});
        let currentScale = 1.0;
        const wrapper = document.getElementById('pdf-wrapper');

        // FUNÇÃO DE ZOOM
        function changeZoom(delta) {
            currentScale = Math.min(Math.max(0.5, currentScale + delta), 3.0);
            wrapper.style.transform = `scale(${currentScale})`;
            // Ajusta o scroll para não perder o PDF de vista
            wrapper.scrollIntoView({behavior: 'smooth', block: 'center'});
        }

        // Lógica de abertura e renderização simplificada
        document.getElementById('file-in').onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);
                const canvas = document.getElementById('pdf-render');
                const context = canvas.getContext('2d');
                const viewport = page.getViewport({scale: 1.5}); // Escala base para mobile
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({canvasContext: context, viewport: viewport}).promise;
            }
        };
    </script>
</body>
</html>
