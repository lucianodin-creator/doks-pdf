<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuPDF - Sênior v1.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: #121212; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #1f1f1f; padding: 12px; display: flex; justify-content: center; gap: 8px; border-bottom: 1px solid #333; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 11px; }
        #viewer { flex: 1; overflow-y: auto; background: #262626; padding: 15px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .pdf-page-wrapper { position: relative; background: white; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); line-height: 0; }
        canvas { display: block; max-width: 100%; height: auto; }
        #drag-box { position: absolute; width: 140px; height: 60px; border: 2px solid #007bff; background: rgba(0,123,255,0.1); display: none; z-index: 100; touch-action: none; }
        #tag { position: absolute; top: -28px; left: 0; background: #f39c12; color: black; font-size: 10px; padding: 4px 8px; font-weight: bold; border-radius: 3px; cursor: pointer; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #canvas-container { background: white; width: 95%; height: 60%; position: relative; border-radius: 4px; }
        #sig-canvas { width: 100%; height: 100%; touch-action: none; }
        .m-btns { margin-top: 15px; display: flex; gap: 10px; }
    </style>
</head>
<body>
    <header>
        <input type="file" id="pdf-in" style="display:none" accept="application/pdf">
        <button class="btn" style="background:#007bff" onclick="document.getElementById('pdf-in').click()">ABRIR</button>
        <button class="btn" style="background:#f39c12" onclick="openModal()">ASSINAR</button>
        <button class="btn" style="background:#28a745" onclick="savePdf()">SALVAR</button>
    </header>
    <div id="viewer"></div>
    <div id="drag-box">
        <div id="tag">APLICAR: SÓ ESTA</div>
        <img id="sig-img" style="width:100%; height:100%; pointer-events:none; object-fit:contain;">
    </div>
    <div id="modal">
        <div id="canvas-container"><canvas id="sig-canvas"></canvas></div>
        <div class="m-btns">
            <button class="btn" style="background:#28a745" onclick="confirmSig()">OK</button>
            <button class="btn" style="background:#dc3545" onclick="pad.clear()">LIMPAR</button>
            <button class="btn" style="background:#6c757d" onclick="closeModal()">SAIR</button>
        </div>
    </div>
    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let pdfData, pad;
        const view = document.getElementById('viewer'), box = document.getElementById('drag-box'), tag = document.getElementById('tag'), img = document.getElementById('sig-img');

        function openModal() {
            if (!view.hasChildNodes()) return alert("Abra o PDF!");
            document.getElementById('modal').style.display = 'flex';
            const c = document.getElementById('sig-canvas');
            // Reset do canvas para evitar offset
            c.width = c.offsetWidth; c.height = c.offsetHeight;
            pad = new SignaturePad(c);
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function confirmSig() {
            if (pad.isEmpty()) return alert("Assine!");
            img.src = pad.toDataURL();
            box.style.display = 'block';
            const p1 = view.querySelector('.pdf-page-wrapper');
            if (p1) { p1.appendChild(box); box.style.left = "10px"; box.style.top = "10px"; }
            closeModal();
        }
        tag.onclick = () => {
            const all = tag.innerText.includes("TODAS");
            tag.innerText = all ? "APLICAR: SÓ ESTA" : "APLICAR: TODAS";
            tag.style.background = all ? "#f39c12" : "#28a745";
        };
        box.addEventListener("touchmove", (e) => {
            e.preventDefault();
            const r = box.parentElement.getBoundingClientRect();
            const t = e.touches[0];
            box.style.left = (t.clientX - r.left - 70) + "px";
            box.style.top = (t.clientY - r.top - 30) + "px";
        }, { passive: false });

        document.getElementById('pdf-in').onchange = async (e) => {
            const f = e.target.files[0]; if (!f) return;
            pdfData = await f.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;
            view.innerHTML = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const p = await pdf.getPage(i);
                const w = document.createElement('div'); w.className = 'pdf-page-wrapper';
                const c = document.createElement('canvas');
                const vp = p.getViewport({scale: (view.clientWidth * 0.95) / p.getViewport({scale:1}).width});
                c.width = vp.width; c.height = vp.height;
                await p.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
                w.appendChild(c); view.appendChild(w);
            }
        };

        async function savePdf() {
            if(!pdfData || !img.src) return alert("Erro!");
            const doc = await PDFDocument.load(pdfData);
            const png = await doc.embedPng(img.src);
            const pages = doc.getPages();
            const w = view.querySelector('.pdf-page-wrapper');
            const rx = parseFloat(box.style.left) / w.offsetWidth;
            const ry = parseFloat(box.style.top) / w.offsetHeight;
            const rw = box.offsetWidth / w.offsetWidth;
            const rh = box.offsetHeight / w.offsetHeight;
            
            const applyAll = tag.innerText.includes("TODAS");
            // FORÇANDO O LOOP EM TODAS AS PÁGINAS SE MARCADO
            for (let i = 0; i < pages.length; i++) {
                if (!applyAll && i > 0) break; 
                const p = pages[i];
                const { width, height } = p.getSize();
                p.drawImage(png, {
                    x: width * rx,
                    y: height - (height * ry) - (height * rh),
                    width: width * rw,
                    height: height * rh
                });
            }
            const b = await doc.save();
            const l = document.createElement('a');
            l.href = URL.createObjectURL(new Blob([b], {type: 'application/pdf'}));
            l.download = "Assinado_Sénior.pdf"; l.click();
        }
    </script>
</body>
</html>
