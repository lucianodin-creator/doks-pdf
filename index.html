<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DoksPDF</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --azul: #4169E1; --fundo: #1a1a1a; --laranja: #FF8C00; --verde: #2e7d32; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: sans-serif; background: var(--fundo); 
            height: 100svh; display: flex; flex-direction: column; overflow: hidden; 
        }

        .header {
            height: 60px; background: var(--azul); color: white;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000; flex-shrink: 0;
        }

        .viewer-container {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 10px 120px 10px; -webkit-overflow-scrolling: touch;
        }

        .canvas-wrapper { position: relative; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.5); line-height: 0; }

        /* CAIXA DE ASSINATURA COM REDIMENSIONAMENTO */
        .sig-container { 
            position: absolute; border: 2px dashed var(--azul); 
            background: rgba(255,255,255,0.7); z-index: 500; touch-action: none;
        }

        /* PUXADOR DE REDIMENSIONAMENTO (Canto inferior direito) */
        .resizer {
            position: absolute; width: 25px; height: 25px;
            background: var(--azul); right: -5px; bottom: -5px;
            border-radius: 50%; border: 2px solid white; z-index: 600;
        }

        .sig-btns-float { 
            position: absolute; top: -45px; right: 0; display: flex; gap: 5px; 
            background: rgba(0,0,0,0.8); padding: 5px; border-radius: 5px; 
        }

        .mini-btn { width: 32px; height: 32px; border: none; border-radius: 4px; color: white; font-size: 14px; }

        .footer {
            height: 70px; background: var(--azul); display: flex;
            align-items: center; justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom); z-index: 2000; flex-shrink: 0;
        }

        .btn-footer { height: 44px; padding: 0 15px; border-radius: 8px; border: none; font-weight: bold; background: white; color: var(--azul); }
        #sig-modal { position: fixed; inset: 0; background: white; display: none; flex-direction: column; z-index: 5000; }
        #sig-pad { flex: 1; background: #fdfdfd; }
        .sig-toolbar { height: 75px; display: flex; gap: 10px; padding: 12px; background: #eee; }
        #aviso-giro { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 6000; }
    </style>
</head>
<body>

    <header class="header">
        <div style="font-weight:bold; font-size:18px;">DoksPDF</div>
        <label for="file-in" style="background:white; color:var(--azul); padding:8px 15px; border-radius:6px; font-weight:bold;">Abrir PDF</label>
        <input type="file" id="file-in" hidden accept="application/pdf">
    </header>

    <main class="viewer-container">
        <div id="pdf-render-area"></div>
    </main>

    <footer class="footer">
        <button class="btn-footer" onclick="changePage(-1)"> < </button>
        <span id="page-info" style="color:white; font-weight:bold;">0 / 0</span>
        <button class="btn-footer" onclick="changePage(1)"> > </button>
        <button class="btn-footer" onclick="startSignProcess()">🖋️ Assinar</button>
        <button class="btn-footer" style="background:var(--verde); color:white;" onclick="savePDF()">Salvar</button>
    </footer>

    <div id="aviso-giro">📱<br>Gire para assinar</div>

    <div id="sig-modal">
        <canvas id="sig-pad"></canvas>
        <div class="sig-toolbar">
            <button onclick="closeSig()" style="flex:1; background:#757575; color:white; border:none; border-radius:8px;">Sair</button>
            <button onclick="signaturePad.clear()" style="flex:1; background:#fbc02d; border:none; border-radius:8px;">Limpar</button>
            <button onclick="confirmSign()" style="flex:1; background:var(--verde); color:white; border:none; border-radius:8px;">Confirmar</button>
        </div>
    </div>

    <script>
        let pdfDoc = null, pageNum = 1, scale = 1.0, signaturePad = null;
        const pdfjs = window['pdfjs-dist/build/pdf'];
        pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        document.getElementById('file-in').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const data = new Uint8Array(await file.arrayBuffer());
            pdfDoc = await pdfjs.getDocument({data}).promise;
            scale = (window.innerWidth - 30) / 595;
            renderPages();
        };

        async function renderPages() {
            const area = document.getElementById('pdf-render-area');
            area.innerHTML = '';
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({scale});
                const wrapper = document.createElement('div');
                wrapper.className = 'canvas-wrapper';
                wrapper.id = `page-container-${i}`;
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
                wrapper.appendChild(canvas);
                area.appendChild(wrapper);
            }
            document.getElementById('page-info').innerText = `${pageNum} / ${pdfDoc.numPages}`;
        }

        function changePage(d) {
            if(!pdfDoc) return;
            pageNum = Math.min(Math.max(pageNum + d, 1), pdfDoc.numPages);
            document.getElementById(`page-container-${pageNum}`).scrollIntoView({behavior: 'smooth'});
            document.getElementById('page-info').innerText = `${pageNum} / ${pdfDoc.numPages}`;
        }

        function startSignProcess() {
            if(!pdfDoc) return alert("Abra um PDF.");
            const check = () => {
                if (window.innerWidth > window.innerHeight) {
                    document.getElementById('aviso-giro').style.display = 'none';
                    document.getElementById('sig-modal').style.display = 'flex';
                    const c = document.getElementById('sig-pad');
                    c.width = window.innerWidth; c.height = window.innerHeight - 75;
                    signaturePad = new SignaturePad(c);
                    window.removeEventListener('resize', check);
                } else { document.getElementById('aviso-giro').style.display = 'flex'; }
            };
            window.addEventListener('resize', check);
            check();
        }

        function closeSig() { document.getElementById('sig-modal').style.display = 'none'; document.getElementById('aviso-giro').style.display = 'none'; }

        function confirmSign() {
            if (signaturePad.isEmpty()) return alert("Assine primeiro.");
            const data = signaturePad.toDataURL();
            const cont = document.getElementById(`page-container-${pageNum}`);
            const div = document.createElement('div');
            div.className = 'sig-container';
            div.style.width = '180px'; div.style.height = '80px';
            div.style.top = '100px'; div.style.left = '50px';
            
            div.innerHTML = `
                <div class="sig-btns-float">
                    <button class="mini-btn" style="background:var(--verde)" onclick="cloneAll(this)">📋</button>
                    <button class="mini-btn" style="background:var(--azul)" onclick="rotateSig(this)">🔄</button>
                    <button class="mini-btn" style="background:red" onclick="this.parentElement.parentElement.remove()">🗑️</button>
                </div>
                <img src="${data}" style="width:100%; height:100%; pointer-events:none;" data-angle="0">
                <div class="resizer"></div>
            `;
            
            cont.appendChild(div);
            makeDraggableAndResizable(div);
            closeSig();
        }

        function makeDraggableAndResizable(el) {
            const resizer = el.querySelector('.resizer');
            let isResizing = false;

            // Lógica de Arrastar e Redimensionar
            el.addEventListener('touchstart', (e) => {
                if (e.target === resizer) {
                    isResizing = true;
                } else {
                    isResizing = false;
                }
                
                const t = e.touches[0];
                let startX = t.clientX, startY = t.clientY;
                let startW = el.offsetWidth, startH = el.offsetHeight;
                let startL = el.offsetLeft, startT = el.offsetTop;

                const move = (ev) => {
                    const mt = ev.touches[0];
                    if (isResizing) {
                        el.style.width = (startW + (mt.clientX - startX)) + 'px';
                        el.style.height = (startH + (mt.clientY - startY)) + 'px';
                    } else {
                        el.style.left = (startL + (mt.clientX - startX)) + 'px';
                        el.style.top = (startT + (mt.clientY - startY)) + 'px';
                    }
                };

                const end = () => { document.removeEventListener('touchmove', move); };
                document.addEventListener('touchmove', move, {passive:false});
                document.addEventListener('touchend', end);
            });
        }

        function rotateSig(b) {
            const img = b.closest('.sig-container').querySelector('img');
            let a = (parseInt(img.getAttribute('data-angle')) + 90) % 360;
            img.style.transform = `rotate(${a}deg)`;
            img.setAttribute('data-angle', a);
        }

        function cloneAll(b) {
            const orig = b.closest('.sig-container');
            const data = orig.querySelector('img').src;
            document.querySelectorAll('.canvas-wrapper').forEach(p => {
                if (p.id === orig.parentElement.id) return;
                const clone = orig.cloneNode(true);
                p.appendChild(clone);
                makeDraggableAndResizable(clone);
            });
        }

        async function savePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pages = document.querySelectorAll('.canvas-wrapper');
            for (let i = 0; i < pages.length; i++) {
                if (i > 0) doc.addPage();
                const canv = pages[i].querySelector('canvas');
                doc.addImage(canv.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 210, 297);
                pages[i].querySelectorAll('.sig-container').forEach(s => {
                    const img = s.querySelector('img');
                    const r = pages[i].getBoundingClientRect();
                    const sr = s.getBoundingClientRect();
                    const x = ((sr.left - r.left) / r.width) * 210;
                    const y = ((sr.top - r.top) / r.height) * 297;
                    const w = (sr.width / r.width) * 210;
                    const h = (sr.height / r.height) * 297;
                    doc.addImage(img.src, 'PNG', x, y, w, h);
                });
            }
            doc.save("DoksPDF_Assinado.pdf");
            alert("Salvo com sucesso!");
        }
    </script>
</body>
</html>
