<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuPDF Pro</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <b>MEUPDF PRO</b>
        <button onclick="document.getElementById('file-in').click()"><i class="fa fa-upload"></i></button>
        <input type="file" id="file-in" accept="application/pdf" style="display:none">
    </div>

    <div class="main-content">
        <div id="pdf-wrapper">
            <canvas id="pdf-render"></canvas>
        </div>
        
        <div class="zoom-controls">
            <button class="btn-z" onclick="window.adjustZoom(0.1)"><i class="fa fa-plus"></i></button>
            <button class="btn-z" onclick="window.adjustZoom(-0.1)"><i class="fa fa-minus"></i></button>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn-n" onclick="window.changePage(-1)"><i class="fa fa-chevron-left"></i></button>
        <div class="p-info"><span id="page-num">0</span> / <span id="page-count">0</span></div>
        <button class="btn-n" onclick="window.changePage(1)"><i class="fa fa-chevron-right"></i></button>
        <button class="btn-n b-pen" onclick="window.openSigPad()"><i class="fa fa-pen-nib"></i></button>
        <button class="btn-n b-save" onclick="window.saveFinalPdf()"><i class="fa fa-check-circle"></i></button>
    </div>

    <div id="sig-modal">
        <canvas id="sig-pad"></canvas>
        <div class="m-btns">
            <button onclick="window.closeSigPad()" style="background:#666">Sair</button>
            <button onclick="window.pad.clear()" style="background:#f39c12">Limpar</button>
            <button onclick="window.confirmSig()" style="background:#28a745">Confirmar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
