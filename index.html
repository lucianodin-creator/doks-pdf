<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doks PDF</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* MÓDULO 1: RESET E CORES GERAIS */
        :root {
            --azul-doks: #4169E1;
            --cinza-fundo: #2c2c2c;
            --dourado: #FFD700;
            --laranja-zoom: #FF8C00;
            --verde: #2e7d32;
            --amarelo: #fbc02d;
            --cinza-botao: #757575;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--cinza-fundo); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* MÓDULO 2: BARRA SUPERIOR */
        .header {
            height: 60px; background: var(--azul-doks); display: flex;
            align-items: center; justify-content: space-between; padding: 0 15px; color: white;
        }
        .header-btns { display: flex; gap: 10px; align-items: center; }
        .btn-top {
            padding: 8px 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; background: white; color: var(--azul-doks);
        }
        .btn-pdf { border: 2px solid var(--dourado) !important; color: #333 !important; }

        /* MÓDULO 3: ÁREA DO PDF E ZOOM */
        .viewer-container {
            flex: 1; overflow: auto; display: flex; justify-content: center; padding: 20px; position: relative;
        }
        #pdf-render-area { display: flex; flex-direction: column; gap: 20px; }
        .canvas-wrapper { position: relative; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        .zoom-controls {
            position: fixed; right: 20px; top: 150px; display: flex; flex-direction: column; gap: 10px; z-index: 100;
        }
        .btn-zoom {
            width: 45px; height: 45px; background: var(--laranja-zoom); color: white; border: none; border-radius: 50%; font-size: 20px; font-weight: bold;
        }

        /* MÓDULO 4: BARRA INFERIOR */
        .footer {
            height: 70px; background: var(--azul-doks); display: flex;
            align-items: center; justify-content: space-around; padding: 0 10px; color: white;
        }
        .nav-btns { display: flex; align-items: center; gap: 15px; }
        .action-btns { display: flex; gap: 10px; }
        .btn-footer { background: white; color: var(--azul-doks); border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }

        /* MÓDULO 5: JANELA DE ASSINATURA (MODAL) */
        #sig-modal {
            position: fixed; inset: 0; background: white; display: none; flex-direction: column; z-index: 2000;
        }
        #sig-pad { flex: 1; background: #f0f0f0; cursor: crosshair; }
        .sig-footer { height: 70px; display: flex; gap: 10px; padding: 10px; background: #eee; }
        .btn-sig { flex: 1; border: none; border-radius: 8px; color: white; font-weight: bold; }

        /* AVISO DE GIRO */
        #aviso-giro {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000;
            display: none; flex-direction: column; align-items: center; justify-content: center; color: white;
        }

        /* MÓDULO 6: ELEMENTO ASSINATURA NA FOLHA */
        .sig-container {
            position: absolute; border: 2px solid rgba(65, 105, 225, 0.5); background: rgba(65, 105, 225, 0.1); cursor: move;
        }
        .sig-btns {
            position: absolute; top: -35px; right: 0; display: flex; gap: 5px;
        }
        .mini-btn { width: 28px; height: 28px; border: none; border-radius: 4px; color: white; font-size: 14px; }
    </style>
</head>
<body>

    <header class="header">
        <h2>Doks PDF</h2>
        <div class="header-btns">
            <button class="btn-top">Recentes</button>
            <label for="file-in" class="btn-top btn-pdf">Abrir PDF</label>
            <input type="file" id="file-in" hidden accept="application/pdf">
        </div>
    </header>

    <main class="viewer-container" id="scroll-area">
        <div class="zoom-controls">
            <button class="btn-zoom" onclick="changeZoom(0.1)">+</button>
            <button class="btn-zoom" onclick="changeZoom(-0.1)">-</button>
        </div>
        <div id="pdf-render-area"></div>
    </main>

    <footer class="footer">
        <div class="nav-btns">
            <button class="btn-footer" onclick="changePage(-1)"><</button>
            <span id="page-info">Pág: 0 / 0</span>
            <button class="btn-footer" onclick="changePage(1)">></button>
        </div>
        <div class="action-btns">
            <button class="btn-footer" onclick="startSignProcess()">🖋️ Assinar</button>
            <button class="btn-footer" style="background: var(--verde); color: white;" onclick="savePDF()">Salvar</button>
        </div>
    </footer>

    <div id="aviso-giro">
        <h1 style="font-size: 50px;">📱</h1>
        <p>Gire o celular para assinar</p>
    </div>

    <div id="sig-modal">
        <canvas id="sig-pad"></canvas>
        <div class="sig-footer">
            <button class="btn-sig" style="background: var(--cinza-botao);" onclick="closeSig()">Sair</button>
            <button class="btn-sig" style="background: var(--amarelo); color: #333;" onclick="signaturePad.clear()">Limpar</button>
            <button class="btn-sig" style="background: var(--verde);" onclick="confirmSign()">Confirmar</button>
        </div>
    </div>

<script>
    // MÓDULO 7: LÓGICA CORE (PDF & VARIAVEIS)
    let pdfDoc = null, pageNum = 1, scale = 1.0, signaturePad = null;
    const renderArea = document.getElementById('pdf-render-area');
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // Captura de erro para o Termux
    window.onerror = (msg, url, line) => { console.error(`[ERRO DOKS]: ${msg} na linha ${line}`); return false; };

    document.getElementById('file-in').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function() {
            const data = new Uint8Array(this.result);
            pdfjs.getDocument({data}).promise.then(pdf => {
                pdfDoc = pdf;
                pageNum = 1;
                renderPages();
            }).catch(err => console.error("Erro PDF:", err));
        };
        reader.readAsArrayBuffer(file);
    };

    async function renderPages() {
        renderArea.innerHTML = '';
        // Ajuste inicial para caber na tela
        const tempPage = await pdfDoc.getPage(1);
        scale = (window.innerWidth - 40) / tempPage.getViewport({scale: 1.0}).width;
        
        for (let i = 1; i <= pdfDoc.numPages; i++) {
            const page = await pdfDoc.getPage(i);
            const viewport = page.getViewport({scale});
            const wrapper = document.createElement('div');
            wrapper.className = 'canvas-wrapper';
            wrapper.id = `page-container-${i}`;
            
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
            
            wrapper.appendChild(canvas);
            renderArea.appendChild(wrapper);
        }
        updatePageInfo();
    }

    // MÓDULO 8: NAVEGAÇÃO E ZOOM
    function changePage(dir) {
        if (!pdfDoc) return;
        const target = pageNum + dir;
        if (target >= 1 && target <= pdfDoc.numPages) {
            pageNum = target;
            document.getElementById(`page-container-${pageNum}`).scrollIntoView({behavior: 'smooth'});
            updatePageInfo();
        }
    }

    function updatePageInfo() {
        document.getElementById('page-info').innerText = `Pág: ${pageNum} / ${pdfDoc ? pdfDoc.numPages : 0}`;
    }

    function changeZoom(val) {
        scale += val;
        renderPages();
    }

    // MÓDULO 9: ASSINATURA
    function startSignProcess() {
        if (!pdfDoc) return alert("Abra um PDF primeiro.");
        document.getElementById('aviso-giro').style.display = 'flex';
        window.addEventListener('orientationchange', checkOrientation);
        checkOrientation(); // Verifica se já está deitado
    }

    function checkOrientation() {
        if (window.innerHeight < window.innerWidth) { // Deitado
            document.getElementById('aviso-giro').style.display = 'none';
            openSigModal();
        }
    }

    function openSigModal() {
        const modal = document.getElementById('sig-modal');
        modal.style.display = 'flex';
        const canvas = document.getElementById('sig-pad');
        canvas.width = modal.offsetWidth;
        canvas.height = modal.offsetHeight - 70;
        signaturePad = new SignaturePad(canvas);
    }

    function closeSig() {
        document.getElementById('sig-modal').style.display = 'none';
        document.getElementById('aviso-giro').style.display = 'none';
        window.removeEventListener('orientationchange', checkOrientation);
    }

    function confirmSign() {
        if (signaturePad.isEmpty()) return;
        const dataUrl = signaturePad.toDataURL();
        placeSignatureOnSheet(dataUrl);
        closeSig();
    }

    // MÓDULO 10: MANIPULAÇÃO DA ASSINATURA NA FOLHA
    function placeSignatureOnSheet(imgData) {
        const container = document.getElementById(`page-container-${pageNum}`);
        const sigDiv = document.createElement('div');
        sigDiv.className = 'sig-container';
        sigDiv.style.width = '150px';
        sigDiv.style.top = '100px';
        sigDiv.style.left = '50px';

        sigDiv.innerHTML = `
            <div class="sig-btns">
                <button class="mini-btn" style="background:var(--verde)" onclick="cloneSig(this)">👥</button>
                <button class="mini-btn" style="background:var(--azul-doks)" onclick="rotateSig(this)">🔄</button>
                <button class="mini-btn" style="background:var(--danger, red)" onclick="this.parentElement.parentElement.remove()">🗑️</button>
            </div>
            <img src="${imgData}" style="width:100%; height:100%; pointer-events:none;">
            <div style="position:absolute; bottom:0; right:0; width:15px; height:15px; cursor:nwse-resize; background:blue;"></div>
        `;

        container.appendChild(sigDiv);
        makeDraggable(sigDiv);
    }

    function makeDraggable(el) {
        let px = 0, py = 0;
        el.ontouchstart = (e) => {
            const t = e.touches[0];
            px = t.clientX - el.offsetLeft;
            py = t.clientY - el.offsetTop;
            document.ontouchmove = (ev) => {
                const mt = ev.touches[0];
                el.style.left = (mt.clientX - px) + 'px';
                el.style.top = (mt.clientY - py) + 'px';
            };
        };
        document.ontouchend = () => document.ontouchmove = null;
    }

    function rotateSig(btn) {
        const img = btn.closest('.sig-container').querySelector('img');
        const curr = img.style.transform || 'rotate(0deg)';
        const next = (parseInt(curr.replace(/[^0-9]/g, '')) + 90) % 360;
        img.style.transform = `rotate(${next}deg)`;
    }

    function cloneSig(btn) {
        const original = btn.closest('.sig-container');
        const img = original.querySelector('img').src;
        document.querySelectorAll('.canvas-wrapper').forEach(page => {
            if (page.id === original.parentElement.id) return;
            const clone = original.cloneNode(true);
            page.appendChild(clone);
            makeDraggable(clone);
        });
    }

    // MÓDULO 11: SALVAMENTO
    async function savePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'pt', 'a4');
        // Lógica de exportação simplificada para o módulo
        alert("PDF sendo processado para download...");
        doc.save("doks_assinado.pdf");
    }
</script>
</body>
</html>
