<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DOKS PDF</title>
    <style>
        :root { --app-height: 100vh; }
        body { 
            font-family: sans-serif; background-color: #000; color: white; margin: 0; 
            display: flex; flex-direction: column; height: var(--app-height); 
            width: 100vw; overflow: hidden; position: fixed; 
        }
        
        .navbar { 
            background-color: #2b52d4; padding: 0 15px; display: flex; 
            justify-content: space-between; align-items: center; height: 55px; z-index: 100;
        }

        #viewer-container { flex: 1; width: 100%; background: #000; overflow: auto; display: flex; justify-content: center; }
        #pdf-viewer { width: 100%; height: 100%; border: none; transition: transform 0.2s; transform-origin: top center; }

        .zoom-controls { position: fixed; right: 15px; top: 150px; display: flex; flex-direction: column; gap: 10px; z-index: 200; }
        .btn-zoom { 
            background-color: #f39c12; color: white; width: 44px; height: 44px; 
            border-radius: 8px; border: none; font-size: 22px; font-weight: bold; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
        
        /* Rodapé Ajustado */
        .footer { 
            background: #000; padding: 8px 15px; display: flex; gap: 10px; 
            height: 65px; border-top: 1px solid #222; z-index: 100; box-sizing: border-box;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* CORREÇÃO: Alinhamento centralizado dos botões */
        .btn-footer { 
            flex: 1; border-radius: 10px; border: none; color: white; 
            font-weight: bold; font-size: 13px; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; 
            text-align: center; gap: 8px; height: 100%; transition: transform 0.1s;
        }

        /* Efeito de clique */
        .btn-footer:active { transform: scale(0.95); opacity: 0.9; }

        .btn-assign { background-color: #3b66f5; }
        .btn-save { background-color: #2d8c3c; }

        input[type="file"] { display: none; }
        .btn-nav-icon { background:#f39c12; color:white; border:none; padding:6px 10px; border-radius:5px; font-size:16px; cursor:pointer; }
        .btn-nav-open { background:#fff; color:#2b52d4; padding:6px 12px; border-radius:5px; font-size:12px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

    <div class="navbar">
        <div style="font-weight:bold; font-size: 16px;">📄 DOKS PDF</div>
        <div style="display:flex; gap:8px; align-items: center;">
            <button class="btn-nav-icon" onclick="toggleHistory()">🕒</button>
            <label class="btn-nav-open">
                📂 ABRIR <input type="file" id="pdfInput" accept="application/pdf">
            </label>
        </div>
    </div>

    <div class="zoom-controls">
        <button class="btn-zoom" onclick="changeZoom(0.2)">+</button>
        <button class="btn-zoom" onclick="changeZoom(-0.2)">-</button>
    </div>

    <div id="viewer-container">
        <iframe id="pdf-viewer"></iframe>
    </div>

    <div class="footer">
        <button class="btn-footer btn-assign">🖋️ ASSINAR</button>
        <button class="btn-footer btn-save">✔️ SALVAR</button>
    </div>

    <div id="history-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#111; padding:20px; border-radius:12px; border:1px solid #333; width:80%; z-index:300;">
        <h3 style="margin:0 0 10px 0; color:#f39c12; font-size:16px">Recentes</h3>
        <div id="history-list" style="font-size:13px; color:#ccc"></div>
        <button onclick="toggleHistory()" style="margin-top:15px; width:100%; padding:8px; background:#cc0000; color:white; border:none; border-radius:5px">FECHAR</button>
    </div>

    <script>
        const appHeight = () => document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
        window.addEventListener('resize', appHeight);
        appHeight();

        let currentZoom = 1.0;
        const pdfViewer = document.getElementById('pdf-viewer');
        const pdfInput = document.getElementById('pdfInput');

        pdfInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                pdfViewer.src = URL.createObjectURL(file) + "#toolbar=0";
                currentZoom = 1.0;
                pdfViewer.style.transform = `scale(1)`;
            }
        });

        function changeZoom(delta) {
            currentZoom = Math.min(Math.max(currentZoom + delta, 0.5), 3);
            pdfViewer.style.transform = `scale(${currentZoom})`;
            pdfViewer.style.width = (currentZoom > 1) ? (100 / currentZoom) + "%" : "100%";
        }

        function toggleHistory() {
            const modal = document.getElementById('history-modal');
            const list = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('pdf_history') || '[]');
            list.innerHTML = history.length ? '' : 'Nenhum histórico.';
            history.forEach(item => list.innerHTML += `<div style="padding:8px 0; border-bottom:1px solid #222">📄 ${item}</div>`);
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
