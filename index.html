<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuPDF - Sênior v1.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #333; padding: 12px; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid #444; }
        .btn { padding: 12px 18px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 13px; }
        #viewer { flex: 1; overflow-y: auto; background: #2c2c2c; padding: 15px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .pdf-wrapper { position: relative; background: white; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.6); line-height: 0; }
        canvas { display: block; max-width: 100%; height: auto; }
        #drag-box { position: absolute; width: 150px; height: 65px; border: 2px solid #007bff; background: rgba(0,123,255,0.15); display: none; z-index: 100; touch-action: none; }
        #tag { position: absolute; top: -32px; left: 0; background: #f39c12; color: black; font-size: 11px; padding: 5px 8px; font-weight: bold; border-radius: 4px 4px 0 0; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #pad-wrap { background: white; width: 94%; height: 55%; border-radius: 8px; }
        .m-btns { margin-top: 20px; display: flex; gap: 10px; }
    </style>
</head>
<body>
    <header>
        <input type="file" id="file" style="display:none" accept="application/pdf">
        <button class="btn" style="background:#007bff" onclick="document.getElementById('file').click()">ABRIR</button>
        <button class="btn" style="background:#f39c12" onclick="openSig()">ASSINAR</button>
        <button class="btn" style="background:#28a745" onclick="savePdf()">SALVAR</button>
    </header>
    <div id="viewer"></div>
    <div id="drag-box">
        <div id="tag">APLICAR: SÓ ESTA</div>
        <img id="render" style="width:100%; height:100%; pointer-events:none; object-fit:contain;">
    </div>
    <div id="modal">
        <div style="color:#f39c12; margin-bottom:15px; font-weight:bold;">ASSINE ABAIXO</div>
        <div id="pad-wrap"><canvas id="p-canv"></canvas></div>
        <div class="m-btns">
            <button class="btn" style="background:#28a745" onclick="confirmSig()">CONFIRMAR</button>
            <button class="btn" style="background:#dc3545" onclick="sp.clear()">LIMPAR</button>
            <button class="btn" style="background:#6c757d" onclick="closeSig()">SAIR</button>
        </div>
    </div>
    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let pdfRaw, sp;
        const view = document.getElementById('viewer');
        const box = document.getElementById('drag-box');
        const img = document.getElementById('render');
        const tag = document.getElementById('tag');

        function openSig() {
            if (!view.hasChildNodes()) return alert("Abra o PDF!");
            document.getElementById('modal').style.display = 'flex';
            const c = document.getElementById('p-canv');
            const dpr = window.devicePixelRatio || 1;
            c.width = c.offsetWidth * dpr; c.height = c.offsetHeight * dpr;
            c.getContext("2d").scale(dpr, dpr);
            sp = new SignaturePad(c);
        }
        function closeSig() { document.getElementById('modal').style.display = 'none'; }
        function confirmSig() {
            if (sp.isEmpty()) return alert("Assine primeiro!");
            img.src = sp.toDataURL();
            box.style.display = 'block';
            const p1 = view.querySelector('.pdf-wrapper');
            if (p1) { p1.appendChild(box); box.style.left = "20px"; box.style.top = "20px"; }
            closeSig();
        }
        tag.onclick = (e) => {
            e.stopPropagation();
            const all = tag.innerText.includes("TODAS");
            tag.innerText = all ? "APLICAR: SÓ ESTA" : "APLICAR: TODAS";
            tag.style.background = all ? "#f39c12" : "#28a745";
        };
        box.addEventListener("touchmove", (e) => {
            e.preventDefault();
            const r = box.parentElement.getBoundingClientRect();
            const t = e.touches[0];
            box.style.left = (t.clientX - r.left - 75) + "px";
            box.style.top = (t.clientY - r.top - 32) + "px";
        }, { passive: false });
        document.getElementById('file').onchange = async (e) => {
            const f = e.target.files[0];
            if (!f) return;
            pdfRaw = await f.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: pdfRaw}).promise;
            view.innerHTML = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const p = await pdf.getPage(i);
                const w = document.createElement('div');
                w.className = 'pdf-wrapper';
                const c = document.createElement('canvas');
                const vp = p.getViewport({scale: (view.clientWidth * 0.95) / p.getViewport({scale:1}).width});
                c.width = vp.width; c.height = vp.height;
                await p.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
                w.appendChild(c);
                view.appendChild(w);
            }
        };
        async function savePdf() {
            if(!pdfRaw || !img.src) return alert("Faltam dados!");
            const doc = await PDFDocument.load(pdfRaw);
            const png = await doc.embedPng(img.src);
            const pages = doc.getPages();
            const w = view.querySelector('.pdf-wrapper');
            const rx = parseFloat(box.style.left) / w.offsetWidth;
            const ry = parseFloat(box.style.top) / w.offsetHeight;
            const rw = box.offsetWidth / w.offsetWidth;
            const rh = box.offsetHeight / w.offsetHeight;
            const limit = tag.innerText.includes("TODAS") ? pages.length : 1;
            for (let i = 0; i < limit; i++) {
                const p = pages[i];
                const { width, height } = p.getSize();
                p.drawImage(png, { x: width * rx, y: height - (height * ry) - (height * rh), width: width * rw, height: height * rh });
            }
            const b = await doc.save();
            const l = document.createElement('a');
            l.href = URL.createObjectURL(new Blob([b], {type: 'application/pdf'}));
            l.download = "Contrato_Assinado.pdf";
            l.click();
        }
    </script>
</body>
</html>
