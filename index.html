<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assinador v5.42 - Precisão Total</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        header { background: #111; padding: 10px; display: flex; justify-content: center; gap: 8px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 5000; }
        .btn { height: 44px; border: none; border-radius: 6px; font-weight: bold; color: white; font-size: 11px; cursor: pointer; flex: 1; max-width: 120px; display: flex; align-items: center; justify-content: center; }
        #viewer { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; background: #1e1e1e; overflow-y: auto; width: 100%; }
        .pdf-page-wrapper { position: relative; background: white; margin-bottom: 80px; box-shadow: 0 5px 25px rgba(0,0,0,0.7); line-height: 0; display: inline-block; }
        .sig-container { position: absolute; z-index: 1000; width: 150px; height: 75px; touch-action: none; cursor: move; border: 1.5px dashed rgba(52,152,219,0.5); }
        .sig-box { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .sig-box img { width: 100%; height: 100%; display: block; pointer-events: none; object-fit: contain; }
        
        /* Ajuste Firefox: Centralização Forçada */
        .edge-handle { position: absolute; color: white; display: grid; place-items: center; font-size: 18px; border: 2px solid #fff; z-index: 2000; font-weight: bold; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .h-side { width: 40px; height: 60px; top: 50%; transform: translateY(-50%); background: #27ae60; }
        .right-h { right: -45px; } .left-h { left: -45px; }
        .v-side { width: 60px; height: 40px; left: 50%; transform: translateX(-50%); background: #e74c3c; }
        .top-v { top: -45px; } .bottom-v { bottom: -45px; }
        
        .rotator-btn { position: absolute; top: -85px; right: -25px; background: #f39c12; width: 45px; height: 45px; border-radius: 50%; display: grid; place-items: center; font-size: 18px; border: 2px solid white; z-index: 2100; }
        
        #rotate-notice { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #final-tools { position: fixed; bottom: 0; left: 0; width: 100%; display: none; flex-direction: row; justify-content: center; gap: 10px; background: rgba(0,0,0,0.95); padding: 15px; border-top: 1px solid #444; z-index: 5000; }
        #screen-sign { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        #canvas-container { flex: 1; width: 95vw; margin: 10px auto; background: #fff; border-radius: 12px; }
        canvas#sig-canvas { width: 100%; height: 100%; display: block; touch-action: none; }
    </style>
</head>
<body>
    <header>
        <input type="file" id="pdf-in" style="display:none" accept="application/pdf">
        <button class="btn" style="background:#3498db" onclick="document.getElementById('pdf-in').click()">1. ABRIR PDF</button>
        <button id="btn-sign" class="btn" style="background:#f39c12" onclick="checkOrientation()">2. ASSINAR</button>
        <button id="btn-redo" class="btn" style="background:#e67e22; display:none;" onclick="checkOrientation()">REFAZER</button>
    </header>
    <div id="viewer"></div>
    <div id="rotate-notice"><h2>Gire o celular</h2><p>Bloqueio de orientação ativo.</p></div>
    <div id="final-tools">
        <button class="btn" style="background:#2ecc71" onclick="saveFinal()">SALVAR PDF</button>
    </div>
    <div id="screen-sign">
        <div id="canvas-container"><canvas id="sig-canvas"></canvas></div>
        <div style="padding:15px; display:flex; gap:10px; background:#111; justify-content:center;">
            <button class="btn" style="background:#27ae60" onclick="applySignature()">OK</button>
            <button class="btn" style="background:#e74c3c" onclick="pad.clear()">LIMPAR</button>
            <button class="btn" style="background:#7f8c8d" onclick="hideSignScreen()">SAIR</button>
        </div>
    </div>

    <script>
        const { PDFDocument, degrees } = PDFLib;
        let pdfData, pad, sigBase64;

        function checkOrientation() {
            if (window.innerWidth < 1024 && window.innerHeight > window.innerWidth) {
                document.getElementById('rotate-notice').style.display = 'flex';
                window.addEventListener('resize', autoOpen);
            } else { showSignScreen(); }
        }
        function autoOpen() { if (window.innerWidth > window.innerHeight) { document.getElementById('rotate-notice').style.display = 'none'; showSignScreen(); window.removeEventListener('resize', autoOpen); } }
        
        function showSignScreen() {
            document.getElementById('screen-sign').style.display = 'flex';
            const canvas = document.getElementById('sig-canvas');
            if (!pad) pad = new SignaturePad(canvas, { penColor: "rgb(0, 0, 80)" });
            setTimeout(() => {
                const r = window.devicePixelRatio || 1;
                canvas.width = canvas.offsetWidth * r; canvas.height = canvas.offsetHeight * r;
                canvas.getContext("2d").scale(r, r); pad.clear();
            }, 300);
        }

        function hideSignScreen() { document.getElementById('screen-sign').style.display = 'none'; }

        function applySignature() {
            if (pad.isEmpty()) return;
            sigBase64 = pad.toDataURL("image/png");
            hideSignScreen();
            document.getElementById('btn-redo').style.display = 'flex';
            document.getElementById('btn-sign').style.display = 'none';
            createSigBoxes();
        }

        function createSigBoxes() {
            document.querySelectorAll('.pdf-page-wrapper').forEach(page => {
                const container = document.createElement('div');
                container.className = 'sig-container';
                container.style.left = "20px"; container.style.top = "20px";
                container.innerHTML = `
                    <div class="sig-box">
                        <div class="rotator-btn" onclick="rotateBox(this)">↻</div>
                        <img src="${sigBase64}">
                        <div class="edge-handle h-side left-h">↔</div>
                        <div class="edge-handle h-side right-h">↔</div>
                        <div class="edge-handle v-side top-v">↕</div>
                        <div class="edge-handle v-side bottom-v">↕</div>
                    </div>`;
                
                container.dataset.rotation = 0;
                const moveLogic = (e) => {
                    if (e.target.classList.contains('edge-handle') || e.target.classList.contains('rotator-btn')) return;
                    const r = page.getBoundingClientRect();
                    container.style.left = (e.clientX - r.left - (container.offsetWidth/2)) + "px";
                    container.style.top = (e.clientY - r.top - (container.offsetHeight/2)) + "px";
                };
                container.addEventListener("pointerdown", (e) => {
                    if (e.target.classList.contains('edge-handle') || e.target.classList.contains('rotator-btn')) return;
                    container.setPointerCapture(e.pointerId);
                    container.addEventListener("pointermove", moveLogic);
                });
                container.addEventListener("pointerup", (e) => {
                    container.releasePointerCapture(e.pointerId);
                    container.removeEventListener("pointermove", moveLogic);
                });

                container.querySelectorAll('.edge-handle').forEach(h => {
                    let sX, sY, sW, sH, sL, sT;
                    const resizer = (re) => {
                        const dx = re.clientX - sX; const dy = re.clientY - sY;
                        if (h.classList.contains('h-side')) {
                            if (h.classList.contains('right-h')) container.style.width = (sW + dx) + "px";
                            else { container.style.width = (sW - dx) + "px"; container.style.left = (sL + dx) + "px"; }
                        } else {
                            if (h.classList.contains('bottom-v')) container.style.height = (sH + dy) + "px";
                            else { container.style.height = (sH - dy) + "px"; container.style.top = (sT + dy) + "px"; }
                        }
                    };
                    h.addEventListener("pointerdown", (he) => {
                        he.stopPropagation(); h.setPointerCapture(he.pointerId);
                        sX = he.clientX; sY = he.clientY; sW = container.offsetWidth; sH = container.offsetHeight;
                        sL = parseFloat(container.style.left); sT = parseFloat(container.style.top);
                        h.addEventListener("pointermove", resizer);
                    });
                    h.addEventListener("pointerup", (he) => { h.releasePointerCapture(he.pointerId); h.removeEventListener("pointermove", resizer); });
                });
                page.appendChild(container);
            });
            document.getElementById('final-tools').style.display = 'flex';
        }

        function rotateBox(el) {
            const c = el.closest('.sig-container');
            let r = (parseInt(c.dataset.rotation) || 0) + 90;
            c.dataset.rotation = r >= 360 ? 0 : r;
            c.querySelector('.sig-box img').style.transform = `rotate(${c.dataset.rotation}deg)`;
        }

        document.getElementById('pdf-in').onchange = async (e) => {
            pdfData = await e.target.files[0].arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;
            const view = document.getElementById('viewer'); view.innerHTML = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const p = await pdf.getPage(i);
                const w = document.createElement('div'); w.className = 'pdf-page-wrapper';
                const c = document.createElement('canvas');
                const vp = p.getViewport({scale: (view.clientWidth * 0.9) / p.getViewport({scale:1}).width});
                c.width = vp.width; c.height = vp.height;
                await p.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
                w.appendChild(c); view.appendChild(w);
            }
        };

        async function saveFinal() {
            const doc = await PDFDocument.load(pdfData);
            const sigImg = await doc.embedPng(sigBase64);
            const pages = doc.getPages();
            
            document.querySelectorAll('.pdf-page-wrapper').forEach((wrapper, i) => {
                const container = wrapper.querySelector('.sig-container');
                if (container && pages[i]) {
                    const page = pages[i];
                    const { width, height } = page.getSize();
                    
                    // Conversão de escala absoluta entre tela e PDF
                    const scaleX = width / wrapper.clientWidth;
                    const scaleY = height / wrapper.clientHeight;
                    
                    const pdfW = container.clientWidth * scaleX;
                    const pdfH = container.clientHeight * scaleY;
                    const pdfX = parseFloat(container.style.left) * scaleX;
                    // Inversão correta do eixo Y para o padrão PDFLib
                    const pdfY = height - (parseFloat(container.style.top) * scaleY) - pdfH;
                    
                    const rot = parseInt(container.dataset.rotation) || 0;
                    
                    page.drawImage(sigImg, {
                        x: pdfX + (pdfW / 2),
                        y: pdfY + (pdfH / 2),
                        width: pdfW,
                        height: pdfH,
                        rotate: degrees(-rot),
                        xAnchor: 'center',
                        yAnchor: 'center'
                    });
                }
            });
            
            const bytes = await doc.save();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
            link.download = `assinado_v542.pdf`;
            link.click();
        }
    </script>
</body>
</html>
