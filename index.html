<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuPDF v2.7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        header { background: #222; padding: 10px; display: flex; justify-content: center; gap: 8px; border-bottom: 2px solid #333; }
        .btn { padding: 12px 15px; border: none; border-radius: 4px; font-weight: bold; color: white; text-transform: uppercase; font-size: 11px; cursor: pointer; }
        
        #viewer { flex: 1; overflow-y: auto; background: #1a1a1a; padding: 15px; display: flex; flex-direction: column; align-items: center; touch-action: pan-y; }
        .pdf-page-wrapper { position: relative; background: white; margin-bottom: 25px; line-height: 0; box-shadow: 0 5px 25px #000; }
        
        .sig-box { position: absolute; width: 150px; height: 70px; border: 2px dashed #007bff; background: rgba(0,123,255,0.05); z-index: 10; touch-action: none; }
        .sig-box img { width: 100%; height: 100%; pointer-events: none; object-fit: contain; }
        .resizer { position: absolute; bottom: -12px; right: -12px; width: 30px; height: 30px; background: #007bff; border-radius: 50%; border: 2px solid #fff; z-index: 20; }

        /* MODAL ADAPTADO AO NAVEGADOR */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #canvas-wrap { 
            background: white; 
            width: 90vw; /* Deixa 5% de margem em cada lado */
            height: 70vh; /* Deixa espaço para os botões sem rolar */
            position: relative; 
            border: 4px solid #f39c12; 
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(243,156,18,0.5);
        }
        #sig-canvas { width: 100%; height: 100%; touch-action: none; }
        
        .footer-tools { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); display: none; z-index: 150; background: rgba(0,0,0,0.9); padding: 12px; border-radius: 12px; border: 1px solid #444; }
    </style>
</head>
<body>
    <header>
        <input type="file" id="pdf-in" style="display:none" accept="application/pdf">
        <button class="btn" style="background:#007bff" onclick="document.getElementById('pdf-in').click()">1. ABRIR PDF</button>
        <button class="btn" style="background:#f39c12" onclick="openModal()">2. ASSINAR</button>
    </header>

    <div id="viewer"></div>

    <div class="footer-tools" id="final-tools">
        <button class="btn" style="background:#28a745" onclick="saveFinalPdf()">FINALIZAR E BAIXAR PDF</button>
    </div>

    <div id="modal">
        <div style="margin-bottom:10px; color:#f39c12; font-weight:bold;">ASSINE DENTRO DO QUADRO LARANJA</div>
        <div id="canvas-wrap"><canvas id="sig-canvas"></canvas></div>
        <div style="margin-top:15px; display:flex; gap:15px;">
            <button class="btn" style="background:#28a745; width:120px;" onclick="applySignatureToAll()">OK</button>
            <button class="btn" style="background:#dc3545" onclick="pad.clear()">LIMPAR</button>
            <button class="btn" style="background:#6c757d" onclick="closeModal()">VOLTAR</button>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let pdfData, pad, sigBase64;
        const view = document.getElementById('viewer');

        function openModal() {
            if (!view.hasChildNodes()) return alert("Abra o PDF!");
            document.getElementById('modal').style.display = 'flex';
            
            // Força o ajuste do canvas ao tamanho real do wrap (que é 90% da tela)
            const c = document.getElementById('sig-canvas');
            const wrap = document.getElementById('canvas-wrap');
            const dpr = window.devicePixelRatio || 1;
            
            c.width = wrap.offsetWidth * dpr;
            c.height = wrap.offsetHeight * dpr;
            const ctx = c.getContext("2d");
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
            
            if (pad) pad.off();
            pad = new SignaturePad(c, { 
                minWidth: 1.5, 
                maxWidth: 4,
                velocityFilterWeight: 0.7 
            });
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function applySignatureToAll() {
            if (pad.isEmpty()) return alert("Assine primeiro!");
            sigBase64 = pad.toDataURL();
            const pages = document.querySelectorAll('.pdf-page-wrapper');
            pages.forEach(page => {
                const old = page.querySelector('.sig-box');
                if(old) old.remove();

                const box = document.createElement('div');
                box.className = 'sig-box';
                box.style.left = "20px"; box.style.top = "20px";
                box.innerHTML = `<img src="${sigBase64}"><div class="resizer"></div>`;
                
                box.addEventListener("touchmove", (e) => {
                    if(e.target.classList.contains('resizer')) return;
                    const r = page.getBoundingClientRect();
                    const t = e.touches[0];
                    box.style.left = (t.clientX - r.left - (box.offsetWidth/2)) + "px";
                    box.style.top = (t.clientY - r.top - (box.offsetHeight/2)) + "px";
                });

                box.querySelector('.resizer').addEventListener("touchmove", (e) => {
                    e.stopPropagation();
                    const t = e.touches[0];
                    const r = box.getBoundingClientRect();
                    const newW = t.clientX - r.left;
                    if (newW > 40 && newW < 400) {
                        box.style.width = newW + "px";
                        box.style.height = (newW * 0.46) + "px";
                    }
                });
                page.appendChild(box);
            });
            document.getElementById('final-tools').style.display = 'block';
            closeModal();
        }

        document.getElementById('pdf-in').onchange = async (e) => {
            const f = e.target.files[0]; if (!f) return;
            pdfData = await f.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;
            view.innerHTML = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const p = await pdf.getPage(i);
                const w = document.createElement('div'); w.className = 'pdf-page-wrapper';
                const c = document.createElement('canvas');
                const vp = p.getViewport({scale: (view.clientWidth * 0.95) / p.getViewport({scale:1}).width});
                c.width = vp.width; c.height = vp.height;
                await p.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
                w.appendChild(c); view.appendChild(w);
            }
        };

        async function saveFinalPdf() {
            const doc = await PDFDocument.load(pdfData);
            const sigPng = await doc.embedPng(sigBase64);
            const pdfPages = doc.getPages();
            const htmlPages = document.querySelectorAll('.pdf-page-wrapper');

            htmlPages.forEach((htmlPage, i) => {
                const box = htmlPage.querySelector('.sig-box');
                if (box) {
                    const p = pdfPages[i];
                    const { width, height } = p.getSize();
                    const rx = parseFloat(box.style.left) / htmlPage.offsetWidth;
                    const ry = parseFloat(box.style.top) / htmlPage.offsetHeight;
                    const rw = box.offsetWidth / htmlPage.offsetWidth;
                    const rh = box.offsetHeight / htmlPage.offsetHeight;

                    p.drawImage(sigPng, {
                        x: width * rx,
                        y: height - (height * ry) - (height * rh),
                        width: width * rw, height: height * rh
                    });
                }
            });

            const bytes = await doc.save();
            const blob = new Blob([bytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "PDF_Assinado_Luciano.pdf";
            link.click();
        }
    </script>
</body>
</html>
