<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assinador v5.71 - Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #111; color: #fff; overflow: hidden; }
        header { background: #000; padding: 10px; display: flex; gap: 8px; justify-content: center; border-bottom: 2px solid #333; height: 60px; }
        .btn { padding: 8px 12px; border: none; border-radius: 4px; font-weight: bold; color: #fff; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        #viewer { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; align-items: center; background: #1e1e1e; }
        .page-box { position: relative; background: #fff; margin-bottom: 20px; line-height: 0; box-shadow: 0 4px 10px #000; }
        canvas { max-width: 100%; height: auto; }
        
        /* OVERLAY DE ASSINATURA - FOCO NO LIMITE TOTAL */
        #sign-zone { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 10000; display: none; flex-direction: column; }
        #pad-box { flex: 1; margin: 10px; background: #fff; position: relative; border: 2px solid #444; border-radius: 4px; overflow: hidden; }
        #sig-canvas { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; touch-action: none; }
        
        .sig-item { position: absolute; z-index: 100; width: 160px; border: 2px dashed #3498db; background: rgba(52,152,219,0.2); touch-action: none; }
        .sig-item img { width: 100%; display: block; pointer-events: none; }
        #footer-tool { position: fixed; bottom: 0; width: 100%; padding: 12px; background: rgba(0,0,0,0.9); display: none; justify-content: center; z-index: 500; }
    </style>
</head>
<body>
    <header>
        <button class="btn" style="background:#3498db" onclick="document.getElementById('f').click()">1. ABRIR PDF</button>
        <button class="btn" style="background:#f39c12" onclick="openPad()">2. ASSINAR</button>
        <input type="file" id="f" style="display:none" accept="application/pdf">
    </header>

    <div id="viewer">Aguardando manual...</div>

    <div id="footer-tool">
        <button class="btn" style="background:#2ecc71; width: 80%; height: 44px; font-size: 13px;" onclick="saveAllPages()">SALVAR EM TODAS AS PÁGINAS</button>
    </div>

    <div id="sign-zone">
        <div id="pad-box"><canvas id="sig-canvas"></canvas></div>
        <div style="padding:10px; display:flex; gap:8px; background:#000;">
            <button class="btn" style="background:#2ecc71; flex:1; height: 44px;" onclick="applySig()">CONFIRMAR</button>
            <button class="btn" style="background:#e74c3c; flex:1; height: 44px;" onclick="spad.clear()">LIMPAR</button>
            <button class="btn" style="background:#555; flex:1; height: 44px;" onclick="closePad()">VOLTAR</button>
        </div>
    </div>

    <script>
        let pdfBytes, spad, sigData;
        const viewer = document.getElementById('viewer');

        document.getElementById('f').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            pdfBytes = await file.arrayBuffer();
            renderPDF();
        };

        async function renderPDF() {
            viewer.innerHTML = "Carregando...";
            const pdf = await pdfjsLib.getDocument({data: pdfBytes}).promise;
            viewer.innerHTML = "";
            for(let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const box = document.createElement('div');
                box.className = 'page-box';
                const cv = document.createElement('canvas');
                const vp = page.getViewport({scale: (window.innerWidth * 0.95) / page.getViewport({scale:1}).width});
                cv.width = vp.width; cv.height = vp.height;
                await page.render({canvasContext: cv.getContext('2d'), viewport: vp}).promise;
                box.appendChild(cv);
                viewer.appendChild(box);
            }
        }

        function openPad() {
            document.getElementById('sign-zone').style.display = 'flex';
            const scv = document.getElementById('sig-canvas');
            
            // Força reset físico do canvas para evitar o erro do "topo da tela"
            const ratio = window.devicePixelRatio || 1;
            scv.width = scv.clientWidth * ratio;
            scv.height = scv.clientHeight * ratio;
            scv.getContext("2d").scale(ratio, ratio);

            if(!spad) {
                spad = new SignaturePad(scv, {penColor: 'navy', minWidth: 2, maxWidth: 4});
            } else {
                spad.clear();
            }
        }

        function closePad() { document.getElementById('sign-zone').style.display = 'none'; }

        function applySig() {
            if(spad.isEmpty()) return;
            sigData = spad.toDataURL();
            closePad();
            const first = document.querySelector('.page-box');
            if(!first) return;

            const old = document.getElementById('sig-floating');
            if(old) old.remove();

            const div = document.createElement('div');
            div.id = 'sig-floating';
            div.className = 'sig-item';
            div.style.left = "20px"; div.style.top = "20px";
            div.innerHTML = `<img src="${sigData}">`;

            div.addEventListener('touchmove', (e) => {
                e.preventDefault();
                let t = e.touches[0];
                let rect = first.getBoundingClientRect();
                div.style.left = (t.pageX - rect.left - 80) + "px";
                div.style.top = (t.pageY - rect.top - 40) + "px";
            }, {passive: false});

            first.appendChild(div);
            document.getElementById('footer-tool').style.display = 'flex';
        }

        async function saveAllPages() {
            const doc = await PDFLib.PDFDocument.load(pdfBytes);
            const img = await doc.embedPng(sigData);
            const pages = doc.getPages();
            const floating = document.getElementById('sig-floating');
            const wRect = floating.parentElement.getBoundingClientRect();
            const sRect = floating.getBoundingClientRect();
            
            const xPct = (sRect.left - wRect.left) / wRect.width;
            const yPct = (sRect.top - wRect.top) / wRect.height;
            const wPct = sRect.width / wRect.width;

            pages.forEach(page => {
                const { width, height } = page.getSize();
                const drawW = width * wPct;
                const drawH = drawW * (sRect.height / sRect.width);
                page.drawImage(img, {
                    x: width * xPct,
                    y: height - (height * yPct) - drawH,
                    width: drawW, height: drawH
                });
            });

            const bytes = await doc.save();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([bytes], {type: 'application/pdf'}));
            link.download = "DUCATO_ASSINADO.pdf";
            link.click();
        }
    </script>
</body>
</html>
