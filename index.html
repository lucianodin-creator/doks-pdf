<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MEUPDF PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; tap-highlight-color: transparent; margin: 0; padding: 0; }
        :root { --vh: 100vh; }
        body { font-family: sans-serif; background: #111; height: var(--vh); width: 100vw; display: flex; flex-direction: column; overflow: hidden; position: fixed; }
        .header { height: 50px; background: #4169E1; color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 10000; flex-shrink: 0; }
        .container { flex: 1; overflow-y: auto; background: #222; position: relative; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        #pdf-wrapper { position: relative; transform-origin: top center; display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; }
        .page-container { position: relative; background: #fff; box-shadow: 0 0 15px #000; margin-bottom: 10px; line-height: 0; }
        canvas { display: block; width: 100% !important; height: auto !important; }
        .zoom-controls { position: fixed; right: 10px; top: 70px; display: flex; flex-direction: column; gap: 10px; z-index: 9999; }
        .btn-zoom { width: 45px; height: 45px; border-radius: 10px; border: none; background: #ff6d00; color: #fff; font-size: 24px; font-weight: bold; }
        .sig-box { position: absolute; border: 2px dashed #4169E1; z-index: 5000; touch-action: none; background: rgba(65, 105, 225, 0.05); display: flex; align-items: center; justify-content: center; transform: translate(0,0); }
        .sig-box img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .sig-tools { position: absolute; top: -45px; left: 0; display: flex; gap: 5px; z-index: 9999; }
        .btn-tool { width: 38px; height: 38px; border-radius: 6px; border: none; color: white; font-size: 16px; }
        .handle { position: absolute; width: 22px; height: 22px; background: #4169E1; border: 2px solid #fff; border-radius: 50%; z-index: 5001; bottom: -11px; right: -11px; }
        .bottom-bar { height: 75px; background: #000; display: flex; align-items: center; padding: 0 15px; z-index: 9999; flex-shrink: 0; }
        .btn-action { flex: 1; height: 50px; border-radius: 12px; border: none; color: white; font-weight: bold; font-size: 14px; margin: 0 5px; }
        #sig-modal { position: fixed; inset: 0; background: #fff; z-index: 30000; display: none; flex-direction: column; }
        #sig-pad { flex: 1; width: 100%; background: #fdfdfd; touch-action: none; }
        .modal-btns { height: 70px; display: flex; padding: 10px; gap: 10px; background: #111; }
        .modal-btns button { flex: 1; border: none; border-radius: 8px; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><strong>MEUPDF PRO</strong><label for="file-in" style="background:#fff; color:#4169E1; padding:6px 12px; border-radius:6px; font-weight:bold; font-size:12px;">📂 ABRIR PDF</label><input type="file" id="file-in" style="display:none" accept="application/pdf"></div>
    <div class="container" id="scroll-cont">
        <div class="zoom-controls"><button class="btn-zoom" onclick="changeZoom(0.15)">+</button><button class="btn-zoom" onclick="changeZoom(-0.15)">-</button></div>
        <div id="pdf-wrapper"></div>
    </div>
    <div class="bottom-bar">
        <button class="btn-action" style="background:#4169E1" onclick="abrirModal()">🖋️ ASSINAR</button>
        <button class="btn-action" style="background:#2e7d32" onclick="gerarPDF()">✔ SALVAR</button>
    </div>
    <div id="sig-modal">
        <canvas id="sig-pad"></canvas>
        <div class="modal-btns">
            <button onclick="fecharModal()" style="background:#444">SAIR</button>
            <button onclick="signaturePad.clear()" style="background:#e67e22">LIMPAR</button>
            <button onclick="confirmSig()" style="background:#2e7d32">CONFIRMAR</button>
        </div>
    </div>

    <script>
        const setVH = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight}px`);
        window.addEventListener('resize', setVH); setVH();
        const { pdfjsLib } = globalThis;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let signaturePad, pdfDoc = null, zoomScale = 1.0, pdfName = "assinado.pdf";

        document.getElementById('file-in').onchange = async (e) => {
            const file = e.target.files[0]; if(!file) return;
            pdfName = file.name.replace(".pdf", "_assinado.pdf");
            const reader = new FileReader();
            reader.onload = async function() { 
                pdfDoc = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise; 
                renderPages(); 
            };
            reader.readAsArrayBuffer(file);
        };

        async function renderPages() {
            const wrapper = document.getElementById('pdf-wrapper'); wrapper.innerHTML = '';
            const screenW = document.getElementById('scroll-cont').clientWidth - 20;
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const vp = page.getViewport({scale: (screenW / page.getViewport({scale:1}).width)});
                const container = document.createElement('div');
                container.className = 'page-container'; container.id = `page-${i}`;
                container.style.width = vp.width + 'px'; container.style.height = vp.height + 'px';
                const canvas = document.createElement('canvas');
                canvas.width = vp.width; canvas.height = vp.height;
                container.appendChild(canvas); wrapper.appendChild(container);
                await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
            }
        }

        function abrirModal() {
            document.getElementById('sig-modal').style.display = 'flex';
            const canvas = document.getElementById('sig-pad');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight - 70;
            if (!signaturePad) { signaturePad = new SignaturePad(canvas, { minWidth: 1.2, maxWidth: 3.8, throttle: 0 }); }
            else { signaturePad.clear(); }
        }

        function fecharModal() { document.getElementById('sig-modal').style.display = 'none'; }
        function confirmSig() { if (signaturePad.isEmpty()) return; addSigToPage(1, signaturePad.toDataURL()); fecharModal(); }

        function addSigToPage(pNum, src, top=100, left=50, w=160, h=70, angle=0) {
            const page = document.getElementById(`page-${pNum}`); if (!page) return;
            const div = document.createElement('div');
            div.className = 'sig-box'; div.dataset.angle = angle;
            div.style.top = top+'px'; div.style.left = left+'px'; div.style.width = w+'px'; div.style.height = h+'px';
            div.innerHTML = `
                <div class="sig-tools">
                    <button class="btn-tool" style="background:#e74c3c" onclick="this.closest('.sig-box').remove()">🗑️</button>
                    <button class="btn-tool" style="background:#27ae60" onclick="girarSig(this)">🔄</button>
                    <button class="btn-tool" style="background:#2980b9" onclick="clonarPosicao(this)">📋</button>
                </div>
                <img src="${src}" style="transform: rotate(${angle}deg)">
                <div class="handle"></div>
            `;
            page.appendChild(div);
            setupInteract(div);
        }

        function clonarPosicao(btn) {
            const el = btn.closest('.sig-box');
            const src = el.querySelector('img').src, a = el.dataset.angle;
            const w = el.offsetWidth, h = el.offsetHeight;
            const t = parseFloat(el.style.top), l = parseFloat(el.style.left);
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                if (`page-${i}` === el.parentElement.id) continue;
                addSigToPage(i, src, t, l, w, h, a);
            }
        }

        function girarSig(btn) {
            const el = btn.closest('.sig-box'); const img = el.querySelector('img');
            let a = (parseInt(el.dataset.angle) || 0) + 90; if (a >= 360) a = 0;
            el.dataset.angle = a; img.style.transform = `rotate(${a}deg)`;
        }

        function setupInteract(el) {
            let x = 0, y = 0;
            interact(el).draggable({
                listeners: { move(e) {
                    x += e.dx; y += e.dy;
                    e.target.style.transform = `translate(${x}px, ${y}px)`;
                }, end(e) {
                    const style = window.getComputedStyle(e.target);
                    const matrix = new WebKitCSSMatrix(style.transform);
                    e.target.style.top = (parseFloat(e.target.style.top) + matrix.m42) + "px";
                    e.target.style.left = (parseFloat(e.target.style.left) + matrix.m41) + "px";
                    e.target.style.transform = "translate(0px, 0px)";
                    x = 0; y = 0;
                }}
            }).resizable({
                edges: { right: true, bottom: true },
                listeners: { move(e) {
                    let { width, height } = e.rect;
                    Object.assign(e.target.style, { width: `${width}px`, height: `${height}px` });
                }}
            });
        }

        function changeZoom(s) {
            zoomScale = Math.max(0.4, Math.min(2.0, zoomScale + s));
            document.getElementById('pdf-wrapper').style.transform = `scale(${zoomScale})`;
        }

        async function gerarPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF('p', 'pt', 'a4');
            const pages = document.querySelectorAll('.page-container');
            for (let i = 0; i < pages.length; i++) {
                const canvas = pages[i].querySelector('canvas');
                if (i > 0) doc.addPage();
                doc.addImage(canvas.toDataURL('image/jpeg', 0.85), 'JPEG', 0, 0, 595, 842);
                
                // Pegamos apenas as assinaturas DAQUELA folha específica
                const signatures = pages[i].querySelectorAll('.sig-box');
                signatures.forEach(sig => {
                    const img = sig.querySelector('img').src;
                    const a = parseInt(sig.dataset.angle) || 0;
                    
                    // Cálculo limpo ignorando o zoom visual do wrapper
                    const pW = pages[i].offsetWidth;
                    const pH = pages[i].offsetHeight;
                    
                    const sT = parseFloat(sig.style.top);
                    const sL = parseFloat(sig.style.left);
                    const sW = parseFloat(sig.style.width);
                    const sH = parseFloat(sig.style.height);

                    const x = (sL / pW) * 595;
                    const y = (sT / pH) * 842;
                    const w = (sW / pW) * 595;
                    const h = (sH / pH) * 842;

                    doc.addImage(img, 'PNG', x, y, w, h, null, 'FAST', a);
                });
            }
            doc.save(pdfName);
        }
    </script>
</body>
</html>
