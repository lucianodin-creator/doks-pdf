<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEUPDF PRO - Zoom e Ajuste</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        * { box-sizing: border-box; tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #111; height: 100dvh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 50px; background: #1a73e8; color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 10000; }
        
        .container { flex: 1; overflow-y: auto; background: #222; position: relative; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        #pdf-main-wrapper { position: relative; transform-origin: top center; display: flex; flex-direction: column; gap: 20px; padding-bottom: 150px; }
        .page-container { position: relative; background: #fff; line-height: 0; box-shadow: 0 0 15px #000; }
        canvas { display: block; width: 100% !important; height: auto !important; }

        /* VOLTANDO COM OS BOTÕES DE ZOOM */
        .zoom-controls { position: fixed; right: 15px; top: 70px; display: flex; flex-direction: column; gap: 12px; z-index: 9999; }
        .btn-zoom { width: 50px; height: 50px; border-radius: 12px; border: none; background: #fff; color: #1a73e8; font-size: 26px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* ASSINATURA COM AJUSTE DE LARGURA/ALTURA */
        .sig-container { position: absolute; width: 180px; height: 80px; border: 2px dashed #1a73e8; z-index: 5000; touch-action: none; background: rgba(26, 115, 232, 0.05); }
        .sig-tools { position: absolute; top: -45px; left: 0; display: flex; gap: 8px; z-index: 6000; }
        .btn-tool { width: 38px; height: 38px; border-radius: 50%; border: none; color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 2px 5px #000; }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; align-items: center; padding: 0 15px; z-index: 9999; }
        .btn-action { flex: 1; height: 50px; border-radius: 25px; border: none; color: white; font-weight: bold; font-size: 16px; margin: 0 5px; }
        
        #sig-modal { position: fixed; inset: 0; background: #fff; z-index: 30000; display: none; flex-direction: column; }
        #sig-pad { flex: 1; width: 100%; touch-action: none; }
        .modal-btns { height: 80px; display: flex; padding: 10px; gap: 10px; background: #f0f0f0; }
        .modal-btns button { flex: 1; border: none; border-radius: 10px; color: white; font-weight: bold; }

        @media (orientation: landscape) {
            #sig-modal { flex-direction: row; }
            .modal-btns { flex-direction: column; width: 130px; height: 100%; }
        }
    </style>
</head>
<body>

    <div class="header">
        <strong>MEUPDF PRO</strong>
        <label for="file-in" style="background:#fff; color:#1a73e8; padding:5px 12px; border-radius:6px; font-weight:bold">📂 ABRIR PDF</label>
        <input type="file" id="file-in" style="display:none" accept="application/pdf">
    </div>

    <div class="container" id="scroll-cont">
        <div class="zoom-controls">
            <button class="btn-zoom" onclick="changeZoom(0.1)">+</button>
            <button class="btn-zoom" onclick="changeZoom(-0.1)">-</button>
        </div>
        <div id="pdf-main-wrapper"></div>
    </div>

    <div class="bottom-bar">
        <button class="btn-action" style="background:#1a73e8" onclick="abrirModal()">🖋️ ASSINAR</button>
        <button class="btn-action" style="background:#2e7d32" onclick="alert('Iniciando Salvamento...')">✔ SALVAR</button>
    </div>

    <div id="sig-modal">
        <canvas id="sig-pad"></canvas>
        <div class="modal-btns">
            <button onclick="fecharModal()" style="background:#546e7a">Sair</button>
            <button onclick="signaturePad.clear()" style="background:#ffa000">Limpar</button>
            <button onclick="confirmarAssinatura()" style="background:#2e7d32">Confirmar</button>
        </div>
    </div>

    <script>
        const { pdfjsLib } = globalThis;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let signaturePad, pdfDoc = null, zoomBase = 1.0;

        document.getElementById('file-in').onchange = async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                pdfDoc = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                renderPages();
            };
            reader.readAsArrayBuffer(file);
        };

        async function renderPages() {
            const wrapper = document.getElementById('pdf-main-wrapper');
            wrapper.innerHTML = '';
            const width = document.getElementById('scroll-cont').clientWidth - 30;
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({scale: (width / page.getViewport({scale:1}).width) * 2});
                const div = document.createElement('div');
                div.className = 'page-container';
                div.id = `page-${i}`;
                const canvas = document.createElement('canvas');
                canvas.height = viewport.height; canvas.width = viewport.width;
                div.appendChild(canvas);
                wrapper.appendChild(div);
                await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
            }
        }

        function changeZoom(delta) {
            zoomBase += delta;
            document.getElementById('pdf-main-wrapper').style.transform = `scale(${zoomBase})`;
        }

        function abrirModal() {
            document.getElementById('sig-modal').style.display = 'flex';
            const canvas = document.getElementById('sig-pad');
            if (!signaturePad) signaturePad = new SignaturePad(canvas);
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            signaturePad.clear();
        }
        function fecharModal() { document.getElementById('sig-modal').style.display = 'none'; }

        function confirmarAssinatura() {
            if (signaturePad.isEmpty()) return;
            addSig(1, signaturePad.toDataURL(), 100, 50);
            fecharModal();
        }

        function addSig(pageNum, src, top, left, w = 180, h = 80, trans = 'translate(0px, 0px)') {
            const page = document.getElementById(`page-${pageNum}`);
            if (!page) return;
            const container = document.createElement('div');
            container.className = 'sig-container';
            container.style.width = w + 'px'; container.style.height = h + 'px';
            container.style.top = top + 'px'; container.style.left = left + 'px';
            container.style.transform = trans;
            container.innerHTML = `
                <div class="sig-tools">
                    <button class="btn-tool" style="background:#d32f2f" onclick="this.parentElement.parentElement.remove()">🗑️</button>
                    <button class="btn-tool" style="background:#1976d2" onclick="replicar(this)">📋</button>
                </div>
                <img src="${src}" style="width:100%; height:100%; pointer-events:none;">
            `;
            page.appendChild(container);
            setupInteract(container);
        }

        function replicar(btn) {
            const el = btn.parentElement.parentElement;
            const src = el.querySelector('img').src;
            const top = parseInt(el.style.top);
            const left = parseInt(el.style.left);
            const w = parseInt(el.style.width);
            const h = parseInt(el.style.height);
            const trans = el.style.transform;
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                if (`page-${i}` === el.parentElement.id) continue;
                addSig(i, src, top, left, w, h, trans);
            }
            alert("Replicado em todas as folhas!");
        }

        function setupInteract(el) {
            let x = 0, y = 0, angle = 0;
            const matrix = new WebKitCSSMatrix(window.getComputedStyle(el).transform);
            x = matrix.m41; y = matrix.m42;

            interact(el)
                .draggable({ listeners: { move(e) { 
                    x += e.dx; y += e.dy; 
                    e.target.style.transform = `translate(${x}px, ${y}px) rotate(${angle}deg)`; 
                } } })
                .resizable({
                    edges: { left: true, right: true, bottom: true, top: true },
                    listeners: { move(e) {
                        let { width, height } = e.rect;
                        x += e.deltaRect.left; y += e.deltaRect.top;
                        Object.assign(e.target.style, { 
                            width: `${width}px`, height: `${height}px`, 
                            transform: `translate(${x}px, ${y}px) rotate(${angle}deg)` 
                        });
                    } }
                })
                .gesturable({ listeners: { move(e) { 
                    angle += e.da;
                    e.target.style.transform = `translate(${x}px, ${y}px) rotate(${angle}deg)`; 
                } } });
        }
    </script>
</body>
</html>
