<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Doks PDF - Oficial</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>


    <style>
        :root {
            --azul-doks: #4169E1;
            --cinza-fundo: #2c2c2c;
            --dourado: #FFD700;
            --laranja-zoom: #FF8C00;
            --verde-sucesso: #2e7d32;
            --amarelo-limpar: #fbc02d;
            --cinza-sair: #757575;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--cinza-fundo); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            font-family: sans-serif;
        }


        /* --- BARRA SUPERIOR --- */
        .header {
            height: 60px; background: var(--azul-doks); color: white;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000; flex-shrink: 0;
        }
        .logo { font-size: 22px; font-weight: bold; letter-spacing: 1px; }
        .header-btns { display: flex; gap: 10px; }
        .btn-top {
            padding: 8px 12px; border-radius: 5px; border: none; 
            font-weight: bold; background: white; color: var(--azul-doks); cursor: pointer;
        }
        .btn-pdf { border: 2.5px solid var(--dourado) !important; color: #333 !important; }


        /* --- ÁREA CENTRAL (VIEWER) --- */
        .viewer-container {
            flex: 1; overflow: auto; display: flex; justify-content: center; 
            padding: 20px; position: relative; scroll-behavior: smooth;
        }
        #pdf-render-area { display: flex; flex-direction: column; gap: 25px; padding-bottom: 100px; }
        .canvas-wrapper { position: relative; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }


        /* --- BOTÕES DE ZOOM (QUADRADOS LARANJA - 200PX DO TOPO) --- */
        .zoom-controls {
            position: fixed; right: 15px; top: 200px; 
            display: flex; flex-direction: column; gap: 12px; z-index: 1500;
        }
        .btn-zoom {
            width: 50px; height: 50px; background: var(--laranja-zoom);
            color: white; border: none; border-radius: 4px; /* QUADRADO */
            font-size: 28px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }


/* BARRA INFERIOR - CORRIGIDA (COLADA NA BORDA) */
.footer {
    position: fixed; 
    bottom: 0; /* Colada no fundo */
    left: 0;
    width: 100%; /* Largura total */
    height: 75px; 
    background: var(--azul-doks); 
    display: flex;
    align-items: center; 
    justify-content: space-around; 
    /* Padding inferior inteligente para não cobrir botões do Android/iOS */
    padding: 10px 10px calc(10px + env(safe-area-inset-bottom)) 10px;
    border-radius: 18px 18px 0 0; /* Arredondado apenas em cima */
    z-index: 2000; /* Acima do PDF */
    box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
}

        /* --- JANELA DE ASSINATURA (MODAL) E AVISO --- */
        #sig-modal { position: fixed; inset: 0; background: white; display: none; flex-direction: column; z-index: 5000; }
        #sig-pad { flex: 1; background: #fdfdfd; touch-action: none; }
        .sig-toolbar { height: 80px; display: flex; gap: 12px; padding: 15px; background: #eee; border-top: 1px solid #ccc; }
        .btn-sig { flex: 1; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 16px; }

        #aviso-giro {
            position: fixed; inset: 0; background: rgba(0,0,0,0.96);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 6000; text-align: center;
        }
        .icon-phone { font-size: 70px; margin-bottom: 20px; animation: rotateAnim 2.5s infinite; }
        @keyframes rotateAnim { 0% {transform:rotate(0)} 50% {transform:rotate(-90deg)} 100% {transform:rotate(0)} }


/* CAIXA DE ASSINATURA NA FOLHA - CORRIGIDA */
.sig-container {
    position: absolute; 
    border: 2px solid rgba(65, 105, 225, 0.7); 
    background: rgba(255, 255, 255, 0.9); /* Fundo branco semi-transparente para destacar o traço */
    cursor: move; 
    touch-action: none;
    z-index: 100; /* Garante que flutua ACIMA das outras páginas */
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}

/* BARRA DE BOTÕES DA ASSINATURA */
.sig-btns-float {
    position: absolute; 
    top: -45px; /* Um pouco mais para cima para não grudar */
    right: 0; 
    display: flex; 
    gap: 8px; 
    background: rgba(0,0,0,0.85); /* Fundo escuro para destacar os ícones */
    padding: 5px; 
    border-radius: 8px;
    z-index: 110; /* Acima da própria caixa de assinatura */
}


    </style>
</head>



<body>

    <header class="header">
        <div class="logo">Doks PDF</div>
        <div class="header-btns">
            <button class="btn-top" onclick="alert('Funcionalidade Recentes em breve')">Recentes</button>
            <label for="file-in" class="btn-top btn-pdf">Abrir PDF</label>
            <input type="file" id="file-in" hidden accept="application/pdf">
        </div>
    </header>


    <main class="viewer-container">
        <div class="zoom-controls">
            <button class="btn-zoom" onclick="changeZoom(0.2)">+</button>
            <button class="btn-zoom" onclick="changeZoom(-0.2)">-</button>
        </div>

        <div id="pdf-render-area"></div>
    </main>


    <footer class="footer">
        <div class="nav-group">
            <button class="btn-footer" onclick="changePage(-1)"><</button>
            <span id="page-info">Pág: 0 / 0</span>
            <button class="btn-footer" onclick="changePage(1)">></button>
        </div>

        <div class="action-group">
            <button class="btn-footer" onclick="startSignProcess()">🖋️ Assinar</button>
            <button class="btn-footer btn-save" onclick="savePDF()">Salvar</button>
        </div>
    </footer>


    <div id="aviso-giro">
        <div class="icon-phone">📱</div>
        <p style="font-size: 20px; font-weight: bold;">Gire o celular</p>
        <p style="color: #bbb; margin-top: 10px;">A assinatura precisa ser feita na horizontal</p>
    </div>


    <div id="sig-modal">
        <canvas id="sig-pad"></canvas>
        <div class="sig-toolbar">
            <button class="btn-sig" style="background:var(--cinza-sair)" onclick="closeSig()">Sair</button>
            <button class="btn-sig" style="background:var(--amarelo-limpar); color:#333" onclick="signaturePad.clear()">Limpar</button>
            <button class="btn-sig" style="background:var(--verde-sucesso)" onclick="confirmSign()">Confirmar</button>
        </div>
    </div>



    <script>
        /* --- VARIÁVEIS GLOBAIS --- */
        let pdfDoc = null, pageNum = 1, scale = 1.0, signaturePad = null;
        const renderArea = document.getElementById('pdf-render-area');
        const pdfjs = window['pdfjs-dist/build/pdf'];
        pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        /* RETORNO DE ERROS PARA O TERMUX / CONSOLE */
        window.onerror = (msg, url, line) => { 
            console.error(`[DOKS-ERROR] -> Mensagem: ${msg} | Linha: ${line}`); 
            return false; 
        };


        /* --- CARREGAMENTO DO PDF --- */
        document.getElementById('file-in').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function() {
                const data = new Uint8Array(this.result);
                pdfjs.getDocument({data}).promise.then(pdf => {
                    pdfDoc = pdf;
                    pageNum = 1;
                    // Escala automática para o PDF caber na largura da tela cinza
                    scale = (window.innerWidth - 40) / 595; 
                    renderPages();
                }).catch(err => console.error("Erro PDF.js:", err));
            };
            reader.readAsArrayBuffer(file);
        };


        /* --- RENDERIZAÇÃO DAS PÁGINAS --- */
        async function renderPages() {
            if (!pdfDoc) return;
            renderArea.innerHTML = ''; 
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({scale: scale});
                
                const wrapper = document.createElement('div');
                wrapper.className = 'canvas-wrapper';
                wrapper.id = `page-container-${i}`;
                
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
                
                wrapper.appendChild(canvas);
                renderArea.appendChild(wrapper);
            }
            updatePageInfo();
        }


        /* --- ZOOM --- */
        function changeZoom(val) {
            if(!pdfDoc) return;
            scale += val;
            if (scale < 0.2) scale = 0.2;
            if (scale > 4.0) scale = 4.0;
            renderPages();
        }


        /* --- NAVEGAÇÃO ENTRE PÁGINAS --- */
        function changePage(dir) {
            if (!pdfDoc) return;
            const target = pageNum + dir;
            if (target >= 1 && target <= pdfDoc.numPages) {
                pageNum = target;
                document.getElementById(`page-container-${pageNum}`).scrollIntoView({behavior: 'smooth'});
                updatePageInfo();
            }
        }

        function updatePageInfo() {
            document.getElementById('page-info').innerText = `Pág: ${pageNum} / ${pdfDoc ? pdfDoc.numPages : 0}`;
        }


        /* --- LÓGICA DE ASSINATURA --- */
        function startSignProcess() {
            if (!pdfDoc) return alert("Abra um PDF primeiro.");
            document.getElementById('aviso-giro').style.display = 'flex';
            window.addEventListener('resize', checkOrientation);
            checkOrientation(); 
        }

        function checkOrientation() {
            // Se largura maior que altura = modo horizontal
            if (window.innerWidth > window.innerHeight) {
                document.getElementById('aviso-giro').style.display = 'none';
                openSigModal();
            }
        }

        function openSigModal() {
            const modal = document.getElementById('sig-modal');
            modal.style.display = 'flex';
            const canvas = document.getElementById('sig-pad');
            canvas.width = modal.offsetWidth;
            canvas.height = modal.offsetHeight - 80;
            signaturePad = new SignaturePad(canvas);
            window.removeEventListener('resize', checkOrientation);
        }

        function closeSig() {
            document.getElementById('sig-modal').style.display = 'none';
            document.getElementById('aviso-giro').style.display = 'none';
        }

        function confirmSign() {
            if (signaturePad.isEmpty()) return alert("Assine antes de confirmar!");
            const dataUrl = signaturePad.toDataURL();
            placeSignatureOnSheet(dataUrl);
            closeSig();
        }

/* --- MANIPULAÇÃO DA ASSINATURA NA FOLHA (CORRIGIDA) --- */
/* --- TRECHO DO MÓDULO 2.1 (JAVE) --- */
function placeSignatureOnSheet(imgData) {
    const container = document.getElementById(`page-container-${pageNum}`);
    const sigDiv = document.createElement('div');
    sigDiv.className = 'sig-container';
    
    // Aqui injetamos o HTML que cria os botões e a imagem da assinatura
    sigDiv.innerHTML = `
        <div class="sig-btns-float">
            <button class="mini-btn" style="background:#2e7d32; color:white;" onclick="cloneToAllPages(this)">📋</button>
            
            <button class="mini-btn" style="background:#4169E1; color:white;" onclick="rotateSignature(this)">🔄</button>
            
            <button class="mini-btn" style="background:#d32f2f; color:white;" onclick="this.parentElement.parentElement.remove()">🗑️</button>
        </div>
        <img src="${imgData}" style="width:100%; height:100%; pointer-events:none;" data-angle="0">
    `;

    container.appendChild(sigDiv);
    makeDraggable(sigDiv);
}


}

        }

/* --- FUNÇÃO DE ARRASTAR (BLINDADA PARA FLUTUAR) --- */
function makeDraggable(el) {
    let startX, startY, initialX, initialY;
    
    el.addEventListener('touchstart', (e) => {
        // Ao tocar, trazemos a assinatura para a camada mais alta de todas
        el.style.zIndex = "999"; 
        
        const t = e.touches[0];
        startX = t.clientX; startY = t.clientY;
        initialX = el.offsetLeft; initialY = el.offsetTop;
        
        const moveHandler = (ev) => {
            const mt = ev.touches[0];
            el.style.left = (initialX + (mt.clientX - startX)) + 'px';
            el.style.top = (initialY + (mt.clientY - startY)) + 'px';
        };
        
        const endHandler = () => {
            // Ao soltar, restauramos o z-index padrão (mas ainda acima da página)
            el.style.zIndex = "100";
            document.removeEventListener('touchmove', moveHandler);
            document.removeEventListener('touchend', endHandler);
        };
        
        document.addEventListener('touchmove', moveHandler, {passive: false});
        document.addEventListener('touchend', endHandler);
    });
}

        }

        function rotateSignature(btn) {
            const img = btn.closest('.sig-container').querySelector('img');
            let angle = parseInt(img.getAttribute('data-angle')) + 90;
            if (angle >= 360) angle = 0;
            img.style.transform = `rotate(${angle}deg)`;
            img.setAttribute('data-angle', angle);
        }

        function cloneToAllPages(btn) {
            const original = btn.closest('.sig-container');
            const imgData = original.querySelector('img').src;
            const top = original.style.top;
            const left = original.style.left;
            const angle = original.querySelector('img').getAttribute('data-angle');

            document.querySelectorAll('.canvas-wrapper').forEach(page => {
                if (page.id === original.parentElement.id) return;
                
                const clone = original.cloneNode(true);
                clone.style.top = top;
                clone.style.left = left;
                clone.querySelector('img').style.transform = `rotate(${angle}deg)`;
                
                page.appendChild(clone);
                makeDraggable(clone);
            });
            alert("Assinatura clonada em todas as páginas!");
        }

        async function savePDF() {
            console.log("[TERMUX-LOG]: Salvando PDF...");
            alert("O PDF está sendo processado para exportação!");
            // Aqui entra a lógica final de geração do PDF com o jsPDF
        }
    </script>
</body>
</html>
