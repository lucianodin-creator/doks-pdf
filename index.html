<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MEUPDF PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; tap-highlight-color: transparent; margin: 0; padding: 0; }
        :root { --vh: 100vh; }
        body { font-family: sans-serif; background: #111; height: var(--vh); width: 100vw; display: flex; flex-direction: column; overflow: hidden; position: fixed; }
        .header { height: 50px; background: #4169E1; color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 10000; flex-shrink: 0; }
        .container { flex: 1; overflow-y: auto; background: #222; position: relative; display: flex; flex-direction: column; align-items: center; padding: 10px; -webkit-overflow-scrolling: touch; }
        #pdf-wrapper { position: relative; transform-origin: top center; display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; }
        .page-container { position: relative; background: #fff; box-shadow: 0 0 15px #000; margin-bottom: 10px; line-height: 0; }
        canvas { display: block; width: 100% !important; height: auto !important; }
        .zoom-controls { position: fixed; right: 10px; top: 70px; display: flex; flex-direction: column; gap: 10px; z-index: 9999; }
        .btn-zoom { width: 45px; height: 45px; border-radius: 10px; border: none; background: #ff6d00; color: #fff; font-size: 24px; font-weight: bold; }
        .sig-box { position: absolute; border: 2px dashed #4169E1; z-index: 5000; touch-action: none; background: rgba(65, 105, 225, 0.05); min-width: 50px; min-height: 30px; display: flex; align-items: center; justify-content: center; }
        .sig-box img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; transition: transform 0.2s; }
        .sig-tools { position: absolute; top: -50px; left: 0; display: flex; gap: 8px; z-index: 9999; }
        .btn-tool { width: 40px; height: 40px; border-radius: 8px; border: none; color: white; font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .handle { position: absolute; width: 24px; height: 24px; background: #4169E1; border: 2px solid #fff; border-radius: 50%; z-index: 5001; bottom: -12px; right: -12px; }
        .bottom-bar { height: 75px; background: #000; display: flex; align-items: center; padding: 0 15px; z-index: 9999; flex-shrink: 0; }
        .btn-action { flex: 1; height: 50px; border-radius: 12px; border: none; color: white; font-weight: bold; font-size: 14px; margin: 0 5px; }
        #sig-modal { position: fixed; inset: 0; background: #fff; z-index: 30000; display: none; flex-direction: column; }
        #sig-pad { flex: 1; width: 100%; background: #fdfdfd; touch-action: none; }
        .modal-btns { height: 70px; display: flex; padding: 10px; gap: 10px; background: #111; }
        .modal-btns button { flex: 1; border: none; border-radius: 8px; color: white; font-weight: bold; }
        .cloning-mode { border: 3px solid #f1c40f !important; }
    </style>
</head>
<body>
    <div class="header"><strong>MEUPDF PRO</strong><label for="file-in" style="background:#fff; color:#4169E1; padding:6px 12px; border-radius:6px; font-weight:bold; font-size:12px;">📂 ABRIR PDF</label><input type="file" id="file-in" style="display:none" accept="application/pdf"></div>
    <div class="container" id="scroll-cont">
        <div class="zoom-controls"><button class="btn-zoom" onclick="changeZoom(0.15)">+</button><button class="btn-zoom" onclick="changeZoom(-0.15)">-</button></div>
        <div id="pdf-wrapper"></div>
    </div>
    <div class="bottom-bar">
        <button class="btn-action" style="background:#4169E1" onclick="abrirModal()">🖋️ ASSINAR</button>
        <button class="btn-action" style="background:#2e7d32" onclick="gerarPDF()">✔ SALVAR</button>
    </div>
    <div id="sig-modal">
        <canvas id="sig-pad"></canvas>
        <div class="modal-btns">
            <button onclick="fecharModal()" style="background:#444">SAIR</button>
            <button onclick="signaturePad.clear()" style="background:#e67e22">LIMPAR</button>
            <button onclick="confirmSig()" style="background:#2e7d32">CONFIRMAR</button>
        </div>
    </div>

    <script>
        const setVH = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight}px`);
        window.addEventListener('resize', setVH); setVH();
        const { pdfjsLib } = globalThis;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let signaturePad, pdfDoc = null, zoomScale = 1.0, pdfName = "assinado.pdf", activeClone = null;

        document.getElementById('file-in').onchange = async (e) => {
            const file = e.target.files[0]; if(!file) return;
            pdfName = file.name.replace(".pdf", "_assinado.pdf");
            const reader = new FileReader();
            reader.onload = async function() { pdfDoc = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise; renderPages(); };
            reader.readAsArrayBuffer(file);
        };

        async function renderPages() {
            const wrapper = document.getElementById('pdf-wrapper'); wrapper.innerHTML = '';
            const width = document.getElementById('scroll-cont').clientWidth - 20;
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const vp = page.getViewport({scale: (width / page.getViewport({scale:1}).width)});
                const container = document.createElement('div');
                container.className = 'page-container'; container.id = `page-${i}`;
                container.onclick = (e) => handlePageClick(i, e);
                const canvas = document.createElement('canvas'); canvas.width = vp.width; canvas.height = vp.height;
                container.appendChild(canvas); wrapper.appendChild(container);
                await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
            }
        }

        function handlePageClick(pNum, e) {
            if (!activeClone) return;
            const page = document.getElementById(`page-${pNum}`);
            const rect = page.getBoundingClientRect();
            // Calcula a posição exata baseada no clique, descontando o zoom
            const x = (e.clientX - rect.left) / zoomScale;
            const y = (e.clientY - rect.top) / zoomScale;
            addSigToPage(pNum, activeClone.src, y - 40, x - 90, activeClone.w, activeClone.h, activeClone.a);
            desativarClonagem();
        }

        function abrirModal() {
            document.getElementById('sig-modal').style.display = 'flex';
            const canvas = document.getElementById('sig-pad');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight - 70;
            if (!signaturePad) { signaturePad = new SignaturePad(canvas, { minWidth: 1, maxWidth: 3.5, throttle: 0 }); }
            else { signaturePad.clear(); }
        }

        function fecharModal() { document.getElementById('sig-modal').style.display = 'none'; }
        function confirmSig() { if (signaturePad.isEmpty()) return; addSigToPage(1, signaturePad.toDataURL()); fecharModal(); }

        function addSigToPage(pNum, src, top=80, left=50, w=180, h=90, angle=0) {
            const page = document.getElementById(`page-${pNum}`); if (!page) return;
            const div = document.createElement('div');
            div.className = 'sig-box'; div.dataset.angle = angle;
            div.style.cssText = `top:${top}px; left:${left}px; width:${w}px; height:${h}px;`;
            div.innerHTML = `<div class="sig-tools"><button class="btn-tool" style="background:#e74c3c" onclick="this.closest('.sig-box').remove()">🗑️</button><button class="btn-tool" style="background:#27ae60" onclick="girarSig(this)">🔄</button><button class="btn-tool" style="background:#f1c40f" onclick="ativarClonagem(this)">📋</button></div><img src="${src}" style="transform: rotate(${angle}deg)"><div class="handle"></div>`;
            page.appendChild(div);
            setupInteract(div);
        }

        function ativarClonagem(btn) {
            const el = btn.closest('.sig-box');
            activeClone = { src: el.querySelector('img').src, a: el.dataset.angle, w: el.offsetWidth, h: el.offsetHeight };
            document.querySelectorAll('.page-container').forEach(p => p.classList.add('cloning-mode'));
            alert("MODO CLONAR: Clique em qualquer página para colar a assinatura.");
        }

        function desativarClonagem() {
            activeClone = null;
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('cloning-mode'));
        }

        function girarSig(btn) {
            const el = btn.closest('.sig-box'); const img = el.querySelector('img');
            let a = (parseInt(el.dataset.angle) || 0) + 90; if (a >= 360) a = 0;
            el.dataset.angle = a; img.style.transform = `rotate(${a}deg)`;
        }

        function setupInteract(el) {
            let x = 0, y = 0;
            interact(el).draggable({ listeners: { move(e) { x += e.dx; y += e.dy; e.target.style.transform = `translate(${x}px, ${y}px)`; } } })
            .resizable({ edges: { right: true, bottom: true }, listeners: { move(e) {
                let { width, height } = e.rect; Object.assign(e.target.style, { width: `${width}px`, height: `${height}px` });
            } } });
        }

        function changeZoom(s) { zoomScale = Math.max(0.4, Math.min(2.0, zoomScale + s)); document.getElementById('pdf-wrapper').style.transform = `scale(${zoomScale})`; }

        async function gerarPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF('p', 'pt', 'a4');
            const pages = document.querySelectorAll('.page-container');
            for (let i = 0; i < pages.length; i++) {
                const canvas = pages[i].querySelector('canvas');
                if (i > 0) doc.addPage();
                doc.addImage(canvas.toDataURL('image/jpeg', 0.9), 'JPEG', 0, 0, 595, 842);
                pages[i].querySelectorAll('.sig-box').forEach(sig => {
                    const rect = sig.getBoundingClientRect(); const pRect = pages[i].getBoundingClientRect();
                    const x = ((rect.left - pRect.left) / (pRect.width)) * 595;
                    const y = ((rect.top - pRect.top) / (pRect.height)) * 842;
                    const w = (rect.width / pRect.width) * 595; const h = (rect.height / pRect.height) * 842;
                    doc.addImage(sig.querySelector('img').src, 'PNG', x, y, w, h, null, 'FAST', parseInt(sig.dataset.angle));
                });
            }
            doc.save(pdfName);
        }
    </script>
</body>
</html>
