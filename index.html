<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MeuPDF v3.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        
        /* TELAS SEPARADAS PARA EVITAR CONFLITO DE GPU */
        #screen-pdf, #screen-sign { position: absolute; inset: 0; display: flex; flex-direction: column; }
        #screen-sign { display: none; background: #fff; z-index: 2000; }

        header { background: #1a1a1a; padding: 10px; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid #333; }
        .btn { padding: 12px 15px; border: none; border-radius: 4px; font-weight: bold; color: white; text-transform: uppercase; font-size: 11px; }
        
        #viewer { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; align-items: center; background: #121212; }
        .pdf-page-wrapper { position: relative; background: white; margin-bottom: 20px; line-height: 0; }
        
        .sig-box { position: absolute; width: 150px; height: 75px; border: 2px dashed #007bff; background: rgba(0,123,255,0.1); z-index: 50; touch-action: none; }
        .sig-box img { width: 100%; height: 100%; pointer-events: none; }
        .resizer { position: absolute; bottom: -10px; right: -10px; width: 30px; height: 30px; background: #007bff; border-radius: 50%; border: 2px solid #fff; }

        #canvas-container { flex: 1; position: relative; background: #fff; display: flex; align-items: center; justify-content: center; touch-action: none; }
        canvas#sig-canvas { width: 100%; height: 100%; touch-action: none; }
        
        .sign-footer { background: #1a1a1a; padding: 15px; display: flex; justify-content: center; gap: 15px; }
        .footer-tools { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; }
    </style>
</head>
<body>
    <div id="screen-pdf">
        <header>
            <input type="file" id="pdf-in" style="display:none" accept="application/pdf">
            <button class="btn" style="background:#007bff" onclick="document.getElementById('pdf-in').click()">1. ABRIR PDF</button>
            <button class="btn" style="background:#f39c12" onclick="showSignScreen()">2. ASSINAR</button>
        </header>
        <div id="viewer"></div>
        <div class="footer-tools" id="final-tools">
            <button class="btn" style="background:#28a745" onclick="saveFinalPdf()">GERAR PDF FINAL</button>
        </div>
    </div>

    <div id="screen-sign">
        <div style="background:#f39c12; color:#000; text-align:center; padding:10px; font-weight:bold; font-size:12px;">ASSINE EM TELA CHEIA ABAIXO</div>
        <div id="canvas-container">
            <canvas id="sig-canvas"></canvas>
        </div>
        <div class="sign-footer">
            <button class="btn" style="background:#28a745; min-width:80px;" onclick="applySignature()">OK</button>
            <button class="btn" style="background:#dc3545" onclick="pad.clear()">LIMPAR</button>
            <button class="btn" style="background:#6c757d" onclick="hideSignScreen()">VOLTAR</button>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let pdfData, pad, sigBase64;

        function showSignScreen() {
            if (!document.getElementById('viewer').hasChildNodes()) return alert("Abra o PDF!");
            document.getElementById('screen-pdf').style.display = 'none';
            document.getElementById('screen-sign').style.display = 'flex';
            setTimeout(initPad, 100);
        }

        function hideSignScreen() {
            document.getElementById('screen-sign').style.display = 'none';
            document.getElementById('screen-pdf').style.display = 'flex';
        }

        function initPad() {
            const c = document.getElementById('sig-canvas');
            const container = document.getElementById('canvas-container');
            const dpr = window.devicePixelRatio || 1;
            c.width = container.offsetWidth * dpr;
            c.height = container.offsetHeight * dpr;
            const ctx = c.getContext("2d");
            ctx.scale(dpr, dpr);
            if (pad) pad.off();
            pad = new SignaturePad(c, { penColor: "rgb(0, 50, 150)", minWidth: 1.5, maxWidth: 4.0 });
        }

        function applySignature() {
            if (pad.isEmpty()) return alert("Assine primeiro!");
            sigBase64 = pad.toDataURL();
            const pages = document.querySelectorAll('.pdf-page-wrapper');
            pages.forEach(page => {
                const old = page.querySelector('.sig-box'); if(old) old.remove();
                const box = document.createElement('div');
                box.className = 'sig-box';
                box.style.left = "30px"; box.style.top = "30px";
                box.innerHTML = `<img src="${sigBase64}"><div class="resizer"></div>`;
                
                box.addEventListener("touchmove", (e) => {
                    if(e.target.classList.contains('resizer')) return;
                    e.preventDefault();
                    const r = page.getBoundingClientRect();
                    const t = e.touches[0];
                    box.style.left = (t.clientX - r.left - (box.offsetWidth/2)) + "px";
                    box.style.top = (t.clientY - r.top - (box.offsetHeight/2)) + "px";
                }, {passive: false});

                box.querySelector('.resizer').addEventListener("touchmove", (e) => {
                    e.stopPropagation(); e.preventDefault();
                    const t = e.touches[0];
                    const r = box.getBoundingClientRect();
                    const nW = t.clientX - r.left;
                    if (nW > 50) { box.style.width = nW + "px"; box.style.height = (nW * 0.5) + "px"; }
                }, {passive: false});
                page.appendChild(box);
            });
            document.getElementById('final-tools').style.display = 'block';
            hideSignScreen();
        }

        document.getElementById('pdf-in').onchange = async (e) => {
            const f = e.target.files[0]; if (!f) return;
            pdfData = await f.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;
            const view = document.getElementById('viewer'); view.innerHTML = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const p = await pdf.getPage(i);
                const w = document.createElement('div'); w.className = 'pdf-page-wrapper';
                const c = document.createElement('canvas');
                const vp = p.getViewport({scale: (view.clientWidth * 0.95) / p.getViewport({scale:1}).width});
                c.width = vp.width; c.height = vp.height;
                await p.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
                w.appendChild(c); view.appendChild(w);
            }
        };

        async function saveFinalPdf() {
            const doc = await PDFDocument.load(pdfData);
            const sigPng = await doc.embedPng(sigBase64);
            const pdfPages = doc.getPages();
            document.querySelectorAll('.pdf-page-wrapper').forEach((htmlP, i) => {
                const box = htmlP.querySelector('.sig-box');
                if (box) {
                    const p = pdfPages[i];
                    const { width, height } = p.getSize();
                    p.drawImage(sigPng, {
                        x: width * (parseFloat(box.style.left) / htmlP.offsetWidth),
                        y: height - (height * (parseFloat(box.style.top) / htmlP.offsetHeight)) - (height * (box.offsetHeight / htmlP.offsetHeight)),
                        width: width * (box.offsetWidth / htmlP.offsetWidth), 
                        height: height * (box.offsetHeight / htmlP.offsetHeight)
                    });
                }
            });
            const bytes = await doc.save();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
            link.download = "Contrato_Assinado.pdf";
            link.click();
        }
    </script>
</body>
</html>
