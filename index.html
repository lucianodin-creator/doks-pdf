<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assinador v5.49 - Limpeza Total</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; overflow-x: hidden; }
        header { background: #111; padding: 10px; display: flex; justify-content: center; gap: 8px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 5000; }
        .btn { height: 44px; border: none; border-radius: 6px; font-weight: bold; color: white; font-size: 11px; cursor: pointer; flex: 1; max-width: 120px; display: flex; align-items: center; justify-content: center; }
        #viewer { padding: 20px; display: flex; flex-direction: column; align-items: center; background: #1e1e1e; min-height: 100vh; }
        .pdf-page-wrapper { position: relative; background: white; margin-bottom: 40px; line-height: 0; display: inline-block; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        .sig-container { position: absolute; z-index: 1000; width: 150px; height: 75px; touch-action: none; cursor: move; border: 2px dashed #3498db; }
        .sig-box { position: relative; width: 100%; height: 100%; }
        .sig-box img { width: 100%; height: 100%; pointer-events: none; object-fit: contain; }
        
        .edge-handle { position: absolute; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #fff; border-radius: 8px; z-index: 2000; }
        .h-side { width: 45px; height: 60px; top: 50%; margin-top: -30px; background: #27ae60; }
        .right-h { right: -50px; } .left-h { left: -50px; }
        .v-side { width: 60px; height: 45px; left: 50%; margin-left: -30px; background: #e74c3c; }
        .top-v { top: -50px; } .bottom-v { bottom: -50px; }
        .rotator-btn { position: absolute; top: -90px; right: -30px; background: #f39c12; width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        #rotate-notice { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #final-tools { position: fixed; bottom: 0; left: 0; width: 100%; display: none; justify-content: center; padding: 15px; background: rgba(0,0,0,0.9); z-index: 5000; }
        #screen-sign { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        #canvas-container { flex: 1; width: 95vw; margin: 10px auto; background: #fff; border-radius: 12px; }
        canvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>
    <header>
        <button class="btn" style="background:#3498db" onclick="document.getElementById('pdf-in').click()">1. ABRIR PDF</button>
        <button class="btn" style="background:#f39c12" onclick="checkOrientation()">2. ASSINAR</button>
        <input type="file" id="pdf-in" style="display:none" accept="application/pdf">
    </header>

    <div id="viewer"></div>
    <div id="rotate-notice"><h2>Gire o celular</h2><p>Horizontal para assinar.</p></div>
    <div id="final-tools"><button class="btn" style="background:#2ecc71; max-width: 280px;" onclick="saveFinal()">SALVAR PDF LIMPO</button></div>

    <div id="screen-sign">
        <div id="canvas-container"><canvas id="sig-canvas"></canvas></div>
        <div style="padding:15px; display:flex; gap:10px; background:#111; justify-content:center;">
            <button class="btn" style="background:#27ae60" onclick="applySignature()">OK</button>
            <button class="btn" style="background:#e74c3c" onclick="pad.clear()">LIMPAR</button>
            <button class="btn" style="background:#7f8c8d" onclick="hideSignScreen()">SAIR</button>
        </div>
    </div>

    <script>
        const { PDFDocument, degrees } = PDFLib;
        let pdfData, pad, sigBase64;

        function checkOrientation() {
            if (window.innerHeight > window.innerWidth && window.innerWidth < 1024) {
                document.getElementById('rotate-notice').style.display = 'flex';
                window.addEventListener('resize', autoOpen);
            } else { showSignScreen(); }
        }
        function autoOpen() { if (window.innerWidth > window.innerHeight) { document.getElementById('rotate-notice').style.display = 'none'; showSignScreen(); window.removeEventListener('resize', autoOpen); } }
        
        function showSignScreen() {
            document.getElementById('screen-sign').style.display = 'flex';
            const canvas = document.getElementById('sig-canvas');
            if (!pad) pad = new SignaturePad(canvas, { penColor: "rgb(0, 0, 80)" });
            setTimeout(() => {
                const r = window.devicePixelRatio || 1;
                canvas.width = canvas.offsetWidth * r; canvas.height = canvas.offsetHeight * r;
                canvas.getContext("2d").scale(r, r); pad.clear();
            }, 300);
        }
        function hideSignScreen() { document.getElementById('screen-sign').style.display = 'none'; }

        function applySignature() {
            if (pad.isEmpty()) return;
            sigBase64 = pad.toDataURL("image/png");
            hideSignScreen();
            createSigBoxes();
        }

        function createSigBoxes() {
            document.querySelectorAll('.pdf-page-wrapper').forEach(page => {
                const container = document.createElement('div');
                container.className = 'sig-container';
                container.style.left = "20%"; container.style.top = "20%";
                container.dataset.rotation = 0;
                container.innerHTML = `<div class="sig-box"><div class="rotator-btn" onclick="rotateBox(this)">↻</div><img src="${sigBase64}"><div class="edge-handle h-side left-h">↔</div><div class="edge-handle h-side right-h">↔</div><div class="edge-handle v-side top-v">↕</div><div class="edge-handle v-side bottom-v">↕</div></div>`;
                
                container.onpointerdown = (e) => {
                    if (e.target.classList.contains('edge-handle') || e.target.classList.contains('rotator-btn')) return;
                    let oX = e.clientX - container.offsetLeft, oY = e.clientY - container.offsetTop;
                    container.setPointerCapture(e.pointerId);
                    container.onpointermove = (ev) => { container.style.left = (ev.clientX - oX)+"px"; container.style.top = (ev.clientY - oY)+"px"; };
                    container.onpointerup = () => { container.onpointermove = null; container.releasePointerCapture(e.pointerId); };
                };

                container.querySelectorAll('.edge-handle').forEach(h => {
                    h.onpointerdown = (e) => {
                        e.stopPropagation();
                        let sW = container.offsetWidth, sH = container.offsetHeight, sX = e.clientX, sY = e.clientY, sL = container.offsetLeft, sT = container.offsetTop;
                        h.setPointerCapture(e.pointerId);
                        h.onpointermove = (ev) => {
                            if (h.classList.contains('right-h')) container.style.width = (sW + (ev.clientX - sX)) + "px";
                            if (h.classList.contains('left-h')) { container.style.width = (sW - (ev.clientX - sX)) + "px"; container.style.left = (sL + (ev.clientX - sX)) + "px"; }
                            if (h.classList.contains('bottom-v')) container.style.height = (sH + (ev.clientY - sY)) + "px";
                            if (h.classList.contains('top-v')) { container.style.height = (sH - (ev.clientY - sY)) + "px"; container.style.top = (sT + (ev.clientY - sY)) + "px"; }
                        };
                        h.onpointerup = () => { h.onpointermove = null; h.releasePointerCapture(e.pointerId); };
                    };
                });
                page.appendChild(container);
            });
            document.getElementById('final-tools').style.display = 'flex';
        }

        function rotateBox(el) {
            const c = el.closest('.sig-container');
            let r = (parseInt(c.dataset.rotation) || 0) + 90;
            c.dataset.rotation = r >= 360 ? 0 : r;
            c.querySelector('img').style.transform = `rotate(${c.dataset.rotation}deg)`;
        }

        document.getElementById('pdf-in').onchange = async (e) => {
            pdfData = await e.target.files[0].arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;
            const view = document.getElementById('viewer'); view.innerHTML = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const p = await pdf.getPage(i);
                const w = document.createElement('div'); w.className = 'pdf-page-wrapper';
                const c = document.createElement('canvas');
                const vp = p.getViewport({scale: (view.clientWidth * 0.9) / p.getViewport({scale:1}).width});
                c.width = vp.width; c.height = vp.height;
                await p.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
                w.appendChild(c); view.appendChild(w);
            }
        };

        async function saveFinal() {
            const doc = await PDFDocument.load(pdfData);
            const sigImg = await doc.embedPng(sigBase64);
            const pages = doc.getPages();
            document.querySelectorAll('.pdf-page-wrapper').forEach((wrapper, i) => {
                const container = wrapper.querySelector('.sig-container');
                if (container && pages[i]) {
                    const page = pages[i];
                    const { width, height } = page.getSize();
                    // LÓGICA DE LIMPEZA: Posicionamento puramente relativo ao wrapper
                    const scX = width / wrapper.offsetWidth;
                    const scY = height / wrapper.offsetHeight;
                    
                    const fW = container.offsetWidth * scX;
                    const fH = container.offsetHeight * scY;
                    const fX = container.offsetLeft * scX;
                    const fY = height - (container.offsetTop * scY) - fH;

                    page.drawImage(sigImg, {
                        x: fX + (fW / 2), y: fY + (fH / 2),
                        width: fW, height: fH,
                        rotate: degrees(-(parseInt(container.dataset.rotation) || 0)),
                        xAnchor: 'center', yAnchor: 'center'
                    });
                }
            });
            const bytes = await doc.save();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
            link.download = "assinatura_limpa.pdf";
            link.click();
        }
    </script>
</body>
</html>
