<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assinador v5.63 - Ultra Estável</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; overflow-x: hidden; position: fixed; width: 100%; height: 100%; }
        header { background: #111; padding: 10px; display: flex; justify-content: center; gap: 8px; border-bottom: 1px solid #333; z-index: 1000; }
        .btn { height: 44px; border: none; border-radius: 6px; font-weight: bold; color: white; font-size: 11px; cursor: pointer; flex: 1; max-width: 120px; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        #viewer { height: calc(100vh - 65px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; align-items: center; background: #1e1e1e; }
        .pdf-page-wrapper { position: relative; background: white; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); line-height: 0; }
        
        #screen-sign { position: fixed; inset: 0; background: #000; z-index: 999999; display: none; flex-direction: column; }
        #canvas-container { flex: 1; width: 96vw; margin: 10px auto; background: #fff; border-radius: 4px; position: relative; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }
        
        .sig-container { position: absolute; z-index: 500; width: 140px; height: 70px; touch-action: none; border: 2px dashed #3498db; background: rgba(52,152,219,0.3); }
        .handle { position: absolute; width: 40px; height: 40px; background: #27ae60; border: 2px solid #fff; border-radius: 50%; right: -20px; bottom: -20px; }
        .rot-btn { position: absolute; width: 40px; height: 40px; background: #f39c12; border: 2px solid #fff; border-radius: 50%; left: -20px; top: -20px; display: flex; align-items: center; justify-content: center; }
        #final-tools { position: fixed; bottom: 0; left: 0; width: 100%; display: none; justify-content: center; padding: 15px; background: #000; z-index: 2000; border-top: 1px solid #333; }
    </style>
</head>
<body>
    <header>
        <button class="btn" style="background:#3498db" onclick="document.getElementById('pdf-in').click()">1. PDF</button>
        <button class="btn" style="background:#f39c12" onclick="showSignScreen()">2. ASSINAR</button>
        <input type="file" id="pdf-in" style="display:none" accept="application/pdf">
    </header>

    <div id="viewer"></div>
    <div id="final-tools"><button class="btn" style="background:#2ecc71; max-width: 250px;" onclick="saveFinal()">GERAR PDF</button></div>

    <div id="screen-sign">
        <div id="canvas-container"><canvas id="sig-canvas"></canvas></div>
        <div style="padding:10px; display:flex; gap:10px; background:#111; justify-content:center;">
            <button class="btn" style="background:#27ae60" onclick="applySignature()">OK</button>
            <button class="btn" style="background:#e74c3c" onclick="pad.clear()">LIMPAR</button>
            <button class="btn" style="background:#7f8c8d" onclick="hideSignScreen()">SAIR</button>
        </div>
    </div>

    <script>
        const { PDFDocument, degrees } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        let pdfData, pad, sigBase64;

        // Impedir recarregamento acidental
        window.onbeforeunload = function() { if(pdfData) return "A gravação pode ser perdida."; };

        window.addEventListener('resize', () => {
            if (pdfData) renderPDF();
            if (document.getElementById('screen-sign').offsetParent !== null) resizeCanvas();
        });

        document.getElementById('pdf-in').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function() {
                pdfData = this.result;
                await renderPDF();
            };
            reader.readAsArrayBuffer(file);
        };

        async function renderPDF() {
            if (!pdfData) return;
            const view = document.getElementById('viewer');
            try {
                const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;
                view.innerHTML = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const p = await pdf.getPage(i);
                    const w = document.createElement('div'); w.className = 'pdf-page-wrapper';
                    const c = document.createElement('canvas');
                    const vp = p.getViewport({scale: (view.clientWidth * 0.9) / p.getViewport({scale:1}).width});
                    c.width = vp.width; c.height = vp.height;
                    await p.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
                    w.appendChild(c); view.appendChild(w);
                }
            } catch (err) { alert("Erro ao renderizar. Tente novamente."); }
        }

        function showSignScreen() {
            document.getElementById('screen-sign').style.display = 'flex';
            const canvas = document.getElementById('sig-canvas');
            if (!pad) pad = new SignaturePad(canvas, { penColor: "rgb(0, 0, 80)", minWidth: 2, maxWidth: 4 });
            resizeCanvas();
        }

        function resizeCanvas() {
            const canvas = document.getElementById('sig-canvas');
            const ratio = window.devicePixelRatio || 1;
            const temp = pad.toData();
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            pad.clear(); pad.fromData(temp);
        }

        function hideSignScreen() { document.getElementById('screen-sign').style.display = 'none'; }

        function applySignature() {
            if (pad.isEmpty()) return;
            sigBase64 = pad.toDataURL("image/png");
            hideSignScreen();
            
            const firstPage = document.querySelector('.pdf-page-wrapper');
            if (!firstPage) return;

            const container = document.createElement('div');
            container.className = 'sig-container';
            container.style.left = "20px"; container.style.top = "20px";
            container.dataset.rotation = 0;
            container.innerHTML = `<div class="rot-btn" onclick="rotateBox(this)">↻</div><div style="width:100%;height:100%;pointer-events:none;"><img src="${sigBase64}" style="width:100%;height:100%;object-fit:contain;"></div><div class="handle"></div>`;
            
            container.onpointerdown = (e) => {
                if (e.target.classList.contains('handle') || e.target.classList.contains('rot-btn')) return;
                let oX = e.clientX - container.offsetLeft, oY = e.clientY - container.offsetTop;
                container.setPointerCapture(e.pointerId);
                container.onpointermove = (ev) => { 
                    container.style.left = (ev.clientX - oX) + "px"; 
                    container.style.top = (ev.clientY - oY) + "px"; 
                };
                container.onpointerup = () => { container.onpointermove = null; container.releasePointerCapture(e.pointerId); };
            };

            const h = container.querySelector('.handle');
            h.onpointerdown = (e) => {
                e.stopPropagation();
                let sW = container.offsetWidth, sX = e.clientX;
                h.setPointerCapture(e.pointerId);
                h.onpointermove = (ev) => { 
                    let nw = sW + (ev.clientX - sX);
                    container.style.width = nw + "px"; container.style.height = (nw * 0.5) + "px";
                };
                h.onpointerup = () => { h.onpointermove = null; h.releasePointerCapture(e.pointerId); };
            };
            firstPage.appendChild(container);
            document.getElementById('final-tools').style.display = 'flex';
        }

        function rotateBox(el) {
            const c = el.closest('.sig-container');
            let r = (parseInt(c.dataset.rotation) || 0) + 90;
            c.dataset.rotation = r >= 360 ? 0 : r;
            c.querySelector('img').style.transform = `rotate(${c.dataset.rotation}deg)`;
        }

        async function saveFinal() {
            const doc = await PDFDocument.load(pdfData);
            const sigImg = await doc.embedPng(sigBase64);
            const pages = doc.getPages();
            
            document.querySelectorAll('.pdf-page-wrapper').forEach((wrapper, i) => {
                const container = wrapper.querySelector('.sig-container');
                if (container && pages[i]) {
                    const page = pages[i];
                    const { width, height } = page.getSize();
                    const wRect = wrapper.getBoundingClientRect();
                    const cRect = container.getBoundingClientRect();
                    const sX = width / wRect.width, sY = height / wRect.height;
                    const dW = cRect.width * sX, dH = cRect.height * sY;
                    const dX = (cRect.left - wRect.left) * sX;
                    const dY = height - ((cRect.top - wRect.top) * sY) - dH;
                    page.drawImage(sigImg, {
                        x: dX + (dW / 2), y: dY + (dH / 2),
                        width: dW, height: dH,
                        rotate: degrees(-(parseInt(container.dataset.rotation) || 0)),
                        xAnchor: 'center', yAnchor: 'center'
                    });
                }
            });
            const bytes = await doc.save();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
            link.download = "PDF_ASSINADO.pdf";
            link.click();
        }
    </script>
</body>
</html>
