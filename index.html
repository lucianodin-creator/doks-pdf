<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assinatura de PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; }
        #toolbar { background: #333; color: white; padding: 10px; width: 100%; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
        #pdf-wrapper { position: relative; margin-top: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.2); line-height: 0; z-index: 1; }
        canvas { max-width: 100%; height: auto; }
        
        /* AQUI ESTÁ A CORREÇÃO: Aumentamos o z-index para 999 */
        #draggable-sig {
            position: absolute; 
            width: 150px; 
            cursor: move; 
            display: none;
            border: 2px dashed #007bff; 
            background: rgba(0, 123, 255, 0.1); 
            touch-action: none;
            z-index: 999; 
        }
        
        #sig-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; flex-direction: column;
        }
        #sig-canvas { background: white; border-radius: 8px; width: 90%; max-width: 400px; height: 200px; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
    </style>
</head>
<body>

<div id="toolbar">
    <input type="file" id="file-in" accept="application/pdf" style="display:none">
    <button class="btn btn-primary" onclick="document.getElementById('file-in').click()">Abrir PDF</button>
    <button class="btn btn-primary" onclick="openSignature()">Assinar</button>
    <button class="btn btn-success" onclick="savePDF()">Salvar PDF</button>
</div>

<div id="pdf-wrapper">
    <canvas id="pdf-render"></canvas>
    <div id="draggable-sig">
        <img id="sig-preview" style="width: 100%; pointer-events: none;">
    </div>
</div>

<div id="sig-modal">
    <canvas id="sig-canvas"></canvas>
    <div style="margin-top: 15px; display: flex; gap: 10px;">
        <button class="btn btn-primary" onclick="applySignature()">Aplicar</button>
        <button class="btn" style="background:#dc3545; color:white;" onclick="document.getElementById('sig-modal').style.display='none'">Fechar</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
