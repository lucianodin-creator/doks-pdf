<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEUPDF PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #111; height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        .header { height: 50px; background: #1a73e8; color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 10000; }
        .container { flex: 1; overflow-y: auto; background: #222; position: relative; display: flex; flex-direction: column; align-items: center; }
        #pdf-main-wrapper { position: relative; display: flex; flex-direction: column; gap: 15px; transform-origin: top center; padding-bottom: 100px; }
        .page-container { position: relative; background: #fff; line-height: 0; box-shadow: 0 0 10px #000; }
        canvas { width: 100% !important; height: auto !important; }

        /* ASSINATURA E FERRAMENTAS */
        .sig-container { position: absolute; width: 180px; height: 80px; border: 2px dashed #1a73e8; z-index: 5000; touch-action: none; background: rgba(26,115,232,0.05); }
        .sig-tools { position: absolute; top: -45px; left: 0; display: flex; gap: 10px; z-index: 6000; }
        .btn-tool { width: 38px; height: 38px; border-radius: 50%; border: none; color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 2px 5px #000; }

        /* MODAL DE ASSINATURA - CORREÇÃO PARA TELA DEITADA */
        #sig-modal { position: fixed; inset: 0; background: #fff; z-index: 30000; display: none; flex-direction: column; }
        #sig-pad { flex: 1; width: 100%; background: #fff; touch-action: none; border-bottom: 2px solid #ddd; }
        .modal-btns { height: 80px; display: flex; padding: 10px; gap: 10px; background: #f5f5f5; }
        .modal-btns button { flex: 1; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 16px; }

        @media (orientation: landscape) {
            #sig-modal { flex-direction: row !important; }
            .modal-btns { flex-direction: column !important; width: 120px !important; height: 100% !important; }
            #sig-pad { border-bottom: none; border-right: 2px solid #ddd; }
        }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; align-items: center; gap: 10px; padding: 0 10px; z-index: 9999; }
        .btn-action { flex: 1; height: 45px; border-radius: 25px; border: none; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <strong>MEUPDF PRO</strong>
        <label for="file-in" style="background:#fff; color:#1a73e8; padding:5px 10px; border-radius:5px; font-size:12px">📂 ABRIR</label>
        <input type="file" id="file-in" style="display:none" accept="application/pdf">
    </div>

    <div class="container" id="scroll-cont">
        <div id="pdf-main-wrapper"></div>
    </div>

    <div class="bottom-bar">
        <button class="btn-action" style="background:#1a73e8" onclick="abrirModal()">🖋️ ASSINAR</button>
        <button class="btn-action" style="background:#2e7d32">✔ SALVAR</button>
    </div>

    <div id="sig-modal">
        <canvas id="sig-pad"></canvas>
        <div class="modal-btns">
            <button onclick="fecharModal()" style="background:#546e7a">Sair</button>
            <button onclick="signaturePad.clear()" style="background:#ffa000">Limpar</button>
            <button onclick="confirmarAssinatura()" style="background:#2e7d32">Confirmar</button>
        </div>
    </div>

    <script>
        const { pdfjsLib } = globalThis;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let signaturePad, pdfDoc = null;

        document.getElementById('file-in').onchange = async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                pdfDoc = await pdfjsLib.getDocument(typedarray).promise;
                renderPages();
            };
            reader.readAsArrayBuffer(file);
        };

        async function renderPages() {
            const wrapper = document.getElementById('pdf-main-wrapper');
            wrapper.innerHTML = '';
            const width = document.getElementById('scroll-cont').clientWidth - 20;
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({scale: (width / page.getViewport({scale:1}).width) * 2});
                const canvas = document.createElement('canvas');
                canvas.height = viewport.height; canvas.width = viewport.width;
                const div = document.createElement('div');
                div.className = 'page-container';
                div.appendChild(canvas);
                wrapper.appendChild(div);
                await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
            }
        }

        function abrirModal() {
            const modal = document.getElementById('sig-modal');
            modal.style.display = 'flex';
            const canvas = document.getElementById('sig-pad');
            if (!signaturePad) signaturePad = new SignaturePad(canvas);
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            signaturePad.clear();
        }
        function fecharModal() { document.getElementById('sig-modal').style.display = 'none'; }

        function confirmarAssinatura() {
            if (signaturePad.isEmpty()) return;
            criarAssinatura(signaturePad.toDataURL());
            fecharModal();
        }

        function criarAssinatura(src) {
            const container = document.createElement('div');
            container.className = 'sig-container';
            container.innerHTML = `
                <div class="sig-tools">
                    <button class="btn-tool" style="background:#d32f2f" onclick="this.parentElement.parentElement.remove()">🗑️</button>
                    <button class="btn-tool" style="background:#1976d2" onclick="clonar(this)">📋</button>
                </div>
                <img src="${src}" style="width:100%; height:100%; pointer-events:none;">
            `;
            container.style.top = (document.getElementById('scroll-cont').scrollTop + 60) + 'px';
            container.style.left = '40px';
            document.getElementById('pdf-main-wrapper').appendChild(container);
            aplicarInteract(container);
        }

        function clonar(btn) {
            const src = btn.parentElement.parentElement.querySelector('img').src;
            criarAssinatura(src);
        }

        function aplicarInteract(el) {
            let x = 0, y = 0;
            interact(el)
                .draggable({ listeners: { move(e) { x += e.dx; y += e.dy; e.target.style.transform = `translate(${x}px, ${y}px)`; } } })
                .resizable({
                    edges: { left: true, right: true, bottom: true, top: true },
                    listeners: { move(e) {
                        let { width, height } = e.rect;
                        x += e.deltaRect.left; y += e.deltaRect.top;
                        Object.assign(e.target.style, { width: `${width}px`, height: `${height}px`, transform: `translate(${x}px, ${y}px)` });
                    } }
                });
        }
    </script>
</body>
</html>
