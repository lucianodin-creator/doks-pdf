<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuPDF Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #2c3e50; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #toolbar { background: #1a252f; padding: 15px; display: flex; justify-content: center; gap: 10px; z-index: 100; border-bottom: 2px solid #34495e; }
        .btn { padding: 12px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; text-transform: uppercase; font-size: 12px; }
        .btn-open { background: #3498db; }
        .btn-sign { background: #f39c12; }
        .btn-save { background: #27ae60; }
        
        #pdf-main-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; background: #34495e; }
        .page-wrapper { position: relative; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); line-height: 0; margin-bottom: 10px; }
        
        #draggable-sig {
            position: absolute; width: 150px; height: 65px; display: none; 
            border: 2px dashed #3498db; background: rgba(52, 152, 219, 0.2); 
            touch-action: none; z-index: 999; cursor: move;
        }
        #btn-duplicate { position: absolute; top: -40px; left: 0; background: #3498db; color: white; border: none; border-radius: 5px; padding: 8px; font-size: 10px; }
        #resizer { position: absolute; bottom: -5px; right: -5px; width: 30px; height: 30px; background: #3498db; clip-path: polygon(100% 0, 100% 100%, 0 100%); cursor: nwse-resize; }

        #sig-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; flex-direction: column;
        }
        #sig-canvas-container { background: white; border-radius: 12px; width: 92%; height: 60%; overflow: hidden; }
        #sig-canvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>
    <div id="toolbar">
        <input type="file" id="file-in" accept="application/pdf" style="display:none">
        <button class="btn btn-open" onclick="document.getElementById('file-in').click()">Abrir</button>
        <button class="btn btn-sign" onclick="openSignature()">Assinar</button>
        <button class="btn btn-save" onclick="savePDF()">Salvar</button>
    </div>

    <div id="pdf-main-container"></div>

    <div id="draggable-sig">
        <button id="btn-duplicate" type="button">TODAS PÁG: OFF</button>
        <img id="sig-preview" style="width:100%; height:100%; pointer-events:none; object-fit:contain;">
        <div id="resizer"></div>
    </div>

    <div id="sig-modal">
        <h3 style="margin-bottom:15px;">Assine no espaço branco</h3>
        <div id="sig-canvas-container"><canvas id="sig-canvas"></canvas></div>
        <div style="margin-top: 25px; display: flex; gap: 20px;">
            <button class="btn btn-save" id="btn-confirm-sig">Confirmar</button>
            <button class="btn" style="background:#e74c3c" onclick="closeModal()">Sair</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
