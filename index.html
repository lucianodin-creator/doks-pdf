<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DOKS PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --app-height: 100vh; }
        body { font-family: sans-serif; background-color: #000; color: white; margin: 0; display: flex; flex-direction: column; height: var(--app-height); width: 100vw; overflow: hidden; position: fixed; }
        
        .navbar { background-color: #2b52d4; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; height: 55px; z-index: 100; }
        #viewer-container { flex: 1; width: 100%; background: #1a1a1a; overflow: auto; display: flex; flex-direction: column; align-items: center; }
        canvas { border-bottom: 2px solid #333; max-width: 100%; height: auto !important; }

        .zoom-controls { position: fixed; right: 15px; top: 80px; display: flex; flex-direction: column; gap: 10px; z-index: 200; }
        .btn-zoom { background-color: #f39c12; color: white; width: 44px; height: 44px; border-radius: 8px; border: none; font-size: 22px; font-weight: bold; }
        
        .footer { background: #000; padding: 10px 15px; display: flex; gap: 10px; height: 65px; border-top: 1px solid #222; z-index: 100; box-sizing: border-box; }
        .btn-footer { flex: 1; border-radius: 10px; border: none; color: white; font-weight: bold; font-size: 14px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; height: 100%; }
        .btn-assign { background-color: #3b66f5; }
        .btn-save { background-color: #2d8c3c; }

        /* Modal de Assinatura */
        #signature-pad-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 500; flex-direction: column; }
        .rotation-info { background: #2b52d4; color: white; padding: 10px; text-align: center; font-size: 12px; font-weight: bold; }
        .pad-container { flex: 1; position: relative; width: 100%; }
        #signature-canvas { width: 100%; height: 100%; touch-action: none; }
        
        .pad-controls { display: flex; gap: 10px; padding: 15px; background: #eee; }
        .btn-pad { flex: 1; padding: 15px; border-radius: 8px; border: none; color: white; font-weight: bold; text-transform: uppercase; font-size: 13px; }

        input[type="file"] { display: none; }
        .btn-nav { border: none; padding: 8px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .btn-nav-open { background:#fff; color:#2b52d4; }
    </style>
</head>
<body>

    <div class="navbar">
        <div style="font-weight:bold; font-size: 16px;">DOKS PDF</div>
        <label class="btn-nav btn-nav-open">ABRIR <input type="file" id="pdfInput" accept="application/pdf"></label>
    </div>

    <div class="zoom-controls">
        <button class="btn-zoom" onclick="zoomIn()">+</button>
        <button class="btn-zoom" onclick="zoomOut()">-</button>
    </div>

    <div id="viewer-container"></div>

    <div class="footer">
        <button class="btn-footer btn-assign" onclick="openPad()">ASSINAR</button>
        <button class="btn-footer btn-save" onclick="savePdf()">SALVAR</button>
    </div>

    <div id="signature-pad-modal">
        <div class="rotation-info">🔄 GIRE A TELA PARA ASSINAR MELHOR</div>
        <div class="pad-container">
            <canvas id="signature-canvas"></canvas>
        </div>
        <div class="pad-controls">
            <button class="btn-pad" style="background:#546e7a;" onclick="closePad(false)">Sair</button>
            <button class="btn-pad" style="background:#ffa000;" onclick="signaturePad.clear()">Limpar</button>
            <button class="btn-pad" style="background:#388e3c;" onclick="closePad(true)">Confirmar</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let pdfDoc = null;
        let scale = 1.2;
        const container = document.getElementById('viewer-container');
        const signCanvas = document.getElementById('signature-canvas');
        const signaturePad = new SignaturePad(signCanvas, { backgroundColor: 'rgb(255, 255, 255)' });

        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            signCanvas.width = signCanvas.offsetWidth * ratio;
            signCanvas.height = signCanvas.offsetHeight * ratio;
            signCanvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }

        document.getElementById('pdfInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    pdfDoc = await pdfjsLib.getDocument(typedarray).promise;
                    renderAllPages();
                };
                reader.readAsArrayBuffer(file);
            }
        });

        async function renderAllPages() {
            container.innerHTML = '';
            for (let num = 1; num <= pdfDoc.numPages; num++) {
                const page = await pdfDoc.getPage(num);
                const viewport = page.getViewport({ scale });
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                container.appendChild(canvas);
                await page.render({ canvasContext: ctx, viewport }).promise;
            }
        }

        function zoomIn() { scale += 0.2; if(pdfDoc) renderAllPages(); }
        function zoomOut() { scale = Math.max(0.5, scale - 0.2); if(pdfDoc) renderAllPages(); }

        function openPad() {
            document.getElementById('signature-pad-modal').style.display = 'flex';
            resizeCanvas();
        }

        function closePad(confirm) {
            if (confirm && signaturePad.isEmpty()) {
                alert("Por favor, faça sua assinatura.");
                return;
            }
            document.getElementById('signature-pad-modal').style.display = 'none';
            if(confirm) alert("Assinatura confirmada!");
        }

        function savePdf() {
            if (!pdfDoc) return alert("Abra um PDF primeiro.");
            alert("Salvando arquivo assinado...");
        }

        const appHeight = () => document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
        window.addEventListener('resize', () => { appHeight(); resizeCanvas(); });
        appHeight();
    </script>
</body>
</html>
