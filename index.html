<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuPDF v5.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        #screen-pdf, #screen-sign { position: absolute; inset: 0; display: flex; flex-direction: column; }
        #screen-sign { display: none; background: #000; z-index: 2000; }
        header { background: #111; padding: 10px; display: flex; justify-content: center; gap: 8px; border-bottom: 1px solid #444; }
        .btn { padding: 12px 15px; border: none; border-radius: 4px; font-weight: bold; color: white; font-size: 11px; }
        #viewer { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; align-items: center; touch-action: pan-y; }
        .pdf-page-wrapper { position: relative; background: white; margin-bottom: 15px; }
        .sig-box { position: absolute; width: 120px; height: 60px; border: 1.5px dashed #007bff; background: rgba(0,123,255,0.1); }
        .sig-box img { width: 100%; height: 100%; pointer-events: none; }
        
        #canvas-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #1a1a1a; }
        #canvas-wrapper { background: #fff; width: 90vw; height: 45vh; max-width: 600px; position: relative; border: 2px solid #f39c12; }
        canvas#sig-canvas { width: 100%; height: 100%; display: block; touch-action: none; }
    </style>
</head>
<body>
    <div id="screen-pdf">
        <header>
            <input type="file" id="pdf-in" style="display:none" accept="application/pdf">
            <button class="btn" style="background:#3498db" onclick="document.getElementById('pdf-in').click()">1. ABRIR PDF</button>
            <button class="btn" style="background:#f39c12" onclick="showSignScreen()">2. ASSINAR</button>
        </header>
        <div id="viewer"></div>
        <div id="final-tools" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); display:none;">
            <button class="btn" style="background:#27ae60; padding:15px 30px;" onclick="saveFinalPdf()">GERAR PDF FINAL</button>
        </div>
    </div>

    <div id="screen-sign">
        <div style="background:#f39c12; color:#000; padding:10px; text-align:center; font-weight:bold; font-size:12px;">v5.2 - AJUSTE MANUAL DE OFFSET</div>
        <div id="canvas-container">
            <div id="canvas-wrapper"><canvas id="sig-canvas"></canvas></div>
        </div>
        <div style="padding:15px; display:flex; justify-content:center; gap:15px; background:#111;">
            <button class="btn" style="background:#27ae60; min-width:90px;" onclick="applySignature()">OK</button>
            <button class="btn" style="background:#e74c3c" onclick="pad.clear()">LIMPAR</button>
            <button class="btn" style="background:#7f8c8d" onclick="hideSignScreen()">VOLTAR</button>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let pdfData, pad, sigBase64;

        function showSignScreen() {
            document.getElementById('screen-pdf').style.display = 'none';
            document.getElementById('screen-sign').style.display = 'flex';
            setTimeout(initCanvas, 100);
        }
        function hideSignScreen() { document.getElementById('screen-sign').style.display = 'none'; document.getElementById('screen-pdf').style.display = 'flex'; }

        function initCanvas() {
            const canvas = document.getElementById('sig-canvas');
            const wrap = document.getElementById('canvas-wrapper');
            const ratio = window.devicePixelRatio || 1;
            
            canvas.width = wrap.clientWidth * ratio;
            canvas.height = wrap.clientHeight * ratio;
            const ctx = canvas.getContext("2d");
            ctx.scale(ratio, ratio);

            if (pad) pad.off();
            pad = new SignaturePad(canvas, { penColor: "rgb(0, 0, 120)" });

            // CÁLCULO MANUAL ABSOLUTO
            const handleMove = (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;
                
                // Subtraímos a posição do canvas da posição do toque na tela
                // Isso ignora qualquer "mentira" que o navegador conte sobre o offsetX
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                
                const point = { x, y, time: Date.now() };
                
                if (e.type.includes('start') || e.type.includes('down')) pad._strokeBegin(point);
                else if (e.type.includes('move')) pad._strokeUpdate(point);
                else if (e.type.includes('end') || e.type.includes('up')) pad._strokeEnd(point);
            };

            canvas.addEventListener('touchstart', handleMove, {passive: false});
            canvas.addEventListener('touchmove', handleMove, {passive: false});
            canvas.addEventListener('touchend', handleMove, {passive: false});
        }

        function applySignature() {
            if (pad.isEmpty()) return;
            sigBase64 = pad.toDataURL();
            const pages = document.querySelectorAll('.pdf-page-wrapper');
            pages.forEach(page => {
                const old = page.querySelector('.sig-box'); if(old) old.remove();
                const box = document.createElement('div');
                box.className = 'sig-box'; box.style.left = "40px"; box.style.top = "40px";
                box.innerHTML = `<img src="${sigBase64}">`;
                
                box.addEventListener("touchmove", (e) => {
                    const r = page.getBoundingClientRect(); const t = e.touches[0];
                    box.style.left = (t.clientX - r.left - (box.offsetWidth/2)) + "px";
                    box.style.top = (t.clientY - r.top - (box.offsetHeight/2)) + "px";
                });
                page.appendChild(box);
            });
            document.getElementById('final-tools').style.display = 'block';
            hideSignScreen();
        }

        document.getElementById('pdf-in').onchange = async (e) => {
            const f = e.target.files[0]; if (!f) return;
            pdfData = await f.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;
            const view = document.getElementById('viewer'); view.innerHTML = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const p = await pdf.getPage(i);
                const w = document.createElement('div'); w.className = 'pdf-page-wrapper';
                const c = document.createElement('canvas');
                const vp = p.getViewport({scale: (view.clientWidth * 0.96) / p.getViewport({scale:1}).width});
                c.width = vp.width; c.height = vp.height;
                await p.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
                w.appendChild(c); view.appendChild(w);
            }
        };

        async function saveFinalPdf() {
            const doc = await PDFDocument.load(pdfData);
            const sigPng = await doc.embedPng(sigBase64);
            const pdfPages = doc.getPages();
            document.querySelectorAll('.pdf-page-wrapper').forEach((htmlP, i) => {
                const box = htmlP.querySelector('.sig-box');
                if (box) {
                    const p = pdfPages[i]; const { width, height } = p.getSize();
                    p.drawImage(sigPng, {
                        x: width * (parseFloat(box.style.left) / htmlP.offsetWidth),
                        y: height - (height * (parseFloat(box.style.top) / htmlP.offsetHeight)) - (height * (box.offsetHeight / htmlP.offsetHeight)),
                        width: width * (box.offsetWidth / htmlP.offsetWidth), 
                        height: height * (box.offsetHeight / htmlP.offsetHeight)
                    });
                }
            });
            const bytes = await doc.save();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
            link.download = "Contrato_Assinado.pdf";
            link.click();
        }
    </script>
</body>
</html>
