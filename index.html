<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DOKS PDF</title>
    <style>
        /* Ajuste para altura real do celular (evita sumir barra) */
        :root { --app-height: 100vh; }

        body { 
            font-family: sans-serif; 
            background-color: #000; 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: var(--app-height); 
            width: 100vw;
            overflow: hidden; 
            position: fixed; /* Trava a tela para não "quicar" no mobile */
        }
        
        .navbar { 
            background-color: #2b52d4; 
            padding: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            height: 60px; 
            z-index: 100;
        }

        /* Área do PDF com scroll independente */
        #viewer-container { 
            flex: 1; 
            width: 100%; 
            background: #000; 
            overflow: auto; 
            -webkit-overflow-scrolling: touch;
            display: flex;
            justify-content: center;
        }

        #pdf-viewer { width: 100%; height: 100%; border: none; transition: transform 0.2s; transform-origin: top center; }

        /* Botões de Zoom Flutuantes - Tamanho otimizado para dedo */
        .zoom-controls { position: fixed; right: 15px; top: 75px; display: flex; flex-direction: column; gap: 12px; z-index: 200; }
        .btn-zoom { 
            background-color: #f39c12; 
            color: white; 
            width: 48px; 
            height: 48px; 
            border-radius: 10px; 
            border: none; 
            font-size: 24px; 
            font-weight: bold; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
        
        /* RODAPÉ BLINDADO: Sempre visível */
        .footer { 
            background: #000; 
            padding: 10px 15px; 
            display: flex; 
            gap: 10px; 
            height: 80px; 
            border-top: 1px solid #222; 
            z-index: 100;
            box-sizing: border-box;
            padding-bottom: env(safe-area-inset-bottom); /* Suporte para iPhones novos */
        }

        .btn-footer { 
            flex: 1; 
            border-radius: 12px; 
            border: none; 
            color: white; 
            font-weight: bold; 
            font-size: 14px; 
            text-transform: uppercase;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 5px;
        }
        .btn-assign { background-color: #3b66f5; }
        .btn-save { background-color: #2d8c3c; }

        #history-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; width: 80%; z-index: 300; }
    </style>
</head>
<body>

    <div class="navbar">
        <div style="font-weight:bold">📄 DOKS PDF</div>
        <div style="display:flex; gap:5px">
            <button class="btn-nav" onclick="toggleHistory()" style="background:#f39c12; color:white; border:none; padding:8px; border-radius:5px">🕒</button>
            <label style="background:#fff; color:#2b52d4; padding:8px; border-radius:5px; font-size:12px; font-weight:bold">
                📂 ABRIR <input type="file" id="pdfInput" accept="application/pdf" style="display:none">
            </label>
        </div>
    </div>

    <div class="zoom-controls">
        <button class="btn-zoom" onclick="changeZoom(0.2)">+</button>
        <button class="btn-zoom" onclick="changeZoom(-0.2)">-</button>
    </div>

    <div id="viewer-container">
        <iframe id="pdf-viewer"></iframe>
    </div>

    <div class="footer">
        <button class="btn-footer btn-assign">🖋️ ASSINAR</button>
        <button class="btn-footer btn-save">✔️ SALVAR</button>
    </div>

    <script>
        // Script para calcular altura real e evitar o corte do Chrome
        const appHeight = () => {
            document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
        }
        window.addEventListener('resize', appHeight);
        appHeight();

        let currentZoom = 1.0;
        const pdfViewer = document.getElementById('pdf-viewer');
        const pdfInput = document.getElementById('pdfInput');

        pdfInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                pdfViewer.src = URL.createObjectURL(file) + "#toolbar=0";
                currentZoom = 1.0;
                pdfViewer.style.transform = `scale(1)`;
            }
        });

        function changeZoom(delta) {
            currentZoom += delta;
            currentZoom = Math.min(Math.max(currentZoom, 0.5), 3);
            pdfViewer.style.transform = `scale(${currentZoom})`;
            pdfViewer.style.width = (currentZoom > 1) ? (100 / currentZoom) + "%" : "100%";
        }

        function toggleHistory() { /* lógica do histórico */ }
    </script>
</body>
</html>
