<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DOKS PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --vh: 100vh; --primary: #2b52d4; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #111; color: #fff; margin: 0; height: var(--vh); overflow: hidden; display: flex; flex-direction: column; position: fixed; width: 100%; }
        
        /* Cabeçalho */
        .navbar { height: 55px; background: var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; flex-shrink: 0; z-index: 100; }
        .logo { font-weight: bold; font-size: 16px; }
        .btn-abrir { background: #fff; color: var(--primary); border: none; padding: 8px 15px; border-radius: 6px; font-size: 12px; font-weight: bold; }

        /* Área do PDF - Ajustada para não travar */
        #viewer-wrapper { flex: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; padding: 15px 0; background: #1a1a1a; -webkit-overflow-scrolling: touch; }
        .page-container { position: relative; margin-bottom: 20px; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.7); line-height: 0; }
        canvas { display: block; }
        .interaction-layer { position: absolute !important; top: 0; left: 0; z-index: 500 !important; }

        /* Zoom - Subi a posição para não bater na barra do Android */
        .zoom-fab { position: fixed; right: 20px; bottom: 100px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; }
        .btn-z { width: 48px; height: 48px; border-radius: 50%; border: none; background: #f39c12; color: #fff; font-size: 24px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* Rodapé */
        .footer { height: 75px; background: #000; display: flex; gap: 12px; padding: 12px; border-top: 1px solid #333; flex-shrink: 0; }
        .btn-f { flex: 1; border: none; border-radius: 12px; color: #fff; font-weight: bold; font-size: 14px; text-transform: uppercase; }

        /* Janela de Assinatura */
        #sig-modal { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; flex-direction: column; }
        #sig-canvas { flex: 1; background: #fdfdfd; touch-action: none; }
        .sig-tools { height: 70px; background: #eee; display: flex; justify-content: space-around; align-items: center; padding: 0 10px; }
        .tool-btn { border: none; background: none; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #444; font-size: 18px; }
        .tool-btn span { font-size: 10px; font-weight: bold; }
        .btn-ok { background: #27ae60; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">DOKS PDF</div>
        <label class="btn-abrir">ABRIR PDF <input type="file" id="fileIn" accept="application/pdf" style="display:none"></label>
    </div>

    <div class="zoom-fab">
        <button class="btn-z" onclick="changeZoom(0.2)">+</button>
        <button class="btn-z" onclick="changeZoom(-0.2)">-</button>
    </div>

    <div id="viewer-wrapper"></div>

    <div class="footer">
        <button class="btn-f" style="background:#3498db;" onclick="openP()">ASSINAR</button>
        <button class="btn-f" style="background:#27ae60;" onclick="savePDF()">SALVAR</button>
    </div>

    <div id="sig-modal">
        <div style="background:var(--primary); color:#fff; padding:10px; text-align:center; font-size:12px;">ASSINE ABAIXO</div>
        <canvas id="sig-canvas"></canvas>
        <div class="sig-tools">
            <button class="tool-btn" onclick="pad.clear()"><span>🧹</span><span>LIMPAR</span></button>
            <button class="tool-btn" style="color:#e74c3c" onclick="deleteObj()"><span>🗑️</span><span>APAGAR</span></button>
            <button class="tool-btn" onclick="closeP()"><span>❌</span><span>SAIR</span></button>
            <button class="btn-ok" onclick="confirmSig()">CONFIRMAR</button>
        </div>
    </div>

    <script>
        function setH() { document.documentElement.style.setProperty('--vh', `${window.innerHeight}px`); }
        window.addEventListener('resize', setH); setH();

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let pdfBytes = null, pdfDoc = null, scale = 1.0, fabricCanvases = [];
        const sCanvas = document.getElementById('sig-canvas'), pad = new SignaturePad(sCanvas);

        function openP() { document.getElementById('sig-modal').style.display = 'flex'; resPad(); }
        function closeP() { document.getElementById('sig-modal').style.display = 'none'; }
        function resPad() {
            const r = window.devicePixelRatio || 1;
            sCanvas.width = sCanvas.offsetWidth * r; sCanvas.height = sCanvas.offsetHeight * r;
            sCanvas.getContext("2d").setTransform(r, 0, 0, r, 0, 0); pad.clear();
        }

        document.getElementById('fileIn').onchange = async (e) => {
            const file = e.target.files[0]; if (!file) return;
            pdfBytes = new Uint8Array(await file.arrayBuffer());
            pdfDoc = await pdfjsLib.getDocument({data: pdfBytes}).promise;
            renderAll();
        };

        async function renderAll() {
            const wrapper = document.getElementById('viewer-wrapper');
            wrapper.innerHTML = ''; fabricCanvases = [];
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const vp = page.getViewport({ scale: (window.innerWidth / page.getViewport({scale:1}).width) * scale });
                
                const container = document.createElement('div');
                container.className = 'page-container';
                container.style.width = vp.width + 'px'; container.style.height = vp.height + 'px';

                const pdfCanv = document.createElement('canvas');
                pdfCanv.width = vp.width; pdfCanv.height = vp.height;
                container.appendChild(pdfCanv);
                await page.render({ canvasContext: pdfCanv.getContext('2d'), viewport: vp }).promise;

                const fCanvEl = document.createElement('canvas');
                fCanvEl.className = 'interaction-layer';
                container.appendChild(fCanvEl);

                const fCanvas = new fabric.Canvas(fCanvEl, { width: vp.width, height: vp.height });
                fabricCanvases.push(fCanvas);
                wrapper.appendChild(container);
            }
        }

        function changeZoom(v) { scale = Math.max(0.4, scale + v); renderAll(); }

        function confirmSig() {
            if (pad.isEmpty()) return;
            const dataUrl = pad.toDataURL();
            const last = fabricCanvases[fabricCanvases.length - 1];
            fabric.Image.fromURL(dataUrl, (img) => {
                img.set({ left: 50, top: 50 });
                img.scaleToWidth(180);
                last.add(img).setActiveObject(img);
            });
            closeP();
        }

        function deleteObj() {
            fabricCanvases.forEach(c => {
                const active = c.getActiveObject();
                if (active) c.remove(active);
            });
        }

        async function savePDF() {
            if (!pdfBytes) return;
            try {
                const doc = await PDFLib.PDFDocument.load(pdfBytes);
                const pages = doc.getPages();
                for (let i = 0; i < pages.length; i++) {
                    const fCanvas = fabricCanvases[i], objs = fCanvas.getObjects('image'), page = pages[i];
                    const { width, height } = page.getSize();
                    for (const obj of objs) {
                        const img = await doc.embedPng(obj.toDataURL());
                        const sX = width / fCanvas.width, sY = height / fCanvas.height;
                        page.drawImage(img, {
                            x: obj.left * sX, 
                            y: height - (obj.top * sY) - (obj.getScaledHeight() * sY),
                            width: obj.getScaledWidth() * sX, height: obj.getScaledHeight() * sY
                        });
                    }
                }
                const b = new Blob([await doc.save()], { type: 'application/pdf' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(b);
                a.download = "moraes_shop_assinado.pdf"; a.click();
            } catch (err) { alert("Erro ao salvar."); }
        }
    </script>
</body>
</html>
