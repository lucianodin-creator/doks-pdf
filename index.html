<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOKS PDF - BASE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        .navbar { background: #2b52d4; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        #viewer-wrapper { flex: 1; overflow: auto; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .page-container { position: relative; margin-bottom: 20px; background: #fff; }
        .canvas-container { position: absolute !important; top: 0; left: 0; z-index: 10; }
        .footer { background: #111; padding: 15px; display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #sig-modal { display: none; position: fixed; inset: 0; background: #fff; z-index: 100; flex-direction: column; }
        #sig-canvas { flex: 1; border: 1px solid #ccc; touch-action: none; }
    </style>
</head>
<body>
    <div class="navbar">
        <span>DOKS PDF</span>
        <input type="file" id="pdfIn" accept="application/pdf" style="display:none">
        <button onclick="document.getElementById('pdfIn').click()" style="width:auto; background:#fff; color:#2b52d4;">ABRIR</button>
    </div>
    <div id="viewer-wrapper"></div>
    <div class="footer">
        <button style="background:#3b66f5; color:#fff;" onclick="openPad()">ASSINAR</button>
        <button style="background:#2d8c3c; color:#fff;" onclick="savePDF()">SALVAR</button>
    </div>
    <div id="sig-modal">
        <div style="padding:15px; background:#2b52d4; color:#fff; text-align:center;">ASSINE ABAIXO</div>
        <canvas id="sig-canvas"></canvas>
        <div style="padding:15px; display:flex; gap:10px; background:#eee;">
            <button style="background:#888; color:#fff;" onclick="closePad()">SAIR</button>
            <button style="background:#f39c12; color:#fff;" onclick="pad.clear()">LIMPAR</button>
            <button style="background:#2d8c3c; color:#fff;" onclick="confirmSig()">CONFIRMAR</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let pdfBytes = null, pdfDoc = null, fabricCanvases = [];
        const sCanvas = document.getElementById('sig-canvas'), pad = new SignaturePad(sCanvas);

        function openPad() { document.getElementById('sig-modal').style.display = 'flex'; resizePad(); }
        function closePad() { document.getElementById('sig-modal').style.display = 'none'; }
        function resizePad() {
            const r = window.devicePixelRatio || 1;
            sCanvas.width = sCanvas.offsetWidth * r; sCanvas.height = sCanvas.offsetHeight * r;
            sCanvas.getContext("2d").setTransform(r, 0, 0, r, 0, 0); pad.clear();
        }

        document.getElementById('pdfIn').onchange = async (e) => {
            const f = e.target.files[0]; if (!f) return;
            pdfBytes = new Uint8Array(await f.arrayBuffer());
            pdfDoc = await pdfjsLib.getDocument({data: pdfBytes}).promise;
            render();
        };

        async function render() {
            const wrapper = document.getElementById('viewer-wrapper');
            wrapper.innerHTML = ''; fabricCanvases = [];
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const vp = page.getViewport({ scale: window.innerWidth / page.getViewport({scale:1}).width });
                const container = document.createElement('div');
                container.className = 'page-container';
                container.style.width = vp.width + 'px'; container.style.height = vp.height + 'px';
                
                const canv = document.createElement('canvas');
                canv.width = vp.width; canv.height = vp.height;
                container.appendChild(canv);
                await page.render({ canvasContext: canv.getContext('2d'), viewport: vp }).promise;

                const fCanvEl = document.createElement('canvas');
                container.appendChild(fCanvEl);
                const fCanvas = new fabric.Canvas(fCanvEl, { width: vp.width, height: vp.height });
                fabricCanvases.push(fCanvas);
                wrapper.appendChild(container);
            }
        }

        function confirmSig() {
            if (pad.isEmpty()) return;
            fabric.Image.fromURL(pad.toDataURL(), (img) => {
                img.set({ left: 50, top: 50 });
                img.scaleToWidth(150);
                fabricCanvases[fabricCanvases.length - 1].add(img);
            });
            closePad();
        }

        async function savePDF() {
            if (!pdfBytes) return;
            const doc = await PDFLib.PDFDocument.load(pdfBytes);
            const pages = doc.getPages();
            for (let i = 0; i < pages.length; i++) {
                const fCanvas = fabricCanvases[i], objs = fCanvas.getObjects('image'), page = pages[i];
                const { width, height } = page.getSize();
                for (const obj of objs) {
                    const img = await doc.embedPng(obj.toDataURL());
                    page.drawImage(img, {
                        x: (obj.left * width) / fCanvas.width,
                        y: height - ((obj.top * height) / fCanvas.height) - ((obj.getScaledHeight() * height) / fCanvas.height),
                        width: (obj.getScaledWidth() * width) / fCanvas.width,
                        height: (obj.getScaledHeight() * height) / fCanvas.height
                    });
                }
            }
            const b = new Blob([await doc.save()], { type: 'application/pdf' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(b);
            a.download = "final.pdf"; a.click();
        }
    </script>
</body>
</html>
