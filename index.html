<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assinar PDF - DoksPDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --azul-escuro: #0a192f;
            --azul-primario: #1e3a8a;
            --azul-claro: #3b82f6;
            --branco: #ffffff;
            --cinza-palco: #e2e8f0;
            --ouro: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body { background-color: var(--cinza-palco); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* BARRA DE FERRAMENTAS SUPERIOR */
        .toolbar {
            height: 60px; background: var(--azul-escuro); color: white;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 100;
        }

        .back-btn { cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; }

        .actions { display: flex; gap: 10px; }
        .btn-tool {
            background: rgba(255,255,255,0.1); border: none; color: white;
            padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px;
        }
        .btn-tool:hover { background: var(--azul-claro); }
        .btn-save { background: var(--ouro); color: var(--azul-escuro); font-weight: bold; }

        /* PALCO DO DOCUMENTO */
        .viewport {
            flex: 1; overflow: auto; display: flex; justify-content: center;
            padding: 20px; position: relative; scroll-behavior: smooth;
        }

        #pdf-canvas {
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: white; max-width: 100%; height: auto;
        }

        /* ÁREA DE SELEÇÃO DE ARQUIVO (CENTRAL) */
        .upload-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px;
        }

        .upload-container input { display: none; }
        .upload-label {
            background: var(--azul-primario); color: white; padding: 15px 25px;
            border-radius: 8px; cursor: pointer; display: inline-block; margin-top: 15px;
        }

        /* CONTROLES FLUTUANTES (MOBILE) */
        .floating-controls {
            position: fixed; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 10px;
        }
        .fab {
            width: 50px; height: 50px; border-radius: 25px; background: var(--azul-claro);
            color: white; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-size: 20px; cursor: pointer;
        }

        @media (max-width: 768px) {
            .toolbar span { font-size: 12px; }
            .viewport { padding: 10px; }
        }
    </style>
</head>
<body>

    <header class="toolbar">
        <div class="back-btn" onclick="location.href='index.html'">
            <span>⬅️</span> <strong>DoksPDF</strong>
        </div>
        
        <div class="actions">
            <button class="btn-tool">🖋️ Assinar</button>
            <button class="btn-tool btn-save">💾 Salvar</button>
        </div>
    </header>

    <main class="viewport" id="viewport">
        <div class="upload-container" id="upload-box">
            <p style="color: #64748b;">Selecione o documento para assinar</p>
            <label for="file-input" class="upload-label">Abrir PDF</label>
            <input type="file" id="file-input" accept="application/pdf">
        </div>

        <canvas id="pdf-canvas"></canvas>
    </main>

    <div class="floating-controls">
        <button class="fab" onclick="zoomIn()">➕</button>
        <button class="fab" onclick="zoomOut()">➖</button>
    </div>

    <script>
        let pdfDoc = null;
        let scale = 1.5;
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('upload-box').style.display = 'none';
                const fileReader = new FileReader();
                fileReader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    pdfDoc = await pdfjsLib.getDocument(typedarray).promise;
                    renderPage(1);
                };
                fileReader.readAsArrayBuffer(file);
            }
        });

        async function renderPage(num) {
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale: scale });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            const renderContext = {
                canvasContext: ctx,
                viewport: viewport
            };
            await page.render(renderContext).promise;
        }

        function zoomIn() { scale += 0.2; if(pdfDoc) renderPage(1); }
        function zoomOut() { if(scale > 0.5) scale -= 0.2; if(pdfDoc) renderPage(1); }
    </script>
</body>
</html>
