<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOKS PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #000; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .navbar { background-color: #2b52d4; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .logo { font-weight: bold; font-size: 18px; }
        .nav-buttons { display: flex; gap: 8px; }
        .btn-nav { background-color: #fff; color: #2b52d4; padding: 8px 12px; border-radius: 5px; font-size: 13px; font-weight: bold; cursor: pointer; border: none; }
        .btn-history { background-color: #f39c12; color: white; }
        
        /* Visualizador de PDF com fundo preto */
        #pdf-viewer { flex: 1; width: 100%; border: none; background: #000; }
        
        .footer { background: #000; padding: 15px; display: flex; gap: 10px; justify-content: center; border-top: 1px solid #222; }
        .btn-footer { flex: 1; padding: 12px; border-radius: 30px; border: none; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-assign { background-color: #3b66f5; }
        .btn-save { background-color: #2d8c3c; }
        input[type="file"] { display: none; }
        
        #history-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333; width: 80%; max-width: 300px; z-index: 100; }
        .history-item { padding: 10px 0; border-bottom: 1px solid #222; font-size: 14px; }
        .close-modal { margin-top: 15px; background: #cc0000; color: white; width: 100%; padding: 8px; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">📄 DOKS PDF</div>
        <div class="nav-buttons">
            <button class="btn-nav btn-history" onclick="toggleHistory()">🕒 RECENTES</button>
            <label class="btn-nav">
                📂 ABRIR PDF
                <input type="file" id="pdfInput" accept="application/pdf">
            </label>
        </div>
    </div>

    <iframe id="pdf-viewer"></iframe>

    <div class="footer">
        <button class="btn-footer btn-assign">🖋️ ASSINAR</button>
        <button class="btn-footer btn-save">✔️ SALVAR</button>
    </div>

    <div id="history-modal">
        <h3 style="margin-top:0">Arquivos Recentes</h3>
        <div id="history-list"></div>
        <button class="close-modal" onclick="toggleHistory()">FECHAR</button>
    </div>

    <script>
        const pdfInput = document.getElementById('pdfInput');
        const pdfViewer = document.getElementById('pdf-viewer');
        const historyList = document.getElementById('history-list');
        const historyModal = document.getElementById('history-modal');

        pdfInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                // Força o carregamento dos controles de zoom com #toolbar=1
                const fileURL = URL.createObjectURL(file) + "#toolbar=1";
                pdfViewer.src = fileURL;
                saveToHistory(file.name);
            }
        });

        function saveToHistory(name) {
            let history = JSON.parse(localStorage.getItem('pdf_history') || '[]');
            if (!history.includes(name)) {
                history = [name, ...history.slice(0, 4)];
                localStorage.setItem('pdf_history', JSON.stringify(history));
            }
        }

        function toggleHistory() {
            const history = JSON.parse(localStorage.getItem('pdf_history') || '[]');
            historyList.innerHTML = history.length ? '' : '<p style="color:#666">Nenhum histórico.</p>';
            history.forEach(item => {
                historyList.innerHTML += `<div class="history-item">📄 ${item}</div>`;
            });
            historyModal.style.display = historyModal.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
