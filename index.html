<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuPDF - Estável</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #121212; height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: white; }
        #nav { background: #1f1f1f; padding: 10px; display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid #333; }
        .btn { padding: 12px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        #view { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .pdf-page { position: relative; background: white; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #float-sig { position: absolute; width: 150px; height: 65px; display: none; border: 2px solid #007bff; z-index: 100; touch-action: none; background: rgba(0,123,255,0.1); }
        #sig-opt { position: absolute; top: -35px; left: 0; background: #ffc107; color: black; padding: 4px 8px; border-radius: 3px; font-size: 10px; cursor: pointer; font-weight: bold; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #canvas-wrap { background: white; width: 95%; height: 60%; border-radius: 8px; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }
        .controls { margin-top: 20px; display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div id="nav">
        <input type="file" id="pdf-upload" style="display:none">
        <button class="btn" style="background:#007bff" onclick="document.getElementById('pdf-upload').click()">Abrir</button>
        <button class="btn" style="background:#f39c12" onclick="initSig()">Assinar</button>
        <button class="btn" style="background:#28a745" onclick="exportPDF()">Salvar</button>
    </div>
    <div id="view"></div>
    <div id="float-sig">
        <div id="sig-opt">PÁGINA: ATUAL</div>
        <img id="sig-img" style="width:100%; height:100%; object-fit:contain; pointer-events:none;">
    </div>
    <div id="modal">
        <div id="canvas-wrap"><canvas id="main-canvas"></canvas></div>
        <div class="controls">
            <button class="btn" style="background:#28a745" onclick="confirmSig()">Confirmar</button>
            <button class="btn" style="background:#dc3545" onclick="sigPad.clear()">Limpar</button>
            <button class="btn" style="background:#6c757d" onclick="closeModal()">Sair</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
