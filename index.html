<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Assinador v5.28</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: sans-serif; margin: 0; background: #000; color: #fff; 
            min-height: 100vh; display: flex; flex-direction: column;
            user-select: none; -webkit-user-select: none; touch-action: none;
        }
        header { background: #111; padding: 12px; display: flex; justify-content: center; gap: 8px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 2000; }
        .btn { height: 46px; border: none; border-radius: 6px; font-weight: bold; color: white; font-size: 11px; cursor: pointer; text-transform: uppercase; flex: 1; max-width: 130px; display: flex; align-items: center; justify-content: center; }
        
        #viewer { flex: 1; padding: 10px; display: flex; flex-direction: column; align-items: center; background: #1e1e1e; overflow-y: auto; touch-action: pan-y; }
        .pdf-page-wrapper { position: relative; background: white; margin-bottom: 50px; box-shadow: 0 5px 25px rgba(0,0,0,0.7); line-height: 0; }
        
        .sig-box { 
            position: absolute; width: 180px; height: 90px; border: 2px solid #3498db; 
            background: rgba(52,152,219,0.05); z-index: 1000; 
            touch-action: none !important; 
        }
        .sig-box img { width: 100%; height: 100%; display: block; pointer-events: none; object-fit: fill; }
        
        .move-handle { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #3498db; font-size: 32px; opacity: 0.3; pointer-events: none; }

        /* Controles Baseados no Desenho do Usuário */
        .edge-handle {
            position: absolute; background: #2980b9; color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; border: 2px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            z-index: 1100; touch-action: none !important;
        }
        
        /* Laterais (Largura) */
        .h-side { width: 30px; height: 50px; top: 50%; transform: translateY(-50%); border-radius: 6px; }
        .right-h { right: -35px; }
        .left-h { left: -35px; }

        /* Topo/Base (Altura) */
        .v-side { width: 50px; height: 30px; left: 50%; transform: translateX(-50%); border-radius: 6px; }
        .top-v { top: -35px; }
        .bottom-v { bottom: -35px; }

        .rotator-btn { position: absolute; top: -85px; right: -60px; background: #f39c12; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; border: 2px solid white; z-index: 1200; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        #final-tools { position: fixed; bottom: 0; left: 0; width: 100%; display: none; flex-direction: row; justify-content: center; gap: 10px; background: rgba(0,0,0,0.9); padding: 15px; border-top: 1px solid #444; z-index: 3000; }
        #screen-sign { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        #canvas-container { flex: 1; width: 95vw; margin: 10px auto; background: #fff; border-radius: 12px; }
        canvas#sig-canvas { width: 100%; height: 100%; display: block; touch-action: none; }
    </style>
</head>
<body>
    <header>
        <input type="file" id="pdf-in" style="display:none" accept="application/pdf">
        <button class="btn" style="background:#3498db" onclick="document.getElementById('pdf-in').click()">1. ABRIR PDF</button>
        <button id="btn-sign" class="btn" style="background:#f39c12" onclick="showSignScreen()">2. ASSINAR</button>
        <button id="btn-redo" class="btn" style="background:#e67e22; display:none;" onclick="showSignScreen()">REFAZER</button>
    </header>

    <div id="viewer"></div>

    <div id="final-tools">
        <button class="btn" style="background:#2ecc71" onclick="saveFinal(0.9, 'alta')">ALTA</button>
        <button class="btn" style="background:#f1c40f; color:#000" onclick="saveFinal(0.5, 'media')">MÉDIA</button>
        <button class="btn" style="background:#e74c3c" onclick="saveFinal(0.1, 'leve')">LEVE</button>
    </div>

    <div id="screen-sign">
        <div id="canvas-container"><canvas id="sig-canvas"></canvas></div>
        <div style="padding:20px; display:flex; gap:12px; background:#111; justify-content:center;">
            <button class="btn" style="background:#27ae60" onclick="applySignature()">OK</button>
            <button class="btn" style="background:#e74c3c" onclick="pad.clear()">LIMPAR</button>
            <button class="btn" style="background:#7f8c8d" onclick="hideSignScreen()">SAIR</button>
        </div>
    </div>

    <script>
        const { PDFDocument, degrees } = PDFLib;
        let pdfData, pad, sigBase64;

        function showSignScreen() {
            document.getElementById('screen-sign').style.display = 'flex';
            const canvas = document.getElementById('sig-canvas');
            if (!pad) pad = new SignaturePad(canvas, { penColor: "rgb(0, 0, 80)" });
            const ratio = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * ratio; canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        }

        function hideSignScreen() { document.getElementById('screen-sign').style.display = 'none'; }

        function applySignature() {
            if (!pad || pad.isEmpty()) return;
            sigBase64 = pad.toDataURL("image/png");
            hideSignScreen();
            document.getElementById('btn-redo').style.display = 'flex';
            document.getElementById('btn-sign').style.display = 'none';
            createSigBoxes();
        }

        function createSigBoxes() {
            document.querySelectorAll('.pdf-page-wrapper').forEach(page => {
                const box = document.createElement('div');
                box.className = 'sig-box';
                box.style.left = "40px"; box.style.top = "80px";
                box.innerHTML = `
                    <div class="rotator-btn" onclick="rotateBox(this)">↻</div>
                    <div class="move-handle">✥</div>
                    <img src="${sigBase64}">
                    <div class="edge-handle h-side left-h">↔</div>
                    <div class="edge-handle h-side right-h">↔</div>
                    <div class="edge-handle v-side top-v">↕</div>
                    <div class="edge-handle v-side bottom-v">↕</div>
                `;
                box.dataset.rotation = 0;

                // MOVER
                const onPointerMove = (e) => {
                    if (e.target.className.includes('edge-handle')) return;
                    e.preventDefault(); e.stopPropagation();
                    const r = page.getBoundingClientRect();
                    box.style.left = (e.clientX - r.left - (box.offsetWidth/2)) + "px";
                    box.style.top = (e.clientY - r.top - (box.offsetHeight/2)) + "px";
                };
                box.addEventListener("pointerdown", (e) => {
                    if (e.target.className.includes('edge-handle')) return;
                    box.setPointerCapture(e.pointerId);
                    box.addEventListener("pointermove", onPointerMove);
                });
                box.addEventListener("pointerup", (e) => {
                    box.releasePointerCapture(e.pointerId);
                    box.removeEventListener("pointermove", onPointerMove);
                });

                // REDIMENSIONAR INDEPENDENTE (LADOS)
                box.querySelectorAll('.edge-handle').forEach(h => {
                    let startX, startY, startW, startH, startL, startT;
                    const speed = 0.7;

                    const onResize = (re) => {
                        re.preventDefault(); re.stopPropagation();
                        const dx = (re.clientX - startX) * speed;
                        const dy = (re.clientY - startY) * speed;

                        if (h.className.includes('h-side')) { // LARGURA
                            if (h.className.includes('right-h')) {
                                box.style.width = Math.max(40, startW + dx) + "px";
                            } else {
                                box.style.width = Math.max(40, startW - dx) + "px";
                                box.style.left = (startL + dx) + "px";
                            }
                        } else { // ALTURA
                            if (h.className.includes('bottom-v')) {
                                box.style.height = Math.max(30, startH + dy) + "px";
                            } else {
                                box.style.height = Math.max(30, startH - dy) + "px";
                                box.style.top = (startT + dy) + "px";
                            }
                        }
                    };

                    h.addEventListener("pointerdown", (he) => {
                        he.preventDefault(); he.stopPropagation();
                        h.setPointerCapture(he.pointerId);
                        startX = he.clientX; startY = he.clientY;
                        startW = box.offsetWidth; startH = box.offsetHeight;
                        startL = parseFloat(box.style.left); startT = parseFloat(box.style.top);
                        h.addEventListener("pointermove", onResize);
                    });
                    h.addEventListener("pointerup", (he) => {
                        h.releasePointerCapture(he.pointerId);
                        h.removeEventListener("pointermove", onResize);
                    });
                });
                page.appendChild(box);
            });
            document.getElementById('final-tools').style.display = 'flex';
        }

        function rotateBox(el) {
            const box = el.parentElement;
            let rot = (parseInt(box.dataset.rotation) || 0) + 90;
            box.dataset.rotation = rot >= 360 ? 0 : rot;
            box.style.transform = `rotate(${box.dataset.rotation}deg)`;
        }

        document.getElementById('pdf-in').onchange = async (e) => {
            pdfData = await e.target.files[0].arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: pdfData}).promise;
            const view = document.getElementById('viewer'); view.innerHTML = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const p = await pdf.getPage(i);
                const w = document.createElement('div'); w.className = 'pdf-page-wrapper';
                const c = document.createElement('canvas');
                const vp = p.getViewport({scale: (view.clientWidth * 0.95) / p.getViewport({scale:1}).width});
                c.width = vp.width; c.height = vp.height;
                await p.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
                w.appendChild(c); view.appendChild(w);
            }
        };

        async function saveFinal(qual, nome) {
            const doc = await PDFDocument.load(pdfData);
            const sigImg = await doc.embedJpg(pad.toDataURL("image/jpeg", qual));
            const pages = doc.getPages();
            document.querySelectorAll('.pdf-page-wrapper').forEach((htmlP, i) => {
                const box = htmlP.querySelector('.sig-box');
                if (box && pages[i]) {
                    const p = pages[i]; const { width, height } = p.getSize();
                    const rot = parseInt(box.dataset.rotation) || 0;
                    const pdfW = width * (box.offsetWidth / htmlP.offsetWidth);
                    const pdfH = height * (box.offsetHeight / htmlP.offsetHeight);
                    const pdfX = width * (parseFloat(box.style.left) / htmlP.offsetWidth);
                    const pdfY = height - (height * (parseFloat(box.style.top) / htmlP.offsetHeight)) - pdfH;
                    p.drawImage(sigImg, { x: pdfX + (pdfW / 2), y: pdfY + (pdfH / 2), width: pdfW, height: pdfH, rotate: degrees(-rot), xAnchor: 'center', yAnchor: 'center' });
                }
            });
            const bytes = await doc.save();
            const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
            link.download = `assinado_${nome}.pdf`; link.click();
        }
    </script>
</body>
</html>
