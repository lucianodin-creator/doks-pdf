<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOKS PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root { --primary: #0070f3; --success: #0070f3; --bg: #000; --text: #fff; --card: #111; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 500px; background: var(--primary); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .btn { width: 100%; max-width: 500px; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; color: white; transition: 0.2s; }
        .btn-upload { background: #333; }
        .btn-action { background: var(--success); }
        input[type="file"] { display: none; }
        .history { width: 100%; max-width: 500px; margin-top: 30px; }
        .history h3 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .history-item { background: var(--card); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; border: 1px solid #222; }
        .history-date { color: #555; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">📄 DOKS PDF</div>

    <label class="btn btn-upload">
        📁 SELECIONAR PDF
        <input type="file" id="pdfInput" accept="application/pdf">
    </label>

    <button class="btn btn-action" onclick="alert('Funcionalidade de assinatura em breve!')">✍️ ASSINAR DOCUMENTO</button>

    <div class="history">
        <h3>Recentes</h3>
        <div id="historyList">
            </div>
    </div>

    <script>
        const pdfInput = document.getElementById('pdfInput');
        const historyList = document.getElementById('historyList');

        // Carrega histórico ao abrir
        window.onload = displayHistory;

        pdfInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                saveToHistory(file.name);
                alert('Arquivo ' + file.name + ' carregado!');
            }
        });

        function saveToHistory(name) {
            let history = JSON.parse(localStorage.getItem('pdf_history') || '[]');
            const newItem = { name, date: new Date().toLocaleDateString('pt-BR') };
            history = [newItem, ...history.slice(0, 4)]; // Mantém os últimos 5
            localStorage.setItem('pdf_history', JSON.stringify(history));
            displayHistory();
        }

        function displayHistory() {
            const history = JSON.parse(localStorage.getItem('pdf_history') || '[]');
            historyList.innerHTML = history.length ? '' : '<p style="color:#444">Nenhum arquivo recente.</p>';
            history.forEach(item => {
                historyList.innerHTML += `
                    <div class="history-item">
                        <span>📄 ${item.name}</span>
                        <span class="history-date">${item.date}</span>
                    </div>`;
            });
        }
    </script>
</body>
</html>
