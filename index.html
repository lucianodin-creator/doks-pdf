<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuPDF - Sênior v1.4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #333; padding: 12px; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid #444; z-index: 10; }
        .btn { padding: 12px 18px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; font-size: 12px; transition: background 0.2s; }
        .btn:active { transform: scale(0.97); }
        #viewer { flex: 1; overflow-y: auto; background: #2c2c2c; padding: 15px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .pdf-page-wrapper { position: relative; background: white; margin-bottom: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.6); line-height: 0; }
        canvas { display: block; max-width: 100%; height: auto; }
        #drag-container { position: absolute; width: 140px; height: 60px; border: 2px dashed #007bff; background: rgba(0,123,255,0.1); display: none; z-index: 100; touch-action: none; cursor: move; }
        #tag-status { position: absolute; top: -30px; left: 0; background: #f39c12; color: black; font-size: 10px; padding: 4px 8px; font-weight: bold; border-radius: 4px 4px 0 0; white-space: nowrap; cursor: pointer; }
        #tag-status.active { background: #28a745; color: white; }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #canvas-wrap { background: white; width: 94%; height: 50%; border-radius: 8px; border: 4px solid #444; overflow: hidden; }
        #modal-canvas { width: 100%; height: 100%; touch-action: none; }
        .modal-btns { margin-top: 20px; display: flex; gap: 10px; }
    </style>
</head>
<body>
    <header>
        <input type="file" id="pdf-input" style="display:none" accept="application/pdf">
        <button class="btn" style="background:#007bff" onclick="document.getElementById('pdf-input').click()">ABRIR</button>
        <button class="btn" style="background:#f39c12" onclick="openSignature()">ASSINAR</button>
        <button class="btn" style="background:#28a745" onclick="saveFinalPdf()">SALVAR</button>
    </header>
    <div id="viewer"></div>
    <div id="drag-container">
        <div id="tag-status">APLICAR: SÓ ESTA PÁG</div>
        <img id="sig-render" style="width:100%; height:100%; pointer-events:none; object-fit:contain;">
    </div>
    <div id="modal-overlay">
        <div style="color:#f39c12; margin-bottom:15px; font-weight:bold; font-size:1.2em;">ASSINE ABAIXO</div>
        <div id="canvas-wrap"><canvas id="modal-canvas"></canvas></div>
        <div class="modal-btns">
            <button class="btn" style="background:#28a745" onclick="confirmSignature()">Confirmar</button>
            <button class="btn" style="background:#dc3545" onclick="sigPad.clear()">Limpar</button>
            <button class="btn" style="background:#6c757d" onclick="closeSignature()">Sair</button>
        </div>
    </div>
    <script>
        const { PDFDocument, rgb } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let pdfBytes, sigPad, isApplyingAll = false;
        const viewer = document.getElementById('viewer');
        const dragContainer = document.getElementById('drag-container');
        const sigRender = document.getElementById('sig-render');
        const tagStatus = document.getElementById('tag-status');

        function openSignature() {
            if (!viewer.hasChildNodes()) return alert("Carregue o PDF primeiro.");
            document.getElementById('modal-overlay').style.display = 'flex';
            const c = document.getElementById('modal-canvas');
            const ratio = window.devicePixelRatio || 1;
            c.width = c.offsetWidth * ratio; c.height = c.offsetHeight * ratio;
            c.getContext("2d").scale(ratio, ratio);
            sigPad = new SignaturePad(c, { penColor: 'black' });
        }
        function closeSignature() { document.getElementById('modal-overlay').style.display = 'none'; }
        function confirmSignature() {
            if (sigPad.isEmpty()) return alert("Área de assinatura em branco!");
            sigRender.src = sigPad.toDataURL();
            dragContainer.style.display = 'block';
            const p1 = viewer.querySelector('.pdf-page-wrapper');
            if (p1) { p1.appendChild(dragContainer); dragContainer.style.left = "30px"; dragContainer.style.top = "30px"; }
            closeSignature();
        }
        tagStatus.onclick = (e) => {
            e.stopPropagation();
            isApplyingAll = !isApplyingAll;
            tagStatus.innerText = isApplyingAll ? "APLICAR: TODAS AS PÁGS" : "APLICAR: SÓ ESTA PÁG";
            tagStatus.className = isApplyingAll ? "active" : "";
        };
        dragContainer.addEventListener("touchmove", (e) => {
            e.preventDefault();
            const rect = dragContainer.parentElement.getBoundingClientRect();
            const touch = e.touches[0];
            dragContainer.style.left = (touch.clientX - rect.left - 70) + "px";
            dragContainer.style.top = (touch.clientY - rect.top - 30) + "px";
        }, { passive: false });
        document.getElementById('pdf-input').onchange = async (e) => {
            const file = e.target.files[0]; if (!file) return;
            pdfBytes = await file.arrayBuffer(); viewer.innerHTML = "";
            const pdf = await pdfjsLib.getDocument({data: pdfBytes}).promise;
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const wrapper = document.createElement('div'); wrapper.className = 'pdf-page-wrapper';
                const canvas = document.createElement('canvas');
                const vp = page.getViewport({scale: (viewer.clientWidth * 0.95) / page.getViewport({scale:1}).width});
                canvas.width = vp.width; canvas.height = vp.height;
                await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
                wrapper.appendChild(canvas); viewer.appendChild(wrapper);
            }
        };
        async function saveFinalPdf() {
            if(!pdfBytes || !sigRender.src) return alert("Faltam dados!");
            const doc = await PDFDocument.load(pdfBytes);
            const png = await doc.embedPng(sigRender.src);
            const pages = doc.getPages();
            const wrap = viewer.querySelector('.pdf-page-wrapper');
            const rx = parseFloat(dragContainer.style.left) / wrap.offsetWidth;
            const ry = parseFloat(dragContainer.style.top) / wrap.offsetHeight;
            const rw = dragContainer.offsetWidth / wrap.offsetWidth;
            const rh = dragContainer.offsetHeight / wrap.offsetHeight;
            const loopLimit = isApplyingAll ? pages.length : 1;
            for (let i = 0; i < loopLimit; i++) {
                const p = pages[i]; const { width, height } = p.getSize();
                p.drawImage(png, { x: width * rx, y: height - (height * ry) - (height * rh), width: width * rw, height: height * rh });
            }
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([await doc.save()], {type: 'application/pdf'}));
            link.download = "Final_Assinado.pdf"; link.click();
        }
    </script>
</body>
</html>
