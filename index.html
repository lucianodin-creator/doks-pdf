<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DOKS PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --app-height: 100vh; }
        body { 
            font-family: sans-serif; background-color: #000; color: white; margin: 0; 
            display: flex; flex-direction: column; height: var(--app-height); 
            width: 100vw; overflow: hidden; position: fixed; 
        }
        
        .navbar { 
            background-color: #2b52d4; padding: 0 15px; display: flex; 
            justify-content: space-between; align-items: center; height: 55px; z-index: 100;
        }

        #viewer-container { 
            flex: 1; width: 100%; background: #1a1a1a; overflow: auto; 
            display: flex; flex-direction: column; align-items: center;
            -webkit-overflow-scrolling: touch;
        }
        
        canvas { border-bottom: 10px solid #000; max-width: 100%; height: auto !important; }

        .zoom-controls { position: fixed; right: 15px; top: 80px; display: flex; flex-direction: column; gap: 10px; z-index: 200; }
        .btn-zoom { 
            background-color: #f39c12; color: white; width: 44px; height: 44px; 
            border-radius: 8px; border: none; font-size: 22px; font-weight: bold; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
        
        .footer { 
            background: #000; padding: 10px 15px; display: flex; gap: 10px; 
            height: 65px; border-top: 1px solid #222; z-index: 100; box-sizing: border-box;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .btn-footer { 
            flex: 1; border-radius: 10px; border: none; color: white; 
            font-weight: bold; font-size: 14px; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; 
            height: 100%; transition: transform 0.1s;
        }

        .btn-assign { background-color: #3b66f5; }
        .btn-save { background-color: #2d8c3c; }

        input[type="file"] { display: none; }
        .btn-nav { border: none; padding: 8px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .btn-nav-recent { background:#f39c12; color:white; margin-right: 5px; }
        .btn-nav-open { background:#fff; color:#2b52d4; }
    </style>
</head>
<body>

    <div class="navbar">
        <div style="font-weight:bold; font-size: 16px;">DOKS PDF</div>
        <div style="display:flex; align-items: center;">
            <button class="btn-nav btn-nav-recent" onclick="toggleHistory()">RECENTE</button>
            <label class="btn-nav btn-nav-open">
                ABRIR <input type="file" id="pdfInput" accept="application/pdf">
            </label>
        </div>
    </div>

    <div class="zoom-controls">
        <button class="btn-zoom" onclick="zoomIn()">+</button>
        <button class="btn-zoom" onclick="zoomOut()">-</button>
    </div>

    <div id="viewer-container">
        </div>

    <div class="footer">
        <button class="btn-footer btn-assign">ASSINAR</button>
        <button class="btn-footer btn-save">SALVAR</button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null;
        let scale = 1.5;
        const container = document.getElementById('viewer-container');

        document.getElementById('pdfInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    pdfDoc = await pdfjsLib.getDocument(typedarray).promise;
                    renderAllPages();
                };
                reader.readAsArrayBuffer(file);
            }
        });

        async function renderAllPages() {
            container.innerHTML = ''; // Limpa atual
            for (let num = 1; num <= pdfDoc.numPages; num++) {
                const page = await pdfDoc.getPage(num);
                const viewport = page.getViewport({ scale });
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                container.appendChild(canvas);
                await page.render({ canvasContext: ctx, viewport }).promise;
            }
        }

        function zoomIn() { scale += 0.2; if(pdfDoc) renderAllPages(); }
        function zoomOut() { scale = Math.max(0.5, scale - 0.2); if(pdfDoc) renderAllPages(); }

        const appHeight = () => document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
        window.addEventListener('resize', appHeight);
        appHeight();
    </script>
</body>
</html>
