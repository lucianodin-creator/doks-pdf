<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuPDF Local - Final</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <b>MEUPDF LOCAL</b>
        <button onclick="document.getElementById('file-in').click()" class="btn-open">ABRIR PDF</button>
        <input type="file" id="file-in" accept="application/pdf" style="display:none">
    </div>

    <div class="container">
        <div id="pdf-wrapper" style="position:relative; display:inline-block;">
            <canvas id="pdf-render"></canvas>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn-circle" onclick="changePage(-1)"><i class="fa fa-chevron-left"></i></button>
        <div class="page-info">
            <span id="page-num">0</span> / <span id="page-count">0</span>
        </div>
        <button class="btn-circle" onclick="changePage(1)"><i class="fa fa-chevron-right"></i></button>
        <button class="btn-circle btn-save" onclick="saveFinalPdf()"><i class="fa fa-save"></i> SALVAR</button>
    </div>

    <div id="save-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; color:white; flex-direction:column; align-items:center; justify-content:center;">
        <i class="fa fa-spinner fa-spin fa-3x"></i>
        <p>Processando no seu Motorola...</p>
    </div>

    <script src="script.js?v=FINAL_CORRIGIDO"></script>
</body>
</html>
